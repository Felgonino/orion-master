<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D2B55">
<title>ORION Master</title>
<style>
:root{
  --navy:#0D2B55;--azul:#1A5276;--azul-l:#D6EAF8;
  --teal:#0E6655;--teal-l:#D1F2EB;
  --orange:#CA6F1E;--orange-l:#FAD7A0;
  --purple:#6C3483;--gold:#F9E79F;
  --gray:#F4F6F7;--gray2:#E5E8E8;--border:#D5D8DC;
  --text:#1B2631;--text2:#566573;--text3:#AAB7B8;
  --white:#FFFFFF;--green:#1E8449;--green-l:#D5F5E3;
  --red:#C0392B;--red-l:#FADBD8;
  --r:12px;--sh:0 2px 12px rgba(13,43,85,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:-webkit-fill-available;background:#F0F2F5;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;color:var(--text)}
.app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;overflow:hidden}
/* topbar */
.tb{background:var(--navy);color:#fff;padding:14px 16px 10px;padding-top:max(14px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tb-logo{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.tb-t{font-size:15px;font-weight:600}.tb-s{font-size:11px;opacity:.7}
.sdot{width:8px;height:8px;border-radius:50%;background:#AAB7B8;margin-left:auto;flex-shrink:0;transition:background .3s}
.sdot.ok{background:#2ECC71}.sdot.err{background:var(--red)}.sdot.load{background:#F39C12;animation:bk .8s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
/* tabs */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px 4px 8px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent}
.tab.on{color:var(--navy);border-bottom-color:var(--navy)}
.tab em{display:block;font-size:17px;font-style:normal;margin-bottom:1px}
/* content */
.cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.cnt::-webkit-scrollbar{display:none}
.pg{display:none;padding:14px}
.pg.on{display:block}
/* cards */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden}
.ch{padding:12px 14px;border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:8px}
.ch h3{font-size:13px;font-weight:600;color:var(--text);flex:1}
.cb{padding:12px 14px}
/* badges */
.bx{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bf{background:var(--azul-l);color:var(--navy)}.bs{background:var(--teal-l);color:var(--teal)}
.bw{background:var(--orange-l);color:var(--orange)}.bg{background:var(--green-l);color:var(--green)}
/* layout */
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
/* pills */
.pill{padding:10px 8px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);cursor:pointer;text-align:center}
.pill.on{border-color:var(--navy);background:var(--azul-l)}
.pill.on-s{border-color:var(--teal);background:var(--teal-l)}
.pill em{font-size:20px;display:block;margin-bottom:3px;font-style:normal}
.pill b{font-size:12px;font-weight:600;display:block;color:var(--text)}
.pill small{font-size:10px;color:var(--text3)}
/* fields */
.fr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gray2)}
.fr:last-child{border-bottom:none}
.fl{font-size:12px;color:var(--text2)}
.fv{font-size:12px;font-weight:600;color:var(--text)}
.fv.ok{color:var(--green)}.fv.win{color:var(--green)}.fv.miss{color:var(--red)}.fv.na{color:var(--text3);font-weight:400;font-style:italic}
/* labels */
.lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
/* buttons */
.btn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{opacity:.8}.btn:disabled{opacity:.35;cursor:default}
.btn.tl{background:var(--teal)}
.btn2{width:100%;padding:12px;background:transparent;color:var(--text);border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
/* upload */
.upz{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;background:var(--gray);position:relative}
.upz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upz em{font-size:28px;display:block;margin-bottom:8px;font-style:normal}
.upz p{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:3px}
.upz span{font-size:11px;color:var(--text3)}
/* thumbs */
.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.thumb{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:9/16;border:1px solid var(--border)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-rm{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(0,0,0,.6);border-radius:50%;border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* session cards */
.sc{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;border-left:4px solid var(--gray2)}
.sc.ta{border-left-color:var(--navy)}.sc.tb2{border-left-color:var(--purple)}.sc.tc{border-left-color:var(--orange)}.sc.done{border-left-color:var(--green);opacity:.8}
.sc-h{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.sc-h h4{font-size:13px;font-weight:600;flex:1}
.sc-d{font-size:11px;color:var(--text3)}
.sc-b{padding:0 14px 12px;display:none}
.sc-b.open{display:block}
/* bloques entrenamiento */
.blq{background:var(--gray);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.blq-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px}
.blq-d{font-size:12px;color:var(--text);line-height:1.5}
.blq-f{font-size:11px;color:var(--navy);font-weight:600;margin-top:4px}
.blq-s{font-size:11px;color:var(--teal);font-weight:600}
/* compare */
.cmp-r{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;align-items:center}
/* vueltas */
.vtbl{width:100%;border-collapse:collapse;font-size:11px}
.vtbl th{background:var(--gray);padding:6px 8px;text-align:right;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border)}
.vtbl th:first-child{text-align:left}
.vtbl td{padding:5px 8px;text-align:right;border-bottom:1px solid var(--gray2);color:var(--text)}
.vtbl td:first-child{text-align:left;color:var(--text2)}
.vtbl tr.tot td{font-weight:700;color:var(--navy);background:var(--azul-l)}
/* kpi */
.kpig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi{background:var(--white);border-radius:10px;padding:12px;box-shadow:var(--sh)}
.kpi-v{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.kpi-v.s{color:var(--teal)}
.kpi-l{font-size:11px;color:var(--text3);margin-top:3px}
/* success */
.ok-box{text-align:center;padding:30px 16px 20px}
.ok-ico{width:56px;height:56px;background:var(--green-l);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px}
.ok-t{font-size:18px;font-weight:700;margin-bottom:6px}
.ok-s{font-size:13px;color:var(--text2);line-height:1.6}
/* misc */
.itag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;background:var(--gray);color:var(--text2);border:1px solid var(--gray2);margin:2px}
.note{background:var(--gold);border-radius:8px;padding:10px 12px;font-size:12px;color:#7D6608;line-height:1.5;margin-bottom:10px}
.div{height:1px;background:var(--gray2);margin:10px 0}
/* loading overlay */
#lov{display:none;position:fixed;inset:0;background:rgba(13,43,85,.88);z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#lov.on{display:flex}
.lo-i{font-size:38px;margin-bottom:16px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.lo-m{font-size:16px;font-weight:600;color:#fff;text-align:center;margin-bottom:6px}
.lo-s{font-size:13px;color:rgba(255,255,255,.7);text-align:center;margin-bottom:20px}
.lo-p{width:100%;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.lo-f{height:100%;background:#5DADE2;border-radius:2px;transition:width .5s ease}
/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1B2631;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}

/* bloque checklist */
.blq-check-card{background:var(--white);border-radius:10px;box-shadow:var(--sh);margin-bottom:8px;overflow:hidden;border-left:4px solid var(--green);}
.blq-check-card.bcc-omit{border-left-color:var(--red);opacity:.6;}
.bcc-hdr{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;cursor:pointer;}
.bcc-check{width:24px;height:24px;border-radius:6px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px;}
.bcc-check.bcc-omit-chk{background:var(--red);}
.bcc-tipo{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.bcc-desc{font-size:11px;color:var(--text2);line-height:1.4;}
.bcc-opts{padding:0 14px 12px;border-top:1px solid var(--gray2);}
.estilo-btn{padding:5px 10px;border-radius:16px;border:1px solid var(--border);background:var(--white);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;margin:0;}
.estilo-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.nota-inp{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;color:var(--text);background:var(--gray);outline:none;}
.nota-inp:focus{border-color:var(--navy);background:var(--white);}

/* bloque switcher */
.bsw{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.bsw button{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:var(--white);color:var(--text2)}
.bsw button.on{color:#fff}
/* bloque header */
.bl-hdr{border-radius:10px;padding:12px 14px;margin-bottom:12px;color:#fff}

/* ── LOGIN PIN ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(160deg,#0D2B55,#1A5276);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#login-screen.hidden{display:none}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.login-sub{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:28px}
.login-who{font-size:13px;color:rgba(255,255,255,.85);margin-bottom:12px;font-weight:500}
.login-swimmers{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px;max-width:340px}
.login-sw-btn{padding:10px 16px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.login-sw-btn.on{background:#fff;color:#0D2B55;border-color:#fff}
.pin-display{display:flex;gap:12px;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.4);background:transparent}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:14px}
.pin-key{width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:24px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pin-key:active{background:rgba(255,255,255,.25)}
.pin-key.fn{font-size:14px}
.login-err{color:#FADBD8;font-size:13px;margin-top:16px;height:18px}
.login-hint{color:rgba(255,255,255,.5);font-size:11px;margin-top:20px;text-align:center;max-width:280px;line-height:1.5}

</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">🌊</div>
  <div class="login-title">ORION Master</div>
  <div class="login-sub">Felipe &amp; Sergio · 2026</div>
  <div class="login-who" id="login-who">¿Quién eres?</div>
  <div class="login-swimmers" id="login-swimmers"></div>
  <div class="pin-display" id="pin-display" style="display:none">
    <div class="pin-dot" id="pd-0"></div>
    <div class="pin-dot" id="pd-1"></div>
    <div class="pin-dot" id="pd-2"></div>
    <div class="pin-dot" id="pd-3"></div>

  <div class="login-err" id="login-err"></div>

</div>

<div class="app">
  <div class="tb">
    <div class="tb-logo">🌊</div>
    <div><div class="tb-t">ORION Master</div><div class="tb-s">Felipe &amp; Sergio · 2026</div></div>

    <div class="pg"    id="pg-compe"></div>

</div>

let loginSel = null;
let pinBuffer = '';

function renderLogin() {
  const cont = document.getElementById('login-swimmers');
  cont.innerHTML = '';
  NADADORES.forEach((n, i) => {
    const btn = document.createElement('button');
    btn.className = 'login-sw-btn';
    btn.textContent = n.emoji + ' ' + n.nombre;
    btn.onclick = () => selLoginSwimmer(i);
    cont.appendChild(btn);
  });
  // hint about default PINs (solo primera vez)
  document.getElementById('login-hint').textContent = 'Ingresa con tu PIN personal';
}

function selLoginSwimmer(i) {
  loginSel = i;
  pinBuffer = '';
  document.querySelectorAll('.login-sw-btn').forEach((b,idx) => b.classList.toggle('on', idx===i));
  document.getElementById('login-who').textContent = 'Ingresa tu PIN, ' + NADADORES[i].nombre;
  document.getElementById('pin-display').style.display = 'flex';
  document.getElementById('pin-pad').style.display = 'grid';
  document.getElementById('login-hint').style.display = 'none';
  renderPinPad();
  updatePinDots();
}

function renderPinPad() {
  const pad = document.getElementById('pin-pad');
  pad.innerHTML = '';
  const keys = ['1','2','3','4','5','6','7','8','9','C','0','OK'];
  keys.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'pin-key' + (k==='C'||k==='OK' ? ' fn' : '');
    btn.textContent = k;
    btn.onclick = () => pinKey(k);
    pad.appendChild(btn);
  });
}

function pinKey(k) {
  if (k === 'C') { pinBuffer = pinBuffer.slice(0,-1); }
  else if (k === 'OK') { checkPin(); return; }
  else if (pinBuffer.length < 4) { pinBuffer += k; }
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 200);
}

function updatePinDots() {
  for (let i=0; i<4; i++) {
    document.getElementById('pd-'+i).classList.toggle('filled', i < pinBuffer.length);
  }
}

function cerrarSesion() {
  USUARIO_ACTUAL = null;
  loginSel = null;
  pinBuffer = '';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('pin-display').style.display = 'none';
  document.getElementById('pin-pad').style.display = 'none';
  document.getElementById('login-hint').style.display = 'block';
  document.getElementById('login-who').textContent = '¿Quién eres?';
  document.getElementById('login-err').textContent = '';
  renderLogin();
}

function checkPin() {
  if (loginSel === null) return;
  const n = NADADORES[loginSel];
  if (pinBuffer === n.pin) {
    USUARIO_ACTUAL = n.nombre;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('btn-logout').style.display = 'block';
    document.querySelector('.tb-s').textContent = n.emoji + ' ' + n.nombre + ' · 2026';
    goTab('hoy');
  } else {
    document.getElementById('login-err').textContent = 'PIN incorrecto';
    pinBuffer = '';
    updatePinDots();
    setTimeout(() => document.getElementById('login-err').textContent = '', 2000);
  }
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function getBloqueActivo() { return BLOQUES.find(b=>b.activo)||BLOQUES[0]; }
function getAllSesiones() { return getBloqueActivo().semanas.flatMap(w=>w.sesiones); }
function getSesion(id) { return BLOQUES.flatMap(b=>b.semanas.flatMap(w=>w.sesiones)).find(s=>s.id===id); }
function completadas(id) { return CACHE.filter(r=>r.Sesion_Plan===id); }
function todayStr() { const d=new Date(); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function z(n){ return String(n).padStart(2,'0'); }
function genId(nad) {
  const d=new Date(); const ds=d.getFullYear()+z(d.getMonth()+1)+z(d.getDate());
  const idx=CACHE.filter(r=>r.Fecha===ds&&r.Nadador===nad).length+1;
  return ds+'_'+z(idx)+(nad==='Felipe'?'F':'S');
}
function scClass(tipo){ return {A:'ta',B:'tb2',C:'tc'}[tipo]||''; }
function blColor(id){ const b=BLOQUES.find(x=>x.id===id); return b?b.color:'var(--navy)'; }
function toast(msg,ms=2500){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),ms); }
function setLoad(pct,msg,sub){ document.getElementById('lo-f').style.width=pct+'%'; document.getElementById('lo-m').textContent=msg; document.getElementById('lo-s').textContent=sub||''; }
function lov(show){ document.getElementById('lov').classList[show?'add':'remove']('on'); }
function syncDot(st){ const d=document.getElementById('sdot'); d.className='sdot '+st; }
function frow(lbl,val,cls){ const v=(val===null||val===undefined||val==='')? '—':val; return '<div class="fr"><span class="fl">'+lbl+'</span><span class="fv '+(v==='—'?'na':(cls||''))+'">'+v+'</span></div>'; }
function evalRitmo(real, obj) {
  if(!real||!obj) return null;
  const p=r=>{ const m=String(r).replace(/[^0-9:]/g,'').match(/(\d+):(\d+)/); return m?parseInt(m[1])*60+parseInt(m[2]):null; };
  const rv=p(real), parts=String(obj).split('-');
  if(parts.length<2) return null;
  const lo=p(parts[0]),hi=p(parts[1]);
  if(!rv||!lo||!hi) return null;
  if(rv<lo) return 'win'; if(rv<=hi) return 'ok'; return 'miss';
}

async function sheetsLoad() {
  syncDot('load');
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),8000);
  try {
    const r=await fetch('https://orion-proxy.felgonino.workers.dev'+'?t='+Date.now(),{signal:ctrl.signal,cache:'no-cache'});
    clearTimeout(t);
    const j=await r.json();
    if(j.ok&&j.data){ CACHE=j.data.filter(x=>x.ID&&x.ID!=='ID'); cacheOk=true; syncDot('ok'); }
    else syncDot('err');
  } catch(e){ clearTimeout(t); syncDot('err'); }
  // Cargar competencias
  try {
    const rc=await fetch('https://orion-proxy.felgonino.workers.dev?tipo=competencias&t='+Date.now());
    const jc=await rc.json();
    if(jc.ok&&jc.data){ COMPETENCIAS=jc.data.filter(function(x){ return x.Nadador && x.Estilo && x.Tiempo; }); }
  } catch(e){}
}

async function sheetsSave(reg) {
  syncDot('load');
  try {
    const r=await fetch('https://orion-proxy.felgonino.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(reg)});
    const j=await r.json();
    if(j.ok){ CACHE.push({ID:reg.id,Fecha:reg.fecha,Nadador:reg.nadador,Sesion_Plan:reg.sesionPlan,Distancia_m:reg.resumen?.distancia_m,Ritmo_100m:reg.resumen?.ritmo_medio,FC_Media:reg.resumen?.fc_media,SWOLF:reg.resumen?.swolf_medio,TE_Aerobico:reg.resumen?.te_aerobico,Carga:reg.resumen?.carga_ejercicio}); syncDot('ok'); return true; }
    syncDot('err'); return false;
  } catch(e){ syncDot('err'); return false; }
}

function toggleBloque(i) {
  const state = S.bloqueStates[i];
  state.hecho = !state.hecho;

  const card = document.getElementById('bcc-' + i);
  const chk  = document.getElementById('bcc-chk-' + i);
  const opts = document.getElementById('bcc-opts-' + i);

  if (state.hecho) {
    card.classList.remove('bcc-omit');
    chk.textContent = '✓';
    chk.classList.remove('bcc-omit-chk');
    opts.style.display = '';
  } else {
    card.classList.add('bcc-omit');
    chk.textContent = '✕';
    chk.classList.add('bcc-omit-chk');
    opts.style.display = 'none';
  }
  updateBloquesSummary();
}

  S.bloqueStates[i].estiloVar = estilo;
  const plan = getSesion(S.sesionPlan);
  const estilos = ['Libre','Espalda','Pecho','Mariposa','Combinado'];
  ['', ...estilos].forEach(e => {
    const btn = document.getElementById('est-' + i + '-' + e);
    if (btn) btn.classList.toggle('on', e === estilo);
  });
}

function setNota(i, val) {
  S.bloqueStates[i].nota = val;

function updateBloquesSummary() {
  const states = S.bloqueStates || [];
  const hechos  = states.filter(s => s.hecho).length;
  const omitidos = states.filter(s => !s.hecho).length;
  const variados = states.filter(s => s.hecho && (s.estiloVar || s.nota)).length;
  const el = document.getElementById('blq-summary');
  if (!el) return;
  if (omitidos === 0 && variados === 0) {
    el.style.background = 'var(--azul-l)'; el.style.color = 'var(--navy)';
    el.textContent = '✅ Todos los bloques realizados según el plan';
  } else {
    let parts = [];
    if (hechos > 0)   parts.push('✅ ' + hechos + ' realizados');
    if (omitidos > 0) parts.push('❌ ' + omitidos + ' omitidos');
    if (variados > 0) parts.push('✏️ ' + variados + ' con variación');
    el.style.background = 'var(--orange-l)'; el.style.color = 'var(--orange)';
    el.textContent = parts.join(' · ');
  }
}

// CARGAR — STEP 3: Claude API
// ═══════════════════════════════════════════════════
async function b64(file) {
  return new Promise(r => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      // Resize to max 1024px and compress to 70% quality
      const MAX = 1024;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      const data = canvas.toDataURL('image/jpeg', 0.7);
      r(data.split(',')[1]);
    };
    img.src = url;
  });
}

async function analizarFotos() {
  if(!S.files.length) return;
  lov(true); setLoad(5,'Preparando imágenes...','Leyendo fotos de Garmin Connect');
  const pasos=[[15,'Preparando imágenes...','Comprimiendo fotos de Garmin'],[30,'Enviando a Claude...','Conexión con servidor ORION'],[50,'Leyendo Estadísticas...','Tiempo, distancia, ritmo, FC'],[65,'Extrayendo dinámica...','Brazadas, SWOLF, cadencia'],[78,'Procesando Vueltas...','Todos los intervalos'],[88,'Calculando Training Effect...','TE aeróbico, anaeróbico, carga'],[94,'Generando análisis...','Comparando con objetivos del plan']];
  let si=0; const iv=setInterval(()=>{if(si<pasos.length){setLoad(...pasos[si]);si++;}},4000);
  try {
    const imgs=[];
    for(const f of S.files){ const d=await b64(f); imgs.push({type:'image',source:{type:'base64',media_type:f.type||'image/jpeg',data:d}}); }
    const plan=getSesion(S.sesionPlan);
    // Build context including what was actually done
  let ctx = 'Sesión libre.';
  if (plan) {
    const states = S.bloqueStates || plan.bloques.map(()=>({hecho:true,estiloVar:'',nota:''}));
    const bloqueInfo = plan.bloques.map((b,i) => {
      const st = states[i];
      if (!st.hecho) return b.tipo + ': OMITIDO';
      let info = b.tipo + ': realizado';
      if (st.estiloVar) info += ' (estilo cambiado a ' + st.estiloVar + ')';
      if (st.nota) info += ' (nota: ' + st.nota + ')';
      if (b.ritmo) info += ' · objetivo ritmo ' + b.ritmo;
      return info;
    });
    const omitidos = plan.bloques.filter((b,i)=>!(states[i]?.hecho)).map(b=>b.tipo);
    ctx = 'Sesion: "'+plan.nombre+'" ('+plan.dia+'). '
      + 'Bloques realizados: ' + bloqueInfo.join(' | ') + '. '
      + (omitidos.length ? 'BLOQUES OMITIDOS: ' + omitidos.join(', ') + '. ' : '')
      + 'Vol planificado: ~' + plan.volumen + 'm (puede ser menor por omisiones).';
  }
    const prompt='Eres analista experto en natación del proyecto ORION Master.\nAnaliza estas pantallas de Garmin Connect (Estadísticas y Vueltas, piscina).\nContexto: '+ctx+'\nNadador: '+S.nadador+'\n\nDevuelve SOLO JSON válido sin texto adicional ni backticks:\n{"resumen":{"tiempo_total":null,"tiempo_movimiento":null,"distancia_m":null,"ritmo_medio":null,"fc_media":null,"fc_max":null,"cadencia_ppm":null,"brazadas_totales":null,"brazada_media_largo":null,"swolf_medio":null,"te_aerobico":null,"te_anaerobico":null,"carga_ejercicio":null,"calorias_totales":null,"velocidad_media_kmh":null},"vueltas":[{"intervalo":1,"tiempo":null,"distancia_m":null,"ritmo":null}],"evaluacion":{"cumple_plan":true,"puntos_positivos":[],"puntos_mejora":[],"para_proxima":[]}}';
    // Add timeout of 55 seconds
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 55000);
    
    const resp=await fetch('https://orion-proxy.felgonino.workers.dev',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      signal: controller.signal,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:[...imgs,{type:'text',text:prompt}]}]})
    });
    clearTimeout(timeoutId);
    clearInterval(iv); setLoad(100,'Análisis completo ✓','');
    if(!resp.ok) throw new Error('API error '+resp.status);
    const data=await resp.json();
    if(!data.ok) throw new Error(data.error||'Error en proxy');
    if(!data.text) throw new Error('Sin texto en respuesta');
    const raw = data.text.trim();
    S.extracted=JSON.parse(raw);
    setTimeout(()=>{ lov(false); renderResultado(); },300);
  } catch(e){ clearInterval(iv); lov(false); toast('❌ Error: '+e.message,4000); }
}

function buildWAMsg(reg, plan, ev) {
  var r = reg.resumen || {};
  var fecha = '';
  try { fecha = new Date(reg.fecha+'T12:00:00').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'}); } catch(e){}
  var emoji = reg.nadador === 'Felipe' ? '(F)' : '(S)';
  var lines = [];
  lines.push('*ORION MASTER* ' + emoji);
  lines.push(reg.nadador + ' - ' + fecha);
  lines.push(plan ? plan.nombre : (reg.sesionPlan||'Libre'));
  lines.push('');
  lines.push('*Metricas*');
  lines.push('Distancia: *' + (r.distancia_m||'-') + 'm*');
  lines.push('Tiempo: *' + (r.tiempo_total||'-') + '*');
  lines.push('Ritmo: *' + (r.ritmo_medio||'-') + '/100m*');
  lines.push('FC media: *' + (r.fc_media||'-') + ' ppm*');
  lines.push('FC max: *' + (r.fc_max||'-') + ' ppm*');
  lines.push('SWOLF: *' + (r.swolf_medio||'-') + '*');
  lines.push('TE aerobico: *' + (r.te_aerobico||'-') + '*  Anaerobico: *' + (r.te_anaerobico||'-') + '*');
  lines.push('Carga: *' + (r.carga_ejercicio||'-') + '*  Calorias: *' + (r.calorias_totales||'-') + '*');

  if (reg.bloqueStates && plan) {
    var omit = plan.bloques.filter(function(b,i){ return !reg.bloqueStates[i] || !reg.bloqueStates[i].hecho; });
    var vari = plan.bloques.filter(function(b,i){ return reg.bloqueStates[i] && reg.bloqueStates[i].hecho && (reg.bloqueStates[i].estiloVar||reg.bloqueStates[i].nota); });
    if (omit.length || vari.length) {
      lines.push('');
      lines.push('*Ajustes al plan*');
      omit.forEach(function(b){ lines.push('x Omitido: ' + b.tipo); });
      vari.forEach(function(b){
        var idx = plan.bloques.indexOf(b);
        var st = reg.bloqueStates[idx];
        lines.push('~ ' + b.tipo + (st.estiloVar?' > '+st.estiloVar:'') + (st.nota?' | '+st.nota:''));
      });
    }
  }

  if (ev) {
    if (ev.puntos_positivos && ev.puntos_positivos.length) {
      lines.push('');
      lines.push('*Logros*');
      ev.puntos_positivos.forEach(function(p){ lines.push('+ ' + p); });
    }
    if (ev.puntos_mejora && ev.puntos_mejora.length) {
      lines.push('');
      lines.push('*A mejorar*');
      ev.puntos_mejora.forEach(function(p){ lines.push('! ' + p); });
    }
    if (ev.para_proxima && ev.para_proxima.length) {
      lines.push('');
      lines.push('*Para la proxima*');
      ev.para_proxima.forEach(function(p){ lines.push('> ' + p); });
    }
  }

  lines.push('');
  lines.push('ID: ' + reg.id + ' | ORION 2026');
  return lines.join('\n');
}

    var mejorRitmo = ritmos.length ? secToRitmo(Math.min.apply(null,ritmos)) : '—';
    var swolfs = sesiones.map(function(r){ return parseFloat(r.SWOLF); }).filter(function(v){ return !isNaN(v); });

    h += '<div class="kpi" style="text-align:center"><div class="kpi-v" style="font-size:18px">'+mejorSwolf+'</div><div class="kpi-l">mejor SWOLF</div></div>';
    h += '</div>';
    h += '<div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:14px">Volumen total: <b>'+(totalDist/1000).toFixed(1)+' km</b></div>';

    // Tabla de evolución
    h += '<div class="lbl">Historial de sesiones</div>';
    h += '<div class="card"><div style="overflow-x:auto"><table class="vtbl"><thead><tr>';
    h += '<th>Fecha</th><th>Dist</th><th>Ritmo</th><th>SWOLF</th><th>FC</th></tr></thead><tbody>';
    sesiones.forEach(function(r){
      var fecha = r.Fecha ? formatShortDate(r.Fecha) : '—';
      h += '<tr><td>'+fecha+'</td><td>'+(r.Distancia_m||'—')+'m</td><td>'+(r.Ritmo_100m||'—')+'</td><td>'+(r.SWOLF||'—')+'</td><td>'+(r.FC_Media||'—')+'</td></tr>';
    });
    h += '</tbody></table></div></div>';

    // Mini tendencia textual
    if (ritmos.length >= 2) {
      var primero = ritmos[ritmos.length-1], ultimo = ritmos[0];
      var dif = primero - ultimo;
      var trend = dif > 0 ? '↗ Mejorando '+Math.abs(Math.round(dif))+'s/100m' : (dif < 0 ? '↘ '+Math.abs(Math.round(dif))+'s más lento' : '→ Estable');

      });
      h += '</div></div>';
    });
  }

  el.innerHTML = h;

function formatShortDate(f) {
  try {
    var d = new Date(f + 'T12:00:00');
    if (isNaN(d)) return f;
    return d.toLocaleDateString('es-CL', {day:'2-digit', month:'short'});
  } catch(e) { return f; }
}

function ritmoToSec(r) {
  if (!r) return null;
  var m = String(r).replace(/[^0-9:]/g,'').match(/(\d+):(\d+)/);
  return m ? parseInt(m[1])*60 + parseInt(m[2]) : null;
}

function secToRitmo(s) {
  var m = Math.floor(s/60), sec = Math.round(s-m*60);
  return m+':'+(sec<10?'0':'')+sec;
}

function compeSet(key, val) {
  COMPE_STATE[key] = val;
  if (key === 'nadador') {
    NADADORES.forEach(function(n){
      var el = document.getElementById('cp-nad-'+n.nombre);
      if(el) el.className = 'pill' + (n.nombre===val ? (n.nombre==='Sergio'?' on-s':' on') : '');
    });
  } else if (key === 'medio') {
    document.getElementById('cp-medio-Piscina').className = 'pill'+(val==='Piscina'?' on':'');
    document.getElementById('cp-medio-Mar').className = 'pill'+(val==='Mar'?' on':'');
  } else if (key === 'estilo') {
    ['Libre','Espalda','Pecho','Mariposa','Combinado','Relevo'].forEach(function(e){
      var el=document.getElementById('cp-est-'+e); if(el) el.classList.toggle('on', e===val);
    });
  } else if (key === 'distancia') {
    ['50','100','200','400','800','1500','2000','3000'].forEach(function(d){
      var el=document.getElementById('cp-d-'+d); if(el) el.classList.toggle('on', d===val);
    });
  }
}

async function guardarCompe() {
  const tiempo = document.getElementById('cp-tiempo').value.trim();
  if (!COMPE_STATE.nadador) { toast('Selecciona el nadador'); return; }
  if (!tiempo) { toast('Ingresa el tiempo'); return; }

  const compe = {
    action: 'competencia',
    nadador: COMPE_STATE.nadador,
    medio: COMPE_STATE.medio,
    estilo: COMPE_STATE.estilo,
    distancia: COMPE_STATE.distancia,
    fecha: document.getElementById('cp-fecha').value || todayStr(),
    tiempo: tiempo,
    nombre: document.getElementById('cp-nombre').value.trim(),
    ritmo: document.getElementById('cp-ritmo').value.trim(),
    fc: document.getElementById('cp-fc').value.trim(),
    posicion: document.getElementById('cp-pos').value.trim(),
    condiciones: document.getElementById('cp-cond').value.trim()
  };

  lov(true); setLoad(50, 'Guardando competencia...', '');
  try {
    const r = await fetch('https://orion-proxy.felgonino.workers.dev', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(compe)
    });
    const j = await r.json();
    lov(false);
    if (j.ok) {
      COMPETENCIAS.push({
        Nadador:compe.nadador, Medio:compe.medio, Estilo:compe.estilo,
        Distancia:compe.distancia, Fecha:compe.fecha, Tiempo:compe.tiempo,
        Nombre:compe.nombre, Ritmo:compe.ritmo, FC:compe.fc,
        Posicion:compe.posicion, Condiciones:compe.condiciones
      });
      toast('✅ Competencia guardada');
      renderCompe();
    } else { toast('Error al guardar'); }
  } catch(e) { lov(false); toast('Error de conexión'); }
}

async function guardarNadador(i) {
  var nombre = document.getElementById('en-nombre').value.trim();
  if (!nombre) { toast('Ingresa el nombre'); return; }

  var pin;
  if (i >= 0) { pin = NADADORES[i].pin; }
  else {
    pin = document.getElementById('en-pin').value.trim();
    if (pin.length !== 4 || isNaN(pin)) { toast('El PIN debe ser 4 dígitos'); return; }
  }

  var colores = ['#0D2B55','#0E6655','#CA6F1E','#6C3483','#C0392B','#1A5276'];
  var emojis = ['🔵','🟢','🟠','🟣','🔴','🔷'];

  function gv(id){ var el=document.getElementById(id); return el?el.value.trim():''; }

  var nad = {
    nombre: nombre, pin: pin,
    color: i>=0 ? NADADORES[i].color : colores[NADADORES.length % colores.length],
    emoji: i>=0 ? NADADORES[i].emoji : emojis[NADADORES.length % emojis.length],
    edad: gv('en-edad'), categoria: gv('en-cat'), anos_exp: gv('en-exp'),
    respiracion: gv('en-resp'), brazada_dom: gv('en-brz'),
    estatura: gv('en-est'), envergadura: gv('en-env'),
    t50_libre: gv('en-t50l'), t50_espalda: gv('en-t50e'), t100_libre: gv('en-t100l'),
    t400_libre: gv('en-t400l'), swolf_ref: gv('en-swolf'),
    oa_ritmo: gv('en-oar'), oa_mejor_dist: gv('en-oad'), oa_condiciones: gv('en-oac'),
    tipo_nadador: gv('en-tipo'), fortaleza: gv('en-fort'), debilidad: gv('en-deb'),
    objetivo: gv('en-obj'), extras: gv('en-extra')
  };

  if (i >= 0) NADADORES[i] = nad;
  else NADADORES.push(nad);

  lov(true); setLoad(50, 'Guardando perfil...', '');
  try {
    await fetch('https://orion-proxy.felgonino.workers.dev', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'nadadores', nadadores: NADADORES })
    });
    lov(false); toast('✅ Perfil guardado');
  } catch(e) { lov(false); toast('Guardado local (sin conexión)'); }
  renderNadadores();
}

  } else if (key === 'estilo') {
    ['Libre','Espalda','Pecho','Mariposa','Combinado','Fondo OA'].forEach(function(e){
      var el=document.getElementById('obj-e-'+e); if(el) el.classList.toggle('on', e===val);
    });
  } else if (key === 'distancia') {
    ['50','100','200','400','800','1500','3000','5000'].forEach(function(d){
      var el=document.getElementById('obj-d-'+d); if(el) el.classList.toggle('on', d===val);
    });
  }
}

async function generarPrograma() {
  var fecha = document.getElementById('obj-fecha').value;
  var sem = document.getElementById('obj-sem').value || '3';
  var dias = document.getElementById('obj-dias').value || '3';
  var notas = document.getElementById('obj-notas') ? document.getElementById('obj-notas').value : '';

  if (!fecha) { toast('Selecciona la fecha meta'); return; }

  // Build context from swimmers profiles + history
  var perfilesTxt = NADADORES.map(function(n){
    var p = n.nombre + ' (' + (n.tipo_nadador||'sin tipo') + '): ';
    var d = [];
    if (n.t50_libre) d.push('50L '+n.t50_libre);
    if (n.t400_libre) d.push('400L '+n.t400_libre);
    if (n.oa_ritmo) d.push('OA '+n.oa_ritmo+'/100');
    if (n.fortaleza) d.push('fuerte: '+n.fortaleza);
    if (n.debilidad) d.push('mejorar: '+n.debilidad);
    return p + d.join(', ');
  }).join(' | ');

  // Recent results summary
  var histTxt = '';
  NADADORES.forEach(function(n){
    var ses = CACHE.filter(function(r){ return r.Nadador===n.nombre; }).slice(-3);
    if (ses.length) {
      histTxt += n.nombre + ' últimas: ' + ses.map(function(s){ return (s.Distancia_m||'?')+'m '+(s.Ritmo_100m||'?')+'/100'; }).join(', ') + '. ';
    }
  });

  lov(true); setLoad(20, 'ORION está diseñando...', 'Analizando perfiles y resultados');
  var pasos=[[40,'Estructurando semanas...','Distribución de cargas'],[60,'Detallando ejercicios...','Series, ritmos, descansos'],[80,'Personalizando por nadador...','Felipe y Sergio'],[92,'Explicando conceptos...','Notas pedagógicas']];
  var si=0; var iv=setInterval(function(){if(si<pasos.length){setLoad(pasos[si][0],pasos[si][1],pasos[si][2]);si++;}},2000);

  var prompt = 'Eres ORION, coach experto de natación master. Genera un programa de entrenamiento completo en JSON.\\n\\n' +
    'OBJETIVO: ' + OBJ.distancia + 'm ' + OBJ.estilo + ', meta ' + fecha + '. ' + sem + ' semanas, ' + dias + ' días/semana, ~60min/sesión.\\n' +
    'NADADORES: ' + perfilesTxt + '\\n' +
    'HISTORIAL: ' + (histTxt||'sin datos previos') + '\\n' +
    (notas ? 'INDICACIONES EXTRA: ' + notas + '\\n' : '') +
    '\\nReglas: entrena por objetivo no volumen. Incluye calentamiento, bloque principal con ritmos objetivo, y afloje. Diferencia metas Felipe (motor, mejorar eficiencia) y Sergio (técnico, mejorar agresividad). Si introduces un ejercicio o concepto nuevo, explícalo simple en el campo desc.\\n\\n' +
    'Devuelve SOLO este JSON sin texto adicional ni backticks:\\n' +
    '{"nombre":"...","subtitulo":"' + OBJ.distancia + 'm ' + OBJ.estilo + '","fechaFin":"' + fecha + '","semanas":[{"id":"S1","nombre":"Semana 1 - ...","sesiones":[{"id":"G1","tipo":"A","nombre":"...","dia":"...","volumen":2000,"intensidad":"🟢 Aeróbico","objetivo":"...","bloques":[{"tipo":"...","desc":"...","mf":"meta Felipe","ms":"meta Sergio","desc2":"descanso","ritmo":"opcional"}]}]}]}';

  try {
    var resp = await fetch('https://orion-proxy.felgonino.workers.dev', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages:[{role:'user', content:prompt}] })
    });
    clearInterval(iv); setLoad(100,'Listo','');
    var data = await resp.json();
    if (!data.ok || !data.text) throw new Error(data.error||'Sin respuesta');
    var prog = JSON.parse(data.text);
    prog.id = 'GEN'+Date.now();
    prog.color = '#CA6F1E';
    prog.activo = false;
    PROGRAMAS_GEN.push(prog);
    lov(false);
    toast('✅ Programa generado');
    renderObjetivos();
  } catch(e) {
    clearInterval(iv); lov(false);
    toast('Error: '+e.message, 4000);
  }
}

function activarProgramaGen(i) {
  var prog = PROGRAMAS_GEN[i];
  // Add to BLOQUES and activate
  BLOQUES.forEach(function(b){ b.activo = false; });
  prog.activo = true;
  // Avoid duplicates
  if (!BLOQUES.find(function(b){ return b.id === prog.id; })) {
    BLOQUES.push(prog);
  }
  toast('✅ Programa activado — míralo en Plan');
  goTab('plan');
}

// Cargar nadadores y competencias desde Sheets, luego mostrar login
async function initApp() {
  await cargarNadadores();
  renderLogin();
  // Cargar datos en background
  sheetsLoad().then(()=>{
    const tab=document.querySelector('.tab.on')?.id?.replace('tab-','');
    if(tab==='hoy'&&USUARIO_ACTUAL) renderHoy();
    if(tab==='historial'&&USUARIO_ACTUAL) renderHistorial();
  }).catch(()=>syncDot('err'));
}

async function cargarNadadores() {
  try {
    const r = await fetch('https://orion-proxy.felgonino.workers.dev?tipo=nadadores&t='+Date.now());
    const j = await r.json();
    if (j.ok && j.nadadores && j.nadadores.length) {
      NADADORES = j.nadadores;
    }
  } catch(e) { /* usa los por defecto */ }
}

initApp();
