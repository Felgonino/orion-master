async function generarPrograma() {
  var fecha = document.getElementById('obj-fecha').value;
  var sem = parseInt(document.getElementById('obj-sem').value || '3');
  var dias = parseInt(document.getElementById('obj-dias').value || '3');
  var notas = document.getElementById('obj-notas') ? document.getElementById('obj-notas').value : '';
  OBJ.fecha=fecha; OBJ.semanas=sem; OBJ.dias=dias; OBJ.notas=notas;
  if(!fecha){toast('Selecciona la fecha de competencia');return;}
  if(!OBJ.pruebas.length){toast('Agrega al menos una prueba');return;}

  var pruebasTxt = OBJ.pruebas.map(function(p){return p.dist+'m '+p.estilo;}).join(', ');
  var perfilesTxt = NADADORES.map(function(n){
    var d=[];
    if(n.t50_libre) d.push('50L:'+n.t50_libre);
    if(n.t400_libre) d.push('400L:'+n.t400_libre);
    if(n.fortaleza) d.push('F:'+n.fortaleza);
    if(n.debilidad) d.push('M:'+n.debilidad);
    return n.nombre+'('+d.join(',')+')';
  }).join('|');

  var histTxt = CACHE.filter(function(r){return r.Ritmo_100m;}).slice(-4)
    .map(function(r){return r.Nadador+':'+r.Distancia_m+'m '+r.Ritmo_100m;}).join(',');

  // Antecedentes acumulados de cada nadador (aprendizajes de análisis previos)
  var antecTxt = '';
  NADADORES.forEach(function(n){
    var lista = ANTECEDENTES_CACHE[n.nombre] || [];
    if (lista.length) antecTxt += n.nombre+': '+lista.join('; ')+'. ';
  });

  lov(true); setLoad(10,'Generando programa...','Semana por semana');

  var todasSemanas = [];
  var todosGlos = [];
  var errorGen = null;

  // Generate one week at a time to stay under 30s limit
  for (var w = 1; w <= sem; w++) {
    setLoad(Math.round(10 + (w-1)/sem*80), 'Generando semana '+w+' de '+sem+'...', pruebasTxt);

    var semanaPrompt =
      'Coach natacion master. Genera SOLO la semana '+w+' de '+sem+' de un programa de entrenamiento. ' +
      'Pruebas objetivo: '+pruebasTxt+'. Competencia: '+fecha+'. '+dias+' sesiones esta semana. ~2200m/sesion. ' +
      'Nadadores: '+perfilesTxt+'. Historial: '+(histTxt||'ninguno')+'. ' +
      (antecTxt?'ANTECEDENTES a considerar (aprendizajes de sesiones previas): '+antecTxt+' ':'')+
      (notas?notas+'. ':'')+
      'Felipe: mejorar DPS/eficiencia. Sergio: mejorar agresividad/cierre. ' +
      'ESTRUCTURA: calentamiento 300-400m + principal 1400-1600m + afloje 200m. ' +
      'JSON solo la semana, sin texto extra: ' +
      '{"semana_num":'+w+',"nombre":"Semana '+w+' - descripcion","glosario_nuevos":[],' +
      '"sesiones":[{"id":"G'+w+'1","tipo":"A","nombre":"...","dia":"Lun...","intensidad":"Aerobico","objetivo":"...","rationale":"...",' +
      '"bloques":[{"tipo":"Calentamiento","series":[{"reps":1,"dist":300,"estilo":"Libre","implemento":"","salida":"","descanso":""}],"descanso_bloque":"","mf":"...","ms":"...","ritmo":""},' +
      '{"tipo":"Principal","series":[{"reps":5,"dist":200,"estilo":"Libre","implemento":"","salida":"2:30","descanso":""}],"descanso_bloque":"30seg","mf":"...","ms":"...","ritmo":"1:45/100"},' +
      '{"tipo":"Afloje","series":[{"reps":1,"dist":200,"estilo":"Libre","implemento":"","salida":"","descanso":""}],"descanso_bloque":"","mf":"...","ms":"...","ritmo":""}]}]}';

    try {
      var resp = await fetch('https://orion-proxy.felgonino.workers.dev',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:[{role:'user',content:semanaPrompt}]})
      });
      var data = await resp.json();
      if(!data.ok||!data.text) throw new Error(data.error||'Sin respuesta semana '+w);
      var raw=data.text.trim();
      var s=raw.indexOf('{'), e2=raw.lastIndexOf('}');
      if(s<0||e2<0) throw new Error('JSON invalido semana '+w);
      var semData = JSON.parse(raw.substring(s,e2+1));

      // Fix session IDs to be unique
      (semData.sesiones||[]).forEach(function(ses,i){
        ses.id = 'G'+w+'S'+(i+1);
        var di = calcDistSesion(ses);
        ses.volumen = di ? di.total : 0;
      });

      todasSemanas.push({
        id: 'S'+w,
        nombre: semData.nombre || 'Semana '+w,
        sesiones: semData.sesiones || []
      });
      todosGlos = todosGlos.concat(semData.glosario_nuevos||[]);
    } catch(e) {
      errorGen = e.message;
      break;
    }
  }

  setLoad(95,'Finalizando...','');

  if (errorGen) {
    lov(false);
    toast('Error semana: '+errorGen, 5000);
    return;
  }

  var prog = {
    id: 'GEN'+Date.now(),
    nombre: 'Plan '+pruebasTxt,
    subtitulo: pruebasTxt+' · '+fecha,
    fechaFin: fecha,
    color: '#CA6F1E',
    activo: false,
    semanas: todasSemanas
  };

  var glosAdd = agregarTerminosGlosario(todosGlos);
  PROGRAMAS_GEN.push(prog);
  lov(false);
  toast(glosAdd ? 'Programa generado (glosario actualizado)' : 'Programa generado');
  renderObjetivos();
}


function activarProgramaGen(i) {
  var prog=PROGRAMAS_GEN[i];
  BLOQUES.forEach(function(b){b.activo=false;});
  prog.activo=true;
  if(!BLOQUES.find(function(b){return b.id===prog.id;})) BLOQUES.push(prog);
  toast('Programa activado en Plan');
  goTab('plan');
}

// IMPRIMIR SESIÓN — ventana de impresión / PDF
// ═══════════════════════════════════════════════════
function imprimirSesion(id) {
  var s=BLOQUES.flatMap(function(b){return b.semanas.flatMap(function(w){return w.sesiones;});}).find(function(x){return x.id===id;});
  if(!s){toast('Sesión no encontrada');return;}
  var di=calcDistSesion(s), tot=di?di.total+'m':'';

  // Build WhatsApp text summary
  var waTxt = 'ORION Master - '+s.nombre+'\n'+s.dia+(tot?' | '+tot:'')+'\nObjetivo: '+s.objetivo+'\n\n';
  s.bloques.forEach(function(b,i){
    var dB=calcDistBloque(b);
    waTxt+=(i+1)+'. '+b.tipo+(dB?' ('+dB+'m)':'')+'\n';
    if(b.series&&b.series.length){
      b.series.forEach(function(sr){
        var t=(sr.reps>1?sr.reps+'x'+sr.dist+'m':sr.dist+'m')+' '+sr.estilo;
        if(sr.implemento)t+=' ('+sr.implemento+')';
        if(sr.salida)t+=' @'+sr.salida;
        if(sr.descanso)t+=' desc.'+sr.descanso;
        waTxt+='   - '+t+'\n';
      });
    } else if(b.desc) waTxt+='   '+b.desc+'\n';
    if(b.ritmo)waTxt+='   Ritmo: '+b.ritmo+'\n';
    waTxt+='\n';
  });
  if(tot)waTxt+='Total: '+tot;
  var waUrl='https://wa.me/?text='+encodeURIComponent(waTxt);

  // Build PDF HTML - everything escaped to not break script
  var p=[];
  p.push('<!DOCTYPE html><html><head><meta charset="UTF-8">');
  p.push('<title>ORION - '+s.nombre+'<\/title>');
  p.push('<style>');
  p.push('*{box-sizing:border-box;margin:0;padding:0}');
  p.push('body{font-family:Arial,sans-serif;font-size:13pt;color:#1B2631;padding:10mm 12mm}');
  p.push('@media print{@page{size:letter portrait;margin:8mm 10mm}.no-print{display:none!important}body{font-size:12pt;padding:0}}');
  p.push('.no-print{margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap}');
  p.push('button{padding:8px 16px;border:none;border-radius:7px;font-size:12pt;cursor:pointer}');
  p.push('.badge{background:#0D2B55;color:#fff;display:inline-block;padding:2px 10px;border-radius:4px;font-size:10pt;font-weight:700;letter-spacing:1px;margin-bottom:4px}');
  p.push('h1{font-size:17pt;color:#0D2B55;margin:3px 0 2px;line-height:1.2}');
  p.push('.meta{font-size:11pt;color:#666;margin-bottom:7px}');
  p.push('.obj{background:#EBF5FB;border-left:4px solid #0D2B55;padding:7px 11px;border-radius:3px;margin-bottom:8px;font-size:12pt;line-height:1.3}');
  p.push('.blq{border:1.5px solid #BDC3C7;border-radius:6px;margin-bottom:8px;page-break-inside:avoid}');
  p.push('.bh{background:#D6EAF8;padding:6px 11px;font-size:13pt;font-weight:700;color:#0D2B55;border-radius:4px 4px 0 0;display:flex;justify-content:space-between;align-items:center}');
  p.push('.bb{padding:6px 11px}');
  p.push('.ser{font-size:13pt;padding:4px 0;border-bottom:1px solid #EEE;line-height:1.4}');
  p.push('.ser:last-child{border-bottom:none}');
  p.push('.rtag{background:#0D2B55;color:#fff;border-radius:3px;padding:1px 8px;font-size:11pt;font-weight:700}');
  p.push('.sd{font-size:11pt;color:#5D6D7E;margin-left:5px}');
  p.push('.desc-b{font-size:11pt;color:#888;font-style:italic;margin-top:4px}');
  p.push('.tot{text-align:right;font-size:14pt;font-weight:700;color:#0D2B55;margin-top:8px;border-top:2.5px solid #0D2B55;padding-top:7px}');
  p.push('.foot{margin-top:10px;font-size:10pt;color:#AAA;text-align:center;border-top:1px solid #EEE;padding-top:6px}');
  p.push('<\/style><\/head><body>');

  // Action buttons
  p.push('<div class="no-print">');
  p.push('<button style="background:#0D2B55;color:#fff" onclick="window.print()">&#x1F5A8; Imprimir \/ Guardar PDF<\/button>');
  p.push('<button style="background:#25D366;color:#fff" onclick="window.open(\''+waUrl+'\')">&#x1F4F1; WhatsApp<\/button>');
  p.push('<button style="background:#E5E8E8;color:#333" onclick="window.close()">&#x2715; Cerrar<\/button>');
  p.push('<\/div>');

  // Header
  p.push('<div class="badge">ORION MASTER<\/div>');
  p.push('<h1>'+s.nombre+'<\/h1>');
  p.push('<div class="meta">'+s.dia+(tot?' &bull; '+tot:'')+(s.intensidad?' &bull; '+s.intensidad:'')+'<\/div>');
  p.push('<div class="obj"><b>Objetivo:<\/b> '+s.objetivo+'<\/div>');

  // Bloques with full detail
  s.bloques.forEach(function(b,i){
    var dB=calcDistBloque(b);
    p.push('<div class="blq">');
    p.push('<div class="bh"><span>'+(i+1)+'. '+b.tipo+(dB?' &mdash; '+dB+'m':'')+'<\/span>'+(b.ritmo?'<span class="rtag">'+b.ritmo+'<\/span>':'')+'<\/div>');
    p.push('<div class="bb">');
    if(b.series&&b.series.length){
      b.series.forEach(function(sr){
        p.push('<div class="ser">');
        p.push('<b>'+(sr.reps>1?sr.reps+'&times;'+sr.dist+'m':sr.dist+'m')+'<\/b> '+sr.estilo);
        if(sr.implemento)p.push(' <span class="sd">('+sr.implemento+')<\/span>');
        var ts=[];
        if(sr.salida)ts.push('salida @'+sr.salida);
        if(sr.descanso)ts.push('desc. '+sr.descanso);
        if(ts.length)p.push('<span class="sd"> &mdash; '+ts.join(' &middot; ')+'<\/span>');
        p.push('<\/div>');
      });
    } else if(b.desc){
      p.push('<div class="ser">'+b.desc+'<\/div>');
    }
    if(b.descanso_bloque&&b.descanso_bloque!=='—'){
      p.push('<div class="desc-b">&#x23F8; Descanso entre bloques: '+b.descanso_bloque+'<\/div>');
    }
    p.push('<\/div><\/div>');
  });

  if(tot)p.push('<div class="tot">Distancia total: '+tot+'<\/div>');
  p.push('<div class="foot">ORION Master &bull; '+new Date().toLocaleDateString('es-CL')+'<\/div>');
  p.push('<\/body><\/html>');

  var v=window.open('','_blank','width=880,height=800');
  if(v){v.document.write(p.join(''));v.document.close();}
  else toast('Permite ventanas emergentes para imprimir',3000);
}

// Cargar nadadores y competencias desde Sheets, luego mostrar login
async function initApp() {
  await cargarNadadores();
  renderLogin();
  // Cargar datos en background
  sheetsLoad().then(()=>{
    const tab=document.querySelector('.tab.on')?.id?.replace('tab-','');
    if(tab==='hoy'&&USUARIO_ACTUAL) renderHoy();
    if(tab==='historial'&&USUARIO_ACTUAL) renderHistorial();
  }).catch(()=>syncDot('err'));
  cargarAntecedentes();
}

async function cargarNadadores() {
  try {
    const r = await fetch('https://orion-proxy.felgonino.workers.dev?tipo=nadadores&t='+Date.now());
    const j = await r.json();
    if (j.ok && j.nadadores && j.nadadores.length) {
      NADADORES = j.nadadores;
    }
  } catch(e) { /* usa los por defecto */ }
  // Cargar glosario
  try {
    const rg = await fetch('https://orion-proxy.felgonino.workers.dev?tipo=glosario&t='+Date.now());
    const jg = await rg.json();
    if (jg.ok && jg.glosario && jg.glosario.length) {
      // Fusionar con los base sin duplicar
      jg.glosario.forEach(function(g){
        if (!GLOSARIO.find(function(x){ return x.termino.toLowerCase() === (g.termino||'').toLowerCase(); })) {
          GLOSARIO.push(g);
        }
      });
    }
  } catch(e) { /* usa los base */ }
}

initApp();
