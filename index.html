<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D2B55">
<title>ORION Master</title>
<style>
:root{
  --navy:#0D2B55;--azul:#1A5276;--azul-l:#D6EAF8;
  --teal:#0E6655;--teal-l:#D1F2EB;
  --orange:#CA6F1E;--orange-l:#FAD7A0;
  --purple:#6C3483;--gold:#F9E79F;
  --gray:#F4F6F7;--gray2:#E5E8E8;--border:#D5D8DC;
  --text:#1B2631;--text2:#566573;--text3:#AAB7B8;
  --white:#FFFFFF;--green:#1E8449;--green-l:#D5F5E3;
  --red:#C0392B;--red-l:#FADBD8;
  --r:12px;--sh:0 2px 12px rgba(13,43,85,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:-webkit-fill-available;background:#F0F2F5;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;color:var(--text)}
.app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;overflow:hidden}
/* topbar */
.tb{background:var(--navy);color:#fff;padding:14px 16px 10px;padding-top:max(14px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tb-logo{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.tb-t{font-size:15px;font-weight:600}.tb-s{font-size:11px;opacity:.7}
.sdot{width:8px;height:8px;border-radius:50%;background:#AAB7B8;margin-left:auto;flex-shrink:0;transition:background .3s}
.sdot.ok{background:#2ECC71}.sdot.err{background:var(--red)}.sdot.load{background:#F39C12;animation:bk .8s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
/* tabs */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1 0 auto;min-width:60px;padding:10px 8px 8px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap}
.tab.on{color:var(--navy);border-bottom-color:var(--navy)}
.tab em{display:block;font-size:17px;font-style:normal;margin-bottom:1px}
/* content */
.cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.cnt::-webkit-scrollbar{display:none}
.pg{display:none;padding:14px}
.pg.on{display:block}
/* cards */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden}
.ch{padding:12px 14px;border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:8px}
.ch h3{font-size:13px;font-weight:600;color:var(--text);flex:1}
.cb{padding:12px 14px}
/* badges */
.bx{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bf{background:var(--azul-l);color:var(--navy)}.bs{background:var(--teal-l);color:var(--teal)}
.bw{background:var(--orange-l);color:var(--orange)}.bg{background:var(--green-l);color:var(--green)}
/* layout */
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
/* pills */
.pill{padding:10px 8px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);cursor:pointer;text-align:center}
.pill.on{border-color:var(--navy);background:var(--azul-l)}
.pill.on-s{border-color:var(--teal);background:var(--teal-l)}
.pill em{font-size:20px;display:block;margin-bottom:3px;font-style:normal}
.pill b{font-size:12px;font-weight:600;display:block;color:var(--text)}
.pill small{font-size:10px;color:var(--text3)}
/* fields */
.fr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gray2)}
.fr:last-child{border-bottom:none}
.fl{font-size:12px;color:var(--text2)}
.fv{font-size:12px;font-weight:600;color:var(--text)}
.fv.ok{color:var(--green)}.fv.win{color:var(--green)}.fv.miss{color:var(--red)}.fv.na{color:var(--text3);font-weight:400;font-style:italic}
/* labels */
.lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
/* buttons */
.btn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{opacity:.8}.btn:disabled{opacity:.35;cursor:default}
.btn.tl{background:var(--teal)}
.btn2{width:100%;padding:12px;background:transparent;color:var(--text);border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
/* upload */
.upz{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;background:var(--gray);position:relative}
.upz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upz em{font-size:28px;display:block;margin-bottom:8px;font-style:normal}
.upz p{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:3px}
.upz span{font-size:11px;color:var(--text3)}
/* thumbs */
.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.thumb{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:9/16;border:1px solid var(--border)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-rm{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(0,0,0,.6);border-radius:50%;border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* session cards */
.sc{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;border-left:4px solid var(--gray2)}
.sc.ta{border-left-color:var(--navy)}.sc.tb2{border-left-color:var(--purple)}.sc.tc{border-left-color:var(--orange)}.sc.done{border-left-color:var(--green);opacity:.8}
.sc-h{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.sc-h h4{font-size:13px;font-weight:600;flex:1}
.sc-d{font-size:11px;color:var(--text3)}
.sc-b{padding:0 14px 12px;display:none}
.sc-b.open{display:block}
/* bloques entrenamiento */
.blq{background:var(--gray);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.blq-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px}
.blq-d{font-size:12px;color:var(--text);line-height:1.5}
.blq-f{font-size:11px;color:var(--navy);font-weight:600;margin-top:4px}
.blq-s{font-size:11px;color:var(--teal);font-weight:600}
/* compare */
.cmp-r{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;align-items:center}
/* vueltas */
.vtbl{width:100%;border-collapse:collapse;font-size:11px}
.vtbl th{background:var(--gray);padding:6px 8px;text-align:right;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border)}
.vtbl th:first-child{text-align:left}
.vtbl td{padding:5px 8px;text-align:right;border-bottom:1px solid var(--gray2);color:var(--text)}
.vtbl td:first-child{text-align:left;color:var(--text2)}
.vtbl tr.tot td{font-weight:700;color:var(--navy);background:var(--azul-l)}
/* kpi */
.kpig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi{background:var(--white);border-radius:10px;padding:12px;box-shadow:var(--sh)}
.kpi-v{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.kpi-v.s{color:var(--teal)}
.kpi-l{font-size:11px;color:var(--text3);margin-top:3px}
/* success */
.ok-box{text-align:center;padding:30px 16px 20px}
.ok-ico{width:56px;height:56px;background:var(--green-l);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px}
.ok-t{font-size:18px;font-weight:700;margin-bottom:6px}
.ok-s{font-size:13px;color:var(--text2);line-height:1.6}
/* misc */
.itag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;background:var(--gray);color:var(--text2);border:1px solid var(--gray2);margin:2px}
.note{background:var(--gold);border-radius:8px;padding:10px 12px;font-size:12px;color:#7D6608;line-height:1.5;margin-bottom:10px}
.div{height:1px;background:var(--gray2);margin:10px 0}
/* loading overlay */
#lov{display:none;position:fixed;inset:0;background:rgba(13,43,85,.88);z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#lov.on{display:flex}
.lo-i{font-size:38px;margin-bottom:16px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.lo-m{font-size:16px;font-weight:600;color:#fff;text-align:center;margin-bottom:6px}
.lo-s{font-size:13px;color:rgba(255,255,255,.7);text-align:center;margin-bottom:20px}
.lo-p{width:100%;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.lo-f{height:100%;background:#5DADE2;border-radius:2px;transition:width .5s ease}
/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1B2631;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}

/* bloque checklist */
.blq-check-card{background:var(--white);border-radius:10px;box-shadow:var(--sh);margin-bottom:8px;overflow:hidden;border-left:4px solid var(--green);}
.blq-check-card.bcc-omit{border-left-color:var(--red);opacity:.6;}
.bcc-hdr{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;cursor:pointer;}
.bcc-check{width:24px;height:24px;border-radius:6px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px;}
.bcc-check.bcc-omit-chk{background:var(--red);}
.bcc-tipo{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.bcc-desc{font-size:11px;color:var(--text2);line-height:1.4;}
.bcc-opts{padding:0 14px 12px;border-top:1px solid var(--gray2);}
.estilo-btn{padding:5px 10px;border-radius:16px;border:1px solid var(--border);background:var(--white);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;margin:0;}
.estilo-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.nota-inp{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;color:var(--text);background:var(--gray);outline:none;}
.nota-inp:focus{border-color:var(--navy);background:var(--white);}

/* bloque switcher */
.bsw{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.bsw button{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:var(--white);color:var(--text2)}
.bsw button.on{color:#fff}
/* bloque header */
.bl-hdr{border-radius:10px;padding:12px 14px;margin-bottom:12px;color:#fff}

/* ── LOGIN PIN ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(160deg,#0D2B55,#1A5276);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#login-screen.hidden{display:none}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.login-sub{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:28px}
.login-who{font-size:13px;color:rgba(255,255,255,.85);margin-bottom:12px;font-weight:500}
.login-swimmers{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px;max-width:340px}
.login-sw-btn{padding:10px 16px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.login-sw-btn.on{background:#fff;color:#0D2B55;border-color:#fff}
.pin-display{display:flex;gap:12px;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.4);background:transparent}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:14px}
.pin-key{width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:24px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pin-key:active{background:rgba(255,255,255,.25)}
.pin-key.fn{font-size:14px}
.login-err{color:#FADBD8;font-size:13px;margin-top:16px;height:18px}
.login-hint{color:rgba(255,255,255,.5);font-size:11px;margin-top:20px;text-align:center;max-width:280px;line-height:1.5}

</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">🌊</div>
  <div class="login-title">ORION Master</div>
  <div class="login-sub">Felipe &amp; Sergio · 2026</div>
  <div class="login-who" id="login-who">¿Quién eres?</div>
  <div class="login-swimmers" id="login-swimmers"></div>
  <div class="pin-display" id="pin-display" style="display:none">
    <div class="pin-dot" id="pd-0"></div>
    <div class="pin-dot" id="pd-1"></div>
    <div class="pin-dot" id="pd-2"></div>
    <div class="pin-dot" id="pd-3"></div>
  </div>
  <div class="pin-pad" id="pin-pad" style="display:none"></div>
  <div class="login-err" id="login-err"></div>
  <div class="login-hint" id="login-hint"></div>
</div>

<div class="app">
  <div class="tb">
    <div class="tb-logo">🌊</div>
    <div><div class="tb-t">ORION Master</div><div class="tb-s">Felipe &amp; Sergio · 2026</div></div>
    <div id="sdot" class="sdot" title="Sincronización"></div>
    <button id="btn-logout" onclick="cerrarSesion()" style="display:none;background:rgba(255,255,255,.12);border:none;color:#fff;padding:6px 10px;border-radius:8px;font-size:14px;cursor:pointer;margin-left:8px" title="Cerrar sesión">⏻</button>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-hoy"      onclick="goTab('hoy')"><em>📅</em>Hoy</button>
    <button class="tab"   id="tab-plan"      onclick="goTab('plan')"><em>🏊</em>Plan</button>
    <button class="tab"   id="tab-cargar"    onclick="goTab('cargar')"><em>📤</em>Cargar</button>
    <button class="tab"   id="tab-compe"     onclick="goTab('compe')"><em>🏆</em>Compet.</button>
    <button class="tab"   id="tab-historial" onclick="goTab('historial')"><em>📈</em>Historial</button>
    <button class="tab"   id="tab-objetivos" onclick="goTab('objetivos')"><em>🎯</em>Objetivos</button>
    <button class="tab"   id="tab-glosario"  onclick="goTab('glosario')"><em>📖</em>Glosario</button>
    <button class="tab"   id="tab-nadadores" onclick="goTab('nadadores')"><em>👤</em>Equipo</button>
  </div>
  <div class="cnt">
    <div class="pg on" id="pg-hoy"></div>
    <div class="pg"    id="pg-plan"></div>
    <div class="pg"    id="pg-cargar"></div>
    <div class="pg"    id="pg-compe"></div>
    <div class="pg"    id="pg-historial"></div>
    <div class="pg"    id="pg-objetivos"></div>
    <div class="pg"    id="pg-glosario"></div>
    <div class="pg"    id="pg-nadadores"></div>
  </div>
</div>
<div id="lov"><div class="lo-i">🔍</div><div class="lo-m" id="lo-m">Procesando...</div><div class="lo-s" id="lo-s"></div><div class="lo-p"><div class="lo-f" id="lo-f" style="width:5%"></div></div></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzY1k8yoabejGIhc03oYtHsVfDFQxkBxFq9ye9osTK0ThJcSXu1aUXXjnkTjz8JUEGMhQ/exec';

// ═══════════════════════════════════════════════════
// LOGIN PIN
// ═══════════════════════════════════════════════════
let loginSel = null;
let pinBuffer = '';

function renderLogin() {
  const cont = document.getElementById('login-swimmers');
  cont.innerHTML = '';
  NADADORES.forEach((n, i) => {
    const btn = document.createElement('button');
    btn.className = 'login-sw-btn';
    btn.textContent = n.emoji + ' ' + n.nombre;
    btn.onclick = () => selLoginSwimmer(i);
    cont.appendChild(btn);
  });
  // hint about default PINs (solo primera vez)
  document.getElementById('login-hint').textContent = 'Ingresa con tu PIN personal';
}

function selLoginSwimmer(i) {
  loginSel = i;
  pinBuffer = '';
  document.querySelectorAll('.login-sw-btn').forEach((b,idx) => b.classList.toggle('on', idx===i));
  document.getElementById('login-who').textContent = 'Ingresa tu PIN, ' + NADADORES[i].nombre;
  document.getElementById('pin-display').style.display = 'flex';
  document.getElementById('pin-pad').style.display = 'grid';
  document.getElementById('login-hint').style.display = 'none';
  renderPinPad();
  updatePinDots();
}

function renderPinPad() {
  const pad = document.getElementById('pin-pad');
  pad.innerHTML = '';
  const keys = ['1','2','3','4','5','6','7','8','9','C','0','OK'];
  keys.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'pin-key' + (k==='C'||k==='OK' ? ' fn' : '');
    btn.textContent = k;
    btn.onclick = () => pinKey(k);
    pad.appendChild(btn);
  });
}

function pinKey(k) {
  if (k === 'C') { pinBuffer = pinBuffer.slice(0,-1); }
  else if (k === 'OK') { checkPin(); return; }
  else if (pinBuffer.length < 4) { pinBuffer += k; }
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 200);
}

function updatePinDots() {
  for (let i=0; i<4; i++) {
    document.getElementById('pd-'+i).classList.toggle('filled', i < pinBuffer.length);
  }
}

function cerrarSesion() {
  USUARIO_ACTUAL = null;
  loginSel = null;
  pinBuffer = '';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('pin-display').style.display = 'none';
  document.getElementById('pin-pad').style.display = 'none';
  document.getElementById('login-hint').style.display = 'block';
  document.getElementById('login-who').textContent = '¿Quién eres?';
  document.getElementById('login-err').textContent = '';
  renderLogin();
}

function checkPin() {
  if (loginSel === null) return;
  const n = NADADORES[loginSel];
  if (pinBuffer === n.pin) {
    USUARIO_ACTUAL = n.nombre;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('btn-logout').style.display = 'block';
    document.querySelector('.tb-s').textContent = n.emoji + ' ' + n.nombre + ' · 2026';
    goTab('hoy');
  } else {
    document.getElementById('login-err').textContent = 'PIN incorrecto';
    pinBuffer = '';
    updatePinDots();
    setTimeout(() => document.getElementById('login-err').textContent = '', 2000);
  }
}

function getBloqueActivo() { return BLOQUES.find(b=>b.activo)||BLOQUES[0]; }

function todayStr() { const d=new Date(); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function z(n){ return String(n).padStart(2,'0'); }
function genId(nad) {
  const d=new Date(); const ds=d.getFullYear()+z(d.getMonth()+1)+z(d.getDate());
  const idx=CACHE.filter(r=>r.Fecha===ds&&r.Nadador===nad).length+1;
  return ds+'_'+z(idx)+(nad==='Felipe'?'F':'S');
}
function scClass(tipo){ return {A:'ta',B:'tb2',C:'tc'}[tipo]||''; }

// ═══════════════════════════════════════════════════
// MODELO ESTRUCTURADO DE BLOQUES + cálculo de distancias
// ═══════════════════════════════════════════════════
// Un bloque puede tener "series": [{reps, dist, estilo, implemento, salida, descanso}]
// La distancia del bloque = suma de reps*dist de todas las series.
// Si no tiene series (bloque antiguo con solo desc), se intenta extraer de la desc.

function calcDistBloque(b) {
  // Solo cálculo EXACTO desde estructura. Nunca adivinar del texto.
  if (b.series && b.series.length) {
    return b.series.reduce(function(t, s){
      var reps = parseInt(s.reps) || 1;
      var dist = parseInt(s.dist) || 0;
      return t + reps * dist;
    }, 0);
  }
  if (b.dist_total != null && b.dist_total !== '') return parseInt(b.dist_total) || 0;
  // Sin estructura: distancia desconocida (null), no se adivina
  return null;
}

function calcDistSesion(sesion) {
  if (!sesion || !sesion.bloques) return null;
  var total = 0;
  var hayDato = false;
  var completo = true;
  sesion.bloques.forEach(function(b){
    var d = calcDistBloque(b);
    if (d === null) { completo = false; }
    else { total += d; hayDato = true; }
  });
  if (!hayDato) return null;
  // total parcial si algún bloque no tiene dato; marcamos con flag
  return { total: total, completo: completo };
}

// Formatea la estructura de un bloque a texto legible
function fmtEstructura(b) {
  if (b.series && b.series.length) {
    return b.series.map(function(s){
      var txt = (s.reps && s.reps > 1 ? s.reps + '×' : '') + s.dist + 'm';
      if (s.estilo) txt += ' ' + s.estilo;
      if (s.implemento) txt += ' (' + s.implemento + ')';
      var tiempos = [];
      if (s.salida) tiempos.push('salida ' + s.salida);
      if (s.descanso) tiempos.push('desc ' + s.descanso);
      if (tiempos.length) txt += ' · ' + tiempos.join(', ');
      return txt;
    }).join('  +  ');
  }
  return b.desc || '';
}
function toast(msg,ms=2500){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),ms); }
function setLoad(pct,msg,sub){ document.getElementById('lo-f').style.width=pct+'%'; document.getElementById('lo-m').textContent=msg; document.getElementById('lo-s').textContent=sub||''; }
function lov(show){ document.getElementById('lov').classList[show?'add':'remove']('on'); }
function syncDot(st){ const d=document.getElementById('sdot'); d.className='sdot '+st; }
function frow(lbl,val,cls){ const v=(val===null||val===undefined||val==='')? '—':val; return '<div class="fr"><span class="fl">'+lbl+'</span><span class="fv '+(v==='—'?'na':(cls||''))+'">'+v+'</span></div>'; }
function evalRitmo(real, obj) {
  if(!real||!obj) return null;
  const p=r=>{ const m=String(r).replace(/[^0-9:]/g,'').match(/(\d+):(\d+)/); return m?parseInt(m[1])*60+parseInt(m[2]):null; };
  const rv=p(real), parts=String(obj).split('-');
  if(parts.length<2) return null;
  const lo=p(parts[0]),hi=p(parts[1]);
  if(!rv||!lo||!hi) return null;
  if(rv<lo) return 'win'; if(rv<=hi) return 'ok'; return 'miss';
}

async function sheetsLoad() {

  try {
    const r=await fetch('https://orion-proxy.felgonino.workers.dev'+'?t='+Date.now(),{signal:ctrl.signal,cache:'no-cache'});

      CACHE=j.data.filter(x=>x.ID&&x.ID!=='ID'&&x.Nadador);

      syncDot('ok'); 
      // Preselect historial to current user if logged in
      if(USUARIO_ACTUAL && !HIST_NAD) HIST_NAD = USUARIO_ACTUAL;
    }

  try {

function renderHoy() {
  const today=todayStr();

  const fStr=new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const days=Math.ceil((new Date(bl.fechaFin)-new Date())/(864e5));
  const daysStr=days>0?days+' días':days===0?'¡Hoy!':'Finalizado';

  const sesF=CACHE.filter(r=>r.Nadador==='Felipe').length;
  const sesS=CACHE.filter(r=>r.Nadador==='Sergio').length;

  let h='<div style="padding:2px 2px 8px;font-size:13px;font-weight:600;color:var(--text2)">'+fStr.charAt(0).toUpperCase()+fStr.slice(1)+'</div>';

  // Bloque activo banner

  h+='<div style="text-align:right;flex-shrink:0"><div style="font-size:20px;font-weight:700">'+(days>0?days:'🏆')+'</div><div style="font-size:10px;opacity:.8">'+(days>0?'días':'')+' </div></div></div>';

  // KPIs
  h+='<div class="kpig" style="margin-bottom:14px"><div class="kpi"><div class="kpi-v">'+sesF+'</div><div class="kpi-l">Sesiones Felipe</div></div><div class="kpi"><div class="kpi-v s">'+sesS+'</div><div class="kpi-l">Sesiones Sergio</div></div></div>';

  // Sesión de hoy
  if(sesHoy) {
    const comp=completadas(sesHoy.id);
    h+='<div class="card"><div class="ch" style="background:'+bl.color+';color:#fff"><div style="font-size:18px">🏊</div><h3 style="color:#fff">'+sesHoy.nombre+'</h3><span class="bx" style="background:rgba(255,255,255,.25);color:#fff">HOY</span></div>';
    h+='<div class="cb"><p style="font-size:13px;color:var(--text2);margin-bottom:10px">'+sesHoy.objetivo+'</p>';
    h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"><span class="itag">📏 ~'+sesHoy.volumen+'m</span><span class="itag">'+sesHoy.intensidad+'</span><span class="itag">'+comp.length+'/2 completadas</span></div>';
    comp.forEach(c=>{h+='<div style="background:var(--green-l);border-radius:8px;padding:7px 10px;font-size:12px;margin-bottom:6px">✅ <b>'+c.Nadador+'</b>: '+(c.Distancia_m||'?')+'m · '+(c.Ritmo_100m||'?')+'/100m</div>';});
    h+='<button class="btn" onclick="iniciarDesde(\''+sesHoy.id+'\')">📤 Cargar resultado</button>';
    h+='<button class="btn2" onclick="goTab(\'plan\')">👁 Ver programa completo</button></div></div>';
  } else {
    h+='<div class="note">📅 No hay sesión programada exactamente hoy. Selecciona una pendiente abajo.</div>';
  }

  // Pendientes
  if(pendientes.length) {
    h+='<div class="lbl" style="margin-top:4px">Pendientes este bloque</div>';
    pendientes.forEach(s=>{
      const c=completadas(s.id).length;
      const badge=c===0?'<span class="bx" style="background:var(--red-l);color:var(--red)">Pendiente</span>':'<span class="bx bw">'+c+'/2</span>';
      h+='<div class="sc '+scClass(s.tipo)+'" onclick="iniciarDesde(\''+s.id+'\')" style="cursor:pointer;margin-bottom:8px"><div class="sc-h"><div><h4>'+s.nombre+'</h4><div class="sc-d">'+s.dia+' · '+s.intensidad+'</div></div>'+badge+'</div></div>';
    });
  }

  // Pendientes de resultados
  var pendientes2 = CACHE.filter(function(r){ return r.Pendiente==='SI' || r.Pendiente===true; });
  if (pendientes2.length) {
    h += '<div class="lbl" style="margin-top:4px;color:var(--orange)">⏳ Pendientes de resultados</div>';
    pendientes2.forEach(function(r){
      var planN = getSesion(r.Sesion_Plan);
      var emoji = r.Nadador==='Felipe'?'🔵':'🟢';
      h += '<div class="card" style="margin-bottom:8px;border-left:4px solid var(--orange)"><div class="cb">';
      h += '<div style="display:flex;align-items:center;gap:8px"><span class="bx bw">'+emoji+' '+r.Nadador+'</span>';
      h += '<span style="font-size:12px;flex:1;font-weight:600">'+(planN?planN.nombre:r.Sesion_Plan)+'</span>';
      h += '<span style="font-size:11px;color:var(--text3)">'+(r.Fecha?formatShortDate(r.Fecha):'')+'</span></div>';
      h += '<button class="btn tl" style="margin-top:8px;padding:10px" onclick="retomarPendiente(this.dataset.id)" data-id="'+r.Sesion_Plan+'">📸 Cargar fotos Garmin</button>';
      h += '</div></div>';
    });
  }

  // Últimas
  if(ultimas.length) {
    h+='<div class="lbl" style="margin-top:4px">Últimas sesiones</div>';
    ultimas.forEach(r=>{h+=miniCard(r);});
  }

  document.getElementById('pg-hoy').innerHTML=h;
}

// ═══════════════════════════════════════════════════
function renderPlan() {
  const bl=getBloqueActivo();
  let h='';

  // Block switcher
  h+='<div class="bsw">';
  BLOQUES.forEach(b=>{
    const on=b.id===bl.id;
    h+='<button onclick="setBloque(\''+b.id+'\')" style="'+(on?'background:'+b.color+';color:#fff;border-color:'+b.color:'')+'">'+b.nombre.replace(/🏁|🏊/g,'').trim().split('—')[0].trim()+'</button>';
  });
  h+='</div>';

  // Bloque header
  h+='<div class="bl-hdr" style="background:'+bl.color+'">';
  h+='<div style="font-size:14px;font-weight:700;margin-bottom:3px">'+bl.nombre+'</div>';
  h+='<div style="font-size:12px;opacity:.85">'+bl.subtitulo+'</div>';
  h+='<div style="font-size:11px;opacity:.7;margin-top:4px">📅 Meta: '+bl.fechaFin+'</div></div>';

  bl.semanas.forEach(sem=>{
    h+='<div class="lbl">'+sem.nombre+'</div>';
    sem.sesiones.forEach(s=>{
      const comp=completadas(s.id);
      const done=comp.length>=2;
      const hasPending=comp.some(function(r){return r.Pendiente==='SI'||r.Pendiente===true;});
      const isComp=s.intensidad.includes('🏆');
      const distInfo=calcDistSesion(s);
      const distLabel = distInfo ? (' · '+distInfo.total+'m'+(distInfo.completo?'':'+')) : '';
      h+='<div class="sc '+scClass(s.tipo)+' '+(done?'done':'')+'" style="'+(isComp?'border-left-color:#F1C40F':hasPending?'border-left-color:var(--orange)':'')+'">';
      h+='<div class="sc-h" onclick="toggleSC(\'sb-'+s.id+'\')"><div style="flex:1"><h4>'+s.nombre+' '+(done?'✅':'')+'</h4><div class="sc-d">'+s.dia+distLabel+' · '+s.intensidad+'</div></div><span style="font-size:11px;color:var(--text3)">▼</span></div>';
      h+='<div class="sc-b" id="sb-'+s.id+'">';
      h+='<p style="font-size:12px;color:var(--text2);margin-bottom:6px">'+s.objetivo+'</p>';
      if(s.rationale) h+='<div style="background:var(--gold);border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:#7D6608;line-height:1.5"><b>¿Por qué esta sesión?</b> '+s.rationale+'</div>';
      s.bloques.forEach(b=>{
        const distB=calcDistBloque(b);
        h+='<div class="blq"><div class="blq-t">'+b.tipo+(distB!=null?' · '+distB+'m':'')+(b.ritmo?' · 🎯 '+b.ritmo:'')+'</div>';
        h+='<div class="blq-d">'+fmtEstructura(b)+'</div>';
        if(b.descanso_bloque) h+='<div style="font-size:11px;color:var(--text3);margin-top:3px">⏸ Descanso: '+b.descanso_bloque+'</div>';
        else if(b.desc2 && b.desc2!=='—') h+='<div style="font-size:11px;color:var(--text3);margin-top:3px">⏸ '+b.desc2+'</div>';
        h+='<div class="blq-f">🔵 Felipe: '+b.mf+'</div>';
        h+='<div class="blq-s">🟢 Sergio: '+b.ms+'</div></div>';
      });
      if(distInfo) h+='<div style="text-align:right;font-size:12px;font-weight:700;color:var(--navy);margin-top:8px">Distancia total: '+distInfo.total+'m'+(distInfo.completo?'':' (parcial)')+'</div>';
      comp.forEach(function(c){
        if(c.Pendiente==='SI'||c.Pendiente===true){
          h+='<div style="background:var(--orange-l);border-radius:8px;padding:8px 10px;margin-top:6px;font-size:12px;display:flex;align-items:center;justify-content:space-between">⏳ <b>'+c.Nadador+'</b>: plan guardado, sin resultados Garmin · <button onclick="retomarPendiente(\''+s.id+'\')" style="background:none;border:none;color:var(--orange);font-size:11px;font-weight:700;cursor:pointer">📸 Cargar fotos</button></div>';
        } else {
          h+='<div style="background:var(--green-l);border-radius:8px;padding:8px 10px;margin-top:6px;font-size:12px">✅ <b>'+c.Nadador+'</b>: '+(c.Distancia_m||'?')+'m · '+(c.Ritmo_100m||'?')+'/100m · SWOLF '+(c.SWOLF||'?')+'</div>';
        }
      });
      if(!isComp) h+='<button class="btn" style="margin-top:10px" onclick="iniciarDesde(\''+s.id+'\')">📤 Cargar resultado</button>';
      h+='</div></div>';
    });
  });

  document.getElementById('pg-plan').innerHTML=h;
}

async function b64(file) {
  return new Promise(r => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      // Resize to max 1024px and compress to 70% quality
      const MAX = 1024;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      const data = canvas.toDataURL('image/jpeg', 0.7);
      r(data.split(',')[1]);
    };
    img.src = url;
  });
}

    const plan=getSesion(S.sesionPlan);
    // Build rich context: plan + bloques + perfil del nadador + historial reciente

    const bloqueInfo = plan.bloques.map((b,i) => {

      if (!st.hecho) return b.tipo + ': OMITIDO';
      let info = b.tipo + ' — ' + fmtEstructura(b);
      const distB = calcDistBloque(b);
      if (distB) info += ' (' + distB + 'm)';
      if (b.ritmo) info += ' objetivo: ' + b.ritmo;
      if (st.estiloVar) info += ' [estilo cambiado a ' + st.estiloVar + ']';
      if (st.nota) info += ' [nota: ' + st.nota + ']';
      if (b.mf && S.nadador==='Felipe') info += ' | meta Felipe: ' + b.mf;
      if (b.ms && S.nadador==='Sergio') info += ' | meta Sergio: ' + b.ms;
      return info;
    });
    const omitidos = plan.bloques.filter((b,i)=>!(states[i]?.hecho)).map(b=>b.tipo);
    const distInfo = calcDistSesion({bloques: plan.bloques.filter((b,i)=>states[i]?.hecho!==false)});
    ctx = 'SESION: "' + plan.nombre + '" (' + plan.dia + '). ' +
      'OBJETIVO DE LA SESION: ' + plan.objetivo + '. ' +
      (plan.rationale ? 'CONTEXTO PEDAGOGICO: ' + plan.rationale + '. ' : '') +
      'VOLUMEN PLANIFICADO: ' + (distInfo ? distInfo.total + 'm' : '~' + (plan.volumen||'?') + 'm') + '. ' +
      'BLOQUES REALIZADOS: ' + bloqueInfo.join(' | ') + '. ' +
      (omitidos.length ? 'BLOQUES OMITIDOS: ' + omitidos.join(', ') + '. ' : '');
  }

  // Swimmer profile context
  const nadObj = NADADORES.find(n=>n.nombre===S.nadador) || {};
  const perfil = [
    nadObj.tipo_nadador ? 'Tipo: ' + nadObj.tipo_nadador : '',
    nadObj.fortaleza ? 'Fortaleza: ' + nadObj.fortaleza : '',
    nadObj.debilidad ? 'A mejorar: ' + nadObj.debilidad : '',
    nadObj.t50_libre ? '50L ref: ' + nadObj.t50_libre : '',
    nadObj.t400_libre ? '400L ref: ' + nadObj.t400_libre : '',
    nadObj.swolf_ref ? 'SWOLF ref: ' + nadObj.swolf_ref : ''
  ].filter(Boolean).join('. ');

  // Recent history for comparison
  const histReciente = CACHE.filter(r=>r.Nadador===S.nadador&&r.Ritmo_100m).slice(-3)
    .map(r=>'Sesión '+formatShortDate(r.Fecha||'')+': '+r.Distancia_m+'m '+r.Ritmo_100m+'/100m SWOLF '+r.SWOLF).join(' | ');

  const prompt='Eres ORION Master, coach experto en natacion master. Analiza este entrenamiento con rigor tecnico.\n' +
    'NADADOR: ' + S.nadador + '. ' + (perfil ? 'PERFIL: ' + perfil + '.' : '') + '\n' +
    'CONTEXTO ENTRENAMIENTO:\n' + ctx + '\n' +
    (histReciente ? 'HISTORIAL RECIENTE (comparacion): ' + histReciente + '\n' : '') +
    '\nAnaliza las pantallas de Garmin Connect adjuntas y extrae TODOS los datos disponibles.\n' +
    'Luego genera una evaluacion ESPECIFICA para este nadador y esta sesion:\n' +
    '- puntos_positivos: logros concretos vs los objetivos de cada bloque (no genericos)\n' +
    '- puntos_mejora: aspectos especificos a corregir basados en los datos reales\n' +
    '- para_proxima: indicaciones tecnicas precisas para la proxima sesion\n' +
    'Si hay bloques omitidos, considera eso en el analisis.\n' +
    'Compara con el historial reciente si esta disponible.\n\n' +
    'Devuelve SOLO JSON valido sin backticks:\n' +
    '{"resumen":{"tiempo_total":null,"tiempo_movimiento":null,"distancia_m":null,"ritmo_medio":null,"fc_media":null,"fc_max":null,"cadencia_ppm":null,"brazadas_totales":null,"brazada_media_largo":null,"swolf_medio":null,"te_aerobico":null,"te_anaerobico":null,"carga_ejercicio":null,"calorias_totales":null,"velocidad_media_kmh":null},"vueltas":[{"intervalo":1,"tiempo":null,"distancia_m":null,"ritmo":null}],"evaluacion":{"cumple_plan":true,"puntos_positivos":[],"puntos_mejora":[],"para_proxima":[]}}';

    const resp=await fetch('https://orion-proxy.felgonino.workers.dev',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      signal: controller.signal,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:[...imgs,{type:'text',text:prompt}]}]})
    });
    clearTimeout(timeoutId);
    clearInterval(iv); setLoad(100,'Análisis completo ✓','');
    if(!resp.ok) throw new Error('API error '+resp.status);
    const data=await resp.json();
    if(!data.ok) throw new Error(data.error||'Error en proxy');
    if(!data.text) throw new Error('Sin texto en respuesta');
    const raw = data.text.trim();
    S.extracted=JSON.parse(raw);
    setTimeout(()=>{ lov(false); renderResultado(); },300);
  } catch(e){ clearInterval(iv); lov(false); toast('❌ Error: '+e.message,4000); }
}

function buildWAMsg(reg, plan, ev) {
  var r = reg.resumen || {};
  var fecha = '';
  try { fecha = new Date(reg.fecha+'T12:00:00').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'}); } catch(e){}
  var emoji = reg.nadador === 'Felipe' ? '(F)' : '(S)';
  var lines = [];
  lines.push('*ORION MASTER* ' + emoji);
  lines.push(reg.nadador + ' - ' + fecha);
  lines.push(plan ? plan.nombre : (reg.sesionPlan||'Libre'));
  lines.push('');
  lines.push('*Metricas*');
  lines.push('Distancia: *' + (r.distancia_m||'-') + 'm*');
  lines.push('Tiempo: *' + (r.tiempo_total||'-') + '*');
  lines.push('Ritmo: *' + (r.ritmo_medio||'-') + '/100m*');
  lines.push('FC media: *' + (r.fc_media||'-') + ' ppm*');
  lines.push('FC max: *' + (r.fc_max||'-') + ' ppm*');
  lines.push('SWOLF: *' + (r.swolf_medio||'-') + '*');
  lines.push('TE aerobico: *' + (r.te_aerobico||'-') + '*  Anaerobico: *' + (r.te_anaerobico||'-') + '*');
  lines.push('Carga: *' + (r.carga_ejercicio||'-') + '*  Calorias: *' + (r.calorias_totales||'-') + '*');

  if (reg.bloqueStates && plan) {
    var omit = plan.bloques.filter(function(b,i){ return !reg.bloqueStates[i] || !reg.bloqueStates[i].hecho; });
    var vari = plan.bloques.filter(function(b,i){ return reg.bloqueStates[i] && reg.bloqueStates[i].hecho && (reg.bloqueStates[i].estiloVar||reg.bloqueStates[i].nota); });
    if (omit.length || vari.length) {
      lines.push('');
      lines.push('*Ajustes al plan*');
      omit.forEach(function(b){ lines.push('x Omitido: ' + b.tipo); });
      vari.forEach(function(b){
        var idx = plan.bloques.indexOf(b);
        var st = reg.bloqueStates[idx];
        lines.push('~ ' + b.tipo + (st.estiloVar?' > '+st.estiloVar:'') + (st.nota?' | '+st.nota:''));
      });
    }
  }

  if (ev) {
    if (ev.puntos_positivos && ev.puntos_positivos.length) {
      lines.push('');
      lines.push('*Logros*');
      ev.puntos_positivos.forEach(function(p){ lines.push('+ ' + p); });
    }
    if (ev.puntos_mejora && ev.puntos_mejora.length) {
      lines.push('');
      lines.push('*A mejorar*');
      ev.puntos_mejora.forEach(function(p){ lines.push('! ' + p); });
    }
    if (ev.para_proxima && ev.para_proxima.length) {
      lines.push('');
      lines.push('*Para la proxima*');
      ev.para_proxima.forEach(function(p){ lines.push('> ' + p); });
    }
  }

  lines.push('');
  lines.push('ID: ' + reg.id + ' | ORION 2026');
  return lines.join('\n');
}

    var mejorRitmo = ritmos.length ? secToRitmo(Math.min.apply(null,ritmos)) : '—';
    var swolfs = sesiones.map(function(r){ return parseFloat(r.SWOLF); }).filter(function(v){ return !isNaN(v); });
    var mejorSwolf = swolfs.length ? Math.min.apply(null,swolfs) : '—';

    h += '<div class="r3" style="margin-bottom:14px">';
    h += '<div class="kpi" style="text-align:center"><div class="kpi-v" style="font-size:18px">'+sesiones.length+'</div><div class="kpi-l">sesiones</div></div>';
    h += '<div class="kpi" style="text-align:center"><div class="kpi-v" style="font-size:18px">'+mejorRitmo+'</div><div class="kpi-l">mejor ritmo</div></div>';
    h += '<div class="kpi" style="text-align:center"><div class="kpi-v" style="font-size:18px">'+mejorSwolf+'</div><div class="kpi-l">mejor SWOLF</div></div>';
    h += '</div>';
    h += '<div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:14px">Volumen total: <b>'+(totalDist/1000).toFixed(1)+' km</b></div>';

    // Tabla de evolución
    h += '<div class="lbl">Historial de sesiones</div>';
    h += '<div class="card"><div style="overflow-x:auto"><table class="vtbl"><thead><tr>';
    h += '<th>Fecha</th><th>Dist</th><th>Ritmo</th><th>SWOLF</th><th>FC</th></tr></thead><tbody>';
    sesiones.forEach(function(r){
      var fecha = r.Fecha ? formatShortDate(r.Fecha) : '—';
      h += '<tr><td>'+fecha+'</td><td>'+(r.Distancia_m||'—')+'m</td><td>'+(r.Ritmo_100m||'—')+'</td><td>'+(r.SWOLF||'—')+'</td><td>'+(r.FC_Media||'—')+'</td></tr>';
    });
    h += '</tbody></table></div></div>';

    // Mini tendencia textual
    if (ritmos.length >= 2) {
      var primero = ritmos[ritmos.length-1], ultimo = ritmos[0];

  var compe = COMPETENCIAS.filter(function(c){ return c.Nadador === HIST_NAD && c.Tiempo; });
  if (compe.length) {
    h += '<div class="lbl" style="margin-top:18px">🏆 Marcas de competencia</div>';

}

function formatShortDate(f) {
  try {
    var d = new Date(f + 'T12:00:00');
    if (isNaN(d)) return f;
    return d.toLocaleDateString('es-CL', {day:'2-digit', month:'short'});
  } catch(e) { return f; }
}

function ritmoToSec(r) {
  if (!r) return null;
  var s = String(r);
  // Buscar directamente el patrón M:SS en el texto original
  var m = s.match(/(\d{1,2}):(\d{2})/);
  if (!m) return null;
  var min = parseInt(m[1], 10), sec = parseInt(m[2], 10);
  var total = min * 60 + sec;
  // Un ritmo /100m válido está aproximadamente entre 0:30 y 5:00
  if (total < 30 || total > 300) return null;
  return total;
}

function secToRitmo(s) {
  var m = Math.floor(s/60), sec = Math.round(s-m*60);
  return m+':'+(sec<10?'0':'')+sec;
}

function compeSet(key, val) {
  COMPE_STATE[key] = val;
  if (key === 'nadador') {
    NADADORES.forEach(function(n){
      var el = document.getElementById('cp-nad-'+n.nombre);
      if(el) el.className = 'pill' + (n.nombre===val ? (n.nombre==='Sergio'?' on-s':' on') : '');
    });
  } else if (key === 'medio') {
    document.getElementById('cp-medio-Piscina').className = 'pill'+(val==='Piscina'?' on':'');
    document.getElementById('cp-medio-Mar').className = 'pill'+(val==='Mar'?' on':'');
  } else if (key === 'estilo') {
    ['Libre','Espalda','Pecho','Mariposa','Combinado','Relevo'].forEach(function(e){
      var el=document.getElementById('cp-est-'+e); if(el) el.classList.toggle('on', e===val);
    });
  } else if (key === 'distancia') {
    ['50','100','200','400','800','1500','2000','3000'].forEach(function(d){
      var el=document.getElementById('cp-d-'+d); if(el) el.classList.toggle('on', d===val);
    });
  }
}

async function guardarCompe() {
  const tiempo = document.getElementById('cp-tiempo').value.trim();
  if (!COMPE_STATE.nadador) { toast('Selecciona el nadador'); return; }
  if (!tiempo) { toast('Ingresa el tiempo'); return; }

  const compe = {
    action: 'competencia',
    nadador: COMPE_STATE.nadador,
    medio: COMPE_STATE.medio,
    estilo: COMPE_STATE.estilo,
    distancia: COMPE_STATE.distancia,
    fecha: document.getElementById('cp-fecha').value || todayStr(),
    tiempo: tiempo,
    nombre: document.getElementById('cp-nombre').value.trim(),
    ritmo: document.getElementById('cp-ritmo').value.trim(),
    fc: document.getElementById('cp-fc').value.trim(),
    posicion: document.getElementById('cp-pos').value.trim(),
    condiciones: document.getElementById('cp-cond').value.trim()
  };

  lov(true); setLoad(50, 'Guardando competencia...', '');
  try {
    const r = await fetch('https://orion-proxy.felgonino.workers.dev', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(compe)
    });
    const j = await r.json();
    lov(false);
    if (j.ok) {
      COMPETENCIAS.push({
        Nadador:compe.nadador, Medio:compe.medio, Estilo:compe.estilo,
        Distancia:compe.distancia, Fecha:compe.fecha, Tiempo:compe.tiempo,
        Nombre:compe.nombre, Ritmo:compe.ritmo, FC:compe.fc,
        Posicion:compe.posicion, Condiciones:compe.condiciones
      });
      toast('✅ Competencia guardada');
      renderCompe();
    } else { toast('Error al guardar'); }
  } catch(e) { lov(false); toast('Error de conexión'); }
}

function inp(id, label, val, ph) {
  return '<div class="lbl" style="margin-top:8px;text-transform:none;letter-spacing:0;color:var(--text2)">'+label+'</div>' +
    '<input type="text" id="'+id+'" class="nota-inp" value="'+(val||'').replace(/"/g,'&quot;')+'" placeholder="'+(ph||'')+'">';
}

async function guardarNadador(i) {
  var nombre = document.getElementById('en-nombre').value.trim();
  if (!nombre) { toast('Ingresa el nombre'); return; }

  var pin;
  if (i >= 0) { pin = NADADORES[i].pin; }
  else {
    pin = document.getElementById('en-pin').value.trim();
    if (pin.length !== 4 || isNaN(pin)) { toast('El PIN debe ser 4 dígitos'); return; }
  }

  var colores = ['#0D2B55','#0E6655','#CA6F1E','#6C3483','#C0392B','#1A5276'];
  var emojis = ['🔵','🟢','🟠','🟣','🔴','🔷'];

  function gv(id){ var el=document.getElementById(id); return el?el.value.trim():''; }

  var nad = {
    nombre: nombre, pin: pin,
    color: i>=0 ? NADADORES[i].color : colores[NADADORES.length % colores.length],
    emoji: i>=0 ? NADADORES[i].emoji : emojis[NADADORES.length % emojis.length],
    edad: gv('en-edad'), categoria: gv('en-cat'), anos_exp: gv('en-exp'),
    respiracion: gv('en-resp'), brazada_dom: gv('en-brz'),
    estatura: gv('en-est'), envergadura: gv('en-env'),
    t50_libre: gv('en-t50l'), t50_espalda: gv('en-t50e'), t100_libre: gv('en-t100l'),
    t400_libre: gv('en-t400l'), swolf_ref: gv('en-swolf'),
    oa_ritmo: gv('en-oar'), oa_mejor_dist: gv('en-oad'), oa_condiciones: gv('en-oac'),
    tipo_nadador: gv('en-tipo'), fortaleza: gv('en-fort'), debilidad: gv('en-deb'),
    objetivo: gv('en-obj'), extras: gv('en-extra')
  };

  if (i >= 0) NADADORES[i] = nad;
  else NADADORES.push(nad);

  lov(true); setLoad(50, 'Guardando perfil...', '');
  try {
    await fetch('https://orion-proxy.felgonino.workers.dev', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'nadadores', nadadores: NADADORES })
    });
    lov(false); toast('✅ Perfil guardado');
  } catch(e) { lov(false); toast('Guardado local (sin conexión)'); }
  renderNadadores();
}

function renderGlosario() {
  var terminos = [].concat(GLOSARIO).sort(function(a,b){
    return a.termino.toLowerCase() < b.termino.toLowerCase() ? -1 : 1;
  });

  var h = '<div class="lbl">Glosario de términos técnicos</div>';
  h += '<div class="note">Definiciones y ejecución de los términos usados en los entrenamientos. ORION agrega nuevos automáticamente al generar programas.</div>';

  // Buscador simple
  h += '<input type="text" id="glos-buscar" class="nota-inp" placeholder="🔍 Buscar término..." oninput="filtrarGlosario(this.value)" style="margin-bottom:14px">';

  h += '<div id="glos-lista">';
  terminos.forEach(function(t){
    h += '<div class="card glos-item" data-term="'+(t.termino||'').toLowerCase()+'" style="margin-bottom:8px"><div class="cb">';
    h += '<div style="font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px">'+t.termino+'</div>';
    h += '<div style="font-size:12px;color:var(--text);line-height:1.5;margin-bottom:6px">'+t.definicion+'</div>';
    if (t.ejecucion) {
      h += '<div style="font-size:12px;color:var(--text2);line-height:1.5;background:var(--gray);border-radius:8px;padding:8px 10px"><b>Cómo se ejecuta:</b> '+t.ejecucion+'</div>';
    }
    h += '</div></div>';
  });
  h += '</div>';

  // Agregar término manual
  h += '<button class="btn2" onclick="nuevoTermino()" style="margin-top:6px">➕ Agregar término manualmente</button>';

  document.getElementById('pg-glosario').innerHTML = h;
}

function filtrarGlosario(q) {
  q = (q||'').toLowerCase().trim();
  document.querySelectorAll('.glos-item').forEach(function(el){
    var term = el.getAttribute('data-term') || '';
    var txt = el.textContent.toLowerCase();
    el.style.display = (!q || term.indexOf(q) >= 0 || txt.indexOf(q) >= 0) ? '' : 'none';
  });
}

function nuevoTermino() {
  var h = '<div class="lbl">Nuevo término</div><div class="card"><div class="cb">';
  h += '<div class="lbl" style="text-transform:none;letter-spacing:0;color:var(--text2)">Término</div>';
  h += '<input type="text" id="gt-term" class="nota-inp" placeholder="ej: Negative split">';
  h += '<div class="lbl" style="margin-top:8px;text-transform:none;letter-spacing:0;color:var(--text2)">Definición</div>';
  h += '<textarea id="gt-def" class="nota-inp" rows="2" style="resize:vertical"></textarea>';
  h += '<div class="lbl" style="margin-top:8px;text-transform:none;letter-spacing:0;color:var(--text2)">Cómo se ejecuta</div>';
  h += '<textarea id="gt-ejec" class="nota-inp" rows="2" style="resize:vertical"></textarea>';
  h += '<button class="btn" style="margin-top:8px" onclick="guardarTermino()">💾 Guardar término</button>';
  h += '<button class="btn2" onclick="renderGlosario()">← Cancelar</button>';
  h += '</div></div>';
  document.getElementById('pg-glosario').innerHTML = h;
}

async function guardarTermino() {
  var term = document.getElementById('gt-term').value.trim();
  var def = document.getElementById('gt-def').value.trim();
  var ejec = document.getElementById('gt-ejec').value.trim();
  if (!term || !def) { toast('Completa término y definición'); return; }
  // Evitar duplicados
  if (GLOSARIO.find(function(g){ return g.termino.toLowerCase() === term.toLowerCase(); })) {
    toast('Ese término ya existe'); return;
  }
  GLOSARIO.push({ termino:term, definicion:def, ejecucion:ejec });
  await guardarGlosarioRemoto();
  toast('✅ Término agregado');
  renderGlosario();
}

// Agrega términos nuevos detectados (desde generador) sin duplicar
function agregarTerminosGlosario(nuevos) {
  if (!nuevos || !nuevos.length) return false;
  var agregados = 0;
  nuevos.forEach(function(n){
    if (!n.termino || !n.definicion) return;
    var existe = GLOSARIO.find(function(g){ return g.termino.toLowerCase() === n.termino.toLowerCase(); });
    if (!existe) { GLOSARIO.push(n); agregados++; }
  });
  if (agregados > 0) { guardarGlosarioRemoto(); return true; }
  return false;
}

async function guardarGlosarioRemoto() {
  try {
    await fetch('https://orion-proxy.felgonino.workers.dev', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'glosario', glosario: GLOSARIO })
    });
  } catch(e) { /* queda local */ }
}

const OBJ = { modo:'auto', pruebas:[{estilo:'Libre', dist:'50'}], fecha:'', semanas:'3', dias:'3', notas:'' };

  var h = '<div class="lbl">Generar nuevo programa con ORION IA</div>';

  h += '</div>';

function renderObjetivoPrueba(p, i) {
  var estilos = ['Libre','Espalda','Pecho','Mariposa','Combinado','Fondo OA'];
  var distancias = ['50','100','200','400','800','1500','3000','5000'];
  var h = '<div class="card" style="margin-bottom:8px;border-left:3px solid var(--navy)"><div class="cb">';

  h += '<span style="font-size:12px;font-weight:700;color:var(--navy)">Prueba '+(i+1)+'</span>';
  if(i>0) h += '<button onclick="rmPrueba('+i+')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:13px">✕</button>';
  h += '</div>';
  h += '<div class="lbl" style="margin-top:0">Estilo</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">';
  estilos.forEach(function(e){ h += "<button class='estilo-btn"+(p.estilo===e?" on":"")+"' onclick='setPrueba("+i+",\"estilo\",\""+e+"\")'>"+e+"</button>"; });
  h += '</div><div class="lbl">Distancia</div><div style="display:flex;flex-wrap:wrap;gap:5px">';
  distancias.forEach(function(d){ h += "<button class='estilo-btn"+(p.dist===d?" on":"")+"' onclick='setPrueba("+i+",\"dist\",\""+d+"\")'>"+d+"m</button>"; });

var PROGRAMAS_GEN = [];

function objSet(key,val) {
  OBJ[key]=val;
  if(key==='modo'){
    document.getElementById('obj-auto').className='pill'+(val==='auto'?' on':'');
    document.getElementById('obj-manual').className='pill'+(val==='manual'?' on':'');
    document.getElementById('obj-manual-extra').style.display=val==='manual'?'block':'none';
  }
}
function addPrueba(){
  OBJ.pruebas.push({estilo:'Libre',dist:'50'});
  OBJ.semanas=document.getElementById('obj-sem')?.value||OBJ.semanas;
  OBJ.dias=document.getElementById('obj-dias')?.value||OBJ.dias;
  OBJ.fecha=document.getElementById('obj-fecha')?.value||OBJ.fecha;
  renderObjetivos();
}
function rmPrueba(i){ OBJ.pruebas.splice(i,1); renderObjetivos(); }
function setPrueba(i,campo,val){
  OBJ.pruebas[i][campo]=val;
  document.getElementById('obj-pruebas-list').innerHTML=OBJ.pruebas.map(function(p,idx){return renderObjetivoPrueba(p,idx);}).join('');
}

async function generarPrograma() {
  var fecha = document.getElementById('obj-fecha').value;
  var sem = parseInt(document.getElementById('obj-sem').value || '3');
  var dias = parseInt(document.getElementById('obj-dias').value || '3');
  var notas = document.getElementById('obj-notas') ? document.getElementById('obj-notas').value : '';
  OBJ.fecha=fecha; OBJ.semanas=sem; OBJ.dias=dias; OBJ.notas=notas;
  if(!fecha){toast('Selecciona la fecha de competencia');return;}
  if(!OBJ.pruebas.length){toast('Agrega al menos una prueba');return;}

  var pruebasTxt = OBJ.pruebas.map(function(p){return p.dist+'m '+p.estilo;}).join(', ');
  var perfilesTxt = NADADORES.map(function(n){
    var d=[];
    if(n.t50_libre) d.push('50L:'+n.t50_libre);
    if(n.t400_libre) d.push('400L:'+n.t400_libre);
    if(n.fortaleza) d.push('F:'+n.fortaleza);
    if(n.debilidad) d.push('M:'+n.debilidad);
    return n.nombre+'('+d.join(',')+')';
  }).join('|');

  var histTxt = CACHE.filter(function(r){return r.Ritmo_100m;}).slice(-4)
    .map(function(r){return r.Nadador+':'+r.Distancia_m+'m '+r.Ritmo_100m;}).join(',');

  lov(true); setLoad(10,'Generando programa...','Semana por semana');

  var todasSemanas = [];
  var todosGlos = [];
  var errorGen = null;

  // Generate one week at a time to stay under 30s limit
  for (var w = 1; w <= sem; w++) {
    setLoad(Math.round(10 + (w-1)/sem*80), 'Generando semana '+w+' de '+sem+'...', pruebasTxt);

    var semanaPrompt =
      'Coach natacion master. Genera SOLO la semana '+w+' de '+sem+' de un programa de entrenamiento. ' +
      'Pruebas objetivo: '+pruebasTxt+'. Competencia: '+fecha+'. '+dias+' sesiones esta semana. ~2200m/sesion. ' +
      'Nadadores: '+perfilesTxt+'. Historial: '+(histTxt||'ninguno')+'. ' +
      (notas?notas+'. ':'')+
      'Felipe: mejorar DPS/eficiencia. Sergio: mejorar agresividad/cierre. ' +
      'ESTRUCTURA: calentamiento 300-400m + principal 1400-1600m + afloje 200m. ' +
      'JSON solo la semana, sin texto extra: ' +
      '{"semana_num":'+w+',"nombre":"Semana '+w+' - descripcion","glosario_nuevos":[],' +
      '"sesiones":[{"id":"G'+w+'1","tipo":"A","nombre":"...","dia":"Lun...","intensidad":"Aerobico","objetivo":"...","rationale":"...",' +
      '"bloques":[{"tipo":"Calentamiento","series":[{"reps":1,"dist":300,"estilo":"Libre","implemento":"","salida":"","descanso":""}],"descanso_bloque":"","mf":"...","ms":"...","ritmo":""},' +
      '{"tipo":"Principal","series":[{"reps":5,"dist":200,"estilo":"Libre","implemento":"","salida":"2:30","descanso":""}],"descanso_bloque":"30seg","mf":"...","ms":"...","ritmo":"1:45/100"},' +
      '{"tipo":"Afloje","series":[{"reps":1,"dist":200,"estilo":"Libre","implemento":"","salida":"","descanso":""}],"descanso_bloque":"","mf":"...","ms":"...","ritmo":""}]}]}';

    try {
      var resp = await fetch('https://orion-proxy.felgonino.workers.dev',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:[{role:'user',content:semanaPrompt}]})
      });
      var data = await resp.json();
      if(!data.ok||!data.text) throw new Error(data.error||'Sin respuesta semana '+w);
      var raw=data.text.trim();
      var s=raw.indexOf('{'), e2=raw.lastIndexOf('}');
      if(s<0||e2<0) throw new Error('JSON invalido semana '+w);
      var semData = JSON.parse(raw.substring(s,e2+1));

      // Fix session IDs to be unique
      (semData.sesiones||[]).forEach(function(ses,i){
        ses.id = 'G'+w+'S'+(i+1);
        var di = calcDistSesion(ses);
        ses.volumen = di ? di.total : 0;
      });

      todasSemanas.push({
        id: 'S'+w,
        nombre: semData.nombre || 'Semana '+w,
        sesiones: semData.sesiones || []
      });
      todosGlos = todosGlos.concat(semData.glosario_nuevos||[]);
    } catch(e) {
      errorGen = e.message;
      break;
    }
  }

  setLoad(95,'Finalizando...','');

  if (errorGen) {
    lov(false);
    toast('Error semana: '+errorGen, 5000);
    return;
  }

  var prog = {
    id: 'GEN'+Date.now(),
    nombre: 'Plan '+pruebasTxt,
    subtitulo: pruebasTxt+' · '+fecha,
    fechaFin: fecha,
    color: '#CA6F1E',
    activo: false,
    semanas: todasSemanas
  };

  var glosAdd = agregarTerminosGlosario(todosGlos);
  PROGRAMAS_GEN.push(prog);
  lov(false);
  toast(glosAdd ? 'Programa generado (glosario actualizado)' : 'Programa generado');
  renderObjetivos();
}


function activarProgramaGen(i) {
  var prog=PROGRAMAS_GEN[i];
  BLOQUES.forEach(function(b){b.activo=false;});
  prog.activo=true;
  if(!BLOQUES.find(function(b){return b.id===prog.id;})) BLOQUES.push(prog);
  toast('Programa activado en Plan');
  goTab('plan');
}

// Cargar nadadores y competencias desde Sheets, luego mostrar login
async function initApp() {
  await cargarNadadores();
  renderLogin();
  // Cargar datos en background
  sheetsLoad().then(()=>{
    const tab=document.querySelector('.tab.on')?.id?.replace('tab-','');
    if(tab==='hoy'&&USUARIO_ACTUAL) renderHoy();
    if(tab==='historial'&&USUARIO_ACTUAL) renderHistorial();
  }).catch(()=>syncDot('err'));
}

async function cargarNadadores() {
  try {
    const r = await fetch('https://orion-proxy.felgonino.workers.dev?tipo=nadadores&t='+Date.now());
    const j = await r.json();
    if (j.ok && j.nadadores && j.nadadores.length) {
      NADADORES = j.nadadores;
    }
  } catch(e) { /* usa los por defecto */ }
  // Cargar glosario
  try {
    const rg = await fetch('https://orion-proxy.felgonino.workers.dev?tipo=glosario&t='+Date.now());
    const jg = await rg.json();
    if (jg.ok && jg.glosario && jg.glosario.length) {
      // Fusionar con los base sin duplicar
      jg.glosario.forEach(function(g){
        if (!GLOSARIO.find(function(x){ return x.termino.toLowerCase() === (g.termino||'').toLowerCase(); })) {
          GLOSARIO.push(g);
        }
      });
    }
  } catch(e) { /* usa los base */ }
}

initApp();
