<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D2B55">
<title>ORION Master</title>
<style>
:root{
  --navy:#0D2B55;--azul:#1A5276;--azul-l:#D6EAF8;
  --teal:#0E6655;--teal-l:#D1F2EB;
  --orange:#CA6F1E;--orange-l:#FAD7A0;
  --purple:#6C3483;--gold:#F9E79F;
  --gray:#F4F6F7;--gray2:#E5E8E8;--border:#D5D8DC;
  --text:#1B2631;--text2:#566573;--text3:#AAB7B8;
  --white:#FFFFFF;--green:#1E8449;--green-l:#D5F5E3;
  --red:#C0392B;--red-l:#FADBD8;
  --r:12px;--sh:0 2px 12px rgba(13,43,85,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:-webkit-fill-available;background:#F0F2F5;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;color:var(--text)}
.app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;overflow:hidden}
/* topbar */
.tb{background:var(--navy);color:#fff;padding:14px 16px 10px;padding-top:max(14px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tb-logo{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.tb-t{font-size:15px;font-weight:600}.tb-s{font-size:11px;opacity:.7}
.sdot{width:8px;height:8px;border-radius:50%;background:#AAB7B8;margin-left:auto;flex-shrink:0;transition:background .3s}
.sdot.ok{background:#2ECC71}.sdot.err{background:var(--red)}.sdot.load{background:#F39C12;animation:bk .8s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
/* tabs */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1 0 auto;min-width:60px;padding:10px 8px 8px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap}
.tab.on{color:var(--navy);border-bottom-color:var(--navy)}
.tab em{display:block;font-size:17px;font-style:normal;margin-bottom:1px}
/* content */
.cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.cnt::-webkit-scrollbar{display:none}
.pg{display:none;padding:14px}
.pg.on{display:block}
/* cards */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden}
.ch{padding:12px 14px;border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:8px}
.ch h3{font-size:13px;font-weight:600;color:var(--text);flex:1}
.cb{padding:12px 14px}
/* badges */
.bx{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bf{background:var(--azul-l);color:var(--navy)}.bs{background:var(--teal-l);color:var(--teal)}
.bw{background:var(--orange-l);color:var(--orange)}.bg{background:var(--green-l);color:var(--green)}
/* layout */
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
/* pills */
.pill{padding:10px 8px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);cursor:pointer;text-align:center}
.pill.on{border-color:var(--navy);background:var(--azul-l)}
.pill.on-s{border-color:var(--teal);background:var(--teal-l)}
.pill em{font-size:20px;display:block;margin-bottom:3px;font-style:normal}
.pill b{font-size:12px;font-weight:600;display:block;color:var(--text)}
.pill small{font-size:10px;color:var(--text3)}
/* fields */
.fr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gray2)}
.fr:last-child{border-bottom:none}
.fl{font-size:12px;color:var(--text2)}
.fv{font-size:12px;font-weight:600;color:var(--text)}
.fv.ok{color:var(--green)}.fv.win{color:var(--green)}.fv.miss{color:var(--red)}.fv.na{color:var(--text3);font-weight:400;font-style:italic}
/* labels */
.lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
/* buttons */
.btn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{opacity:.8}.btn:disabled{opacity:.35;cursor:default}
.btn.tl{background:var(--teal)}
.btn2{width:100%;padding:13px;background:transparent;color:var(--text);border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px;display:block;box-sizing:border-box}
/* upload */
.upz{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;background:var(--gray);position:relative}
.upz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upz em{font-size:28px;display:block;margin-bottom:8px;font-style:normal}
.upz p{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:3px}
.upz span{font-size:11px;color:var(--text3)}
/* thumbs */
.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.thumb{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:9/16;border:1px solid var(--border)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-rm{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(0,0,0,.6);border-radius:50%;border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* session cards */
.sc{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;border-left:4px solid var(--gray2)}
.sc.ta{border-left-color:var(--navy)}.sc.tb2{border-left-color:var(--purple)}.sc.tc{border-left-color:var(--orange)}.sc.done{border-left-color:var(--green);opacity:.8}
.sc-h{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.sc-h h4{font-size:13px;font-weight:600;flex:1}
.sc-d{font-size:11px;color:var(--text3)}
.sc-b{padding:0 14px 12px;display:none}
.sc-b.open{display:block}
/* bloques entrenamiento */
.blq{background:var(--gray);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.blq-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px}
.blq-d{font-size:12px;color:var(--text);line-height:1.5}
.blq-f{font-size:11px;color:var(--navy);font-weight:600;margin-top:4px}
.blq-s{font-size:11px;color:var(--teal);font-weight:600}
/* compare */
.cmp-r{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;align-items:center}
/* vueltas */
.vtbl{width:100%;border-collapse:collapse;font-size:11px}
.vtbl th{background:var(--gray);padding:6px 8px;text-align:right;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border)}
.vtbl th:first-child{text-align:left}
.vtbl td{padding:5px 8px;text-align:right;border-bottom:1px solid var(--gray2);color:var(--text)}
.vtbl td:first-child{text-align:left;color:var(--text2)}
.vtbl tr.tot td{font-weight:700;color:var(--navy);background:var(--azul-l)}
/* kpi */
.kpig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi{background:var(--white);border-radius:10px;padding:12px;box-shadow:var(--sh)}
.kpi-v{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.kpi-v.s{color:var(--teal)}
.kpi-l{font-size:11px;color:var(--text3);margin-top:3px}
/* success */
.ok-box{text-align:center;padding:30px 16px 20px}
.ok-ico{width:56px;height:56px;background:var(--green-l);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px}
.ok-t{font-size:18px;font-weight:700;margin-bottom:6px}
.ok-s{font-size:13px;color:var(--text2);line-height:1.6}
/* misc */
.itag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;background:var(--gray);color:var(--text2);border:1px solid var(--gray2);margin:2px}
.note{background:var(--gold);border-radius:8px;padding:10px 12px;font-size:12px;color:#7D6608;line-height:1.5;margin-bottom:10px}
.div{height:1px;background:var(--gray2);margin:10px 0}
/* loading overlay */
#lov{display:none;position:fixed;inset:0;background:rgba(13,43,85,.88);z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#lov.on{display:flex}
.lo-i{font-size:38px;margin-bottom:16px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.lo-m{font-size:16px;font-weight:600;color:#fff;text-align:center;margin-bottom:6px}
.lo-s{font-size:13px;color:rgba(255,255,255,.7);text-align:center;margin-bottom:20px}
.lo-p{width:100%;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.lo-f{height:100%;background:#5DADE2;border-radius:2px;transition:width .5s ease}
/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1B2631;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}

/* bloque checklist */
.blq-check-card{background:var(--white);border-radius:10px;box-shadow:var(--sh);margin-bottom:8px;overflow:hidden;border-left:4px solid var(--green);}
.blq-check-card.bcc-omit{border-left-color:var(--red);opacity:.6;}
.bcc-hdr{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;cursor:pointer;}
.bcc-check{width:24px;height:24px;border-radius:6px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px;}
.bcc-check.bcc-omit-chk{background:var(--red);}
.bcc-tipo{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.bcc-desc{font-size:11px;color:var(--text2);line-height:1.4;}
.bcc-opts{padding:0 14px 12px;border-top:1px solid var(--gray2);}
.estilo-btn{padding:5px 10px;border-radius:16px;border:1px solid var(--border);background:var(--white);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;margin:0;}
.estilo-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.nota-inp{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;color:var(--text);background:var(--gray);outline:none;}
.nota-inp:focus{border-color:var(--navy);background:var(--white);}

/* bloque switcher */
.bsw{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.bsw button{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:var(--white);color:var(--text2)}
.bsw button.on{color:#fff}
/* bloque header */
.bl-hdr{border-radius:10px;padding:12px 14px;margin-bottom:12px;color:#fff}

/* ── LOGIN PIN ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(165deg,#052b54 0%,#063a6e 20%,#0A4D8C 40%,#1A7BB8 62%,#2596be 82%,#48C9D8 100%);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;overflow:hidden}
#login-screen.hidden{display:none!important}
/* Rayos de luz tipo caustics de piscina */
#login-screen::before{content:'';position:absolute;inset:-20%;background:
  repeating-linear-gradient(180deg,transparent 0,transparent 56px,rgba(255,255,255,.06) 56px,rgba(255,255,255,.06) 60px),
  radial-gradient(ellipse 60% 40% at 30% 20%,rgba(120,220,255,.18),transparent 60%),
  radial-gradient(ellipse 50% 35% at 75% 40%,rgba(160,240,255,.14),transparent 60%);
  pointer-events:none;animation:caustics 14s ease-in-out infinite}
@keyframes caustics{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-12px,8px) scale(1.04)}66%{transform:translate(10px,-6px) scale(1.02)}}
/* Brillo de superficie superior pulsante */
#login-screen::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.22) 0%,transparent 100%);pointer-events:none;animation:surfaceGlow 6s ease-in-out infinite}
@keyframes surfaceGlow{0%,100%{opacity:.45}50%{opacity:.9}}
/* Ondas de luz que cruzan */
.pool-wave{position:absolute;left:-15%;right:-15%;height:180px;background:radial-gradient(ellipse at center,rgba(255,255,255,.14) 0%,transparent 68%);opacity:.5;animation:waveMove 7s ease-in-out infinite;pointer-events:none}
.pool-wave.w1{top:12%;animation-delay:0s}
.pool-wave.w2{top:42%;animation-delay:2.3s}
.pool-wave.w3{top:70%;animation-delay:4.6s}
@keyframes waveMove{0%,100%{transform:translateX(-40px) scaleY(1)}50%{transform:translateX(40px) scaleY(1.4)}}
/* Destellos de luz */
.pool-shimmer{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.45) 0%,transparent 65%);pointer-events:none;animation:shimmer 5s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:.12;transform:scale(1)}50%{opacity:.6;transform:scale(1.5)}}
/* Burbujas que ascienden con bamboleo */
.bubble{position:absolute;bottom:-50px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.65),rgba(255,255,255,.1));box-shadow:inset 0 0 6px rgba(255,255,255,.3);pointer-events:none;animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:.75}50%{transform:translateY(-55vh) translateX(-14px)}90%{opacity:.5}100%{transform:translateY(-115vh) translateX(14px);opacity:0}}
/* Logo: ola flotando con halo */
.login-logo{font-size:72px;margin-bottom:2px;animation:logoFloat 4s ease-in-out infinite;filter:drop-shadow(0 6px 22px rgba(0,0,0,.3));position:relative}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(-3deg) scale(1)}50%{transform:translateY(-14px) rotate(3deg) scale(1.08)}}
/* Anillo de luz detrás del logo */
.logo-halo{position:absolute;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(120,220,255,.35) 0%,transparent 70%);top:-38px;left:50%;transform:translateX(-50%);animation:haloPulse 4s ease-in-out infinite;pointer-events:none;z-index:-1}
@keyframes haloPulse{0%,100%{opacity:.4;transform:translateX(-50%) scale(1)}50%{opacity:.8;transform:translateX(-50%) scale(1.25)}}
.login-title-wrap{position:relative;margin-bottom:5px}
.login-title{font-size:34px;font-weight:800;color:#fff;letter-spacing:1.5px;text-shadow:0 2px 24px rgba(0,0,0,.35);animation:fadeUp .8s ease both}
.login-title .accent{background:linear-gradient(90deg,#fff 0%,#7FE0FF 25%,#fff 50%,#7FE0FF 75%,#fff 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 2.5s linear infinite}
@keyframes shine{to{background-position:200% center}}
.login-sub{font-size:12.5px;color:rgba(255,255,255,.78);margin-bottom:32px;animation:fadeUp 1s ease both;text-align:center}
.login-who{font-size:14px;color:#fff;margin-bottom:16px;font-weight:600;animation:fadeUp 1.2s ease both}
.login-swimmers{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:24px;max-width:340px}
.login-sw-btn{padding:14px 28px;border-radius:24px;border:2px solid rgba(255,255,255,.45);background:rgba(255,255,255,.14);color:#fff;font-size:15px;font-weight:700;cursor:pointer;backdrop-filter:blur(6px);transition:transform .2s,background .2s,box-shadow .2s;animation:popIn .5s ease both;box-shadow:0 4px 14px rgba(0,0,0,.12)}
.login-sw-btn:active{transform:scale(.95)}
.login-sw-btn:hover{background:rgba(255,255,255,.24);transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.2)}
.login-sw-btn.on{background:#fff;color:#0D2B55;border-color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.25)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(.8)}60%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
.pin-display{display:flex;gap:12px;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.4);background:transparent}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:14px}
.pin-key{width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:24px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pin-key:active{background:rgba(255,255,255,.25)}
.pin-key.fn{font-size:14px}
.login-err{color:#FADBD8;font-size:13px;margin-top:16px;height:18px}
.login-hint{color:rgba(255,255,255,.5);font-size:11px;margin-top:20px;text-align:center;max-width:280px;line-height:1.5}

</style>
</head>
<body>

<div id="login-screen">
  <div class="pool-wave w1"></div>
  <div class="pool-wave w2"></div>
  <div class="pool-wave w3"></div>
  <div class="pool-shimmer" style="width:120px;height:120px;top:25%;left:15%"></div>
  <div class="pool-shimmer" style="width:80px;height:80px;top:60%;right:18%;animation-delay:2s"></div>
  <div class="pool-shimmer" style="width:100px;height:100px;bottom:20%;left:25%;animation-delay:3.5s"></div>
  <div class="bubble" style="width:14px;height:14px;left:12%;animation-duration:9s;animation-delay:0s"></div>
  <div class="bubble" style="width:9px;height:9px;left:20%;animation-duration:7s;animation-delay:1.5s"></div>
  <div class="bubble" style="width:18px;height:18px;left:30%;animation-duration:11s;animation-delay:.8s"></div>
  <div class="bubble" style="width:6px;height:6px;left:36%;animation-duration:6s;animation-delay:3.4s"></div>
  <div class="bubble" style="width:7px;height:7px;left:46%;animation-duration:6.5s;animation-delay:2.2s"></div>
  <div class="bubble" style="width:13px;height:13px;left:54%;animation-duration:8.5s;animation-delay:.6s"></div>
  <div class="bubble" style="width:10px;height:10px;left:62%;animation-duration:9.5s;animation-delay:.3s"></div>
  <div class="bubble" style="width:5px;height:5px;left:70%;animation-duration:5.5s;animation-delay:2.9s"></div>
  <div class="bubble" style="width:16px;height:16px;left:76%;animation-duration:8s;animation-delay:1.8s"></div>
  <div class="bubble" style="width:8px;height:8px;left:84%;animation-duration:7.5s;animation-delay:3s"></div>
  <div class="bubble" style="width:12px;height:12px;left:90%;animation-duration:10.5s;animation-delay:.9s"></div>
  <div class="bubble" style="width:11px;height:11px;left:6%;animation-duration:10s;animation-delay:2.6s"></div>
  <div class="bubble" style="width:7px;height:7px;left:42%;animation-duration:7s;animation-delay:4s"></div>
  <div class="bubble" style="width:15px;height:15px;left:58%;animation-duration:9s;animation-delay:3.6s"></div>
  <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%">
  <div style="position:relative;display:flex;justify-content:center"><div class="logo-halo"></div><div class="login-logo">🌊</div></div>
  <div class="login-title-wrap"><div class="login-title"><span class="accent">ORION</span> Master</div></div>
  <div class="login-sub">App creada por Felgonino</div>
  <div class="login-who" id="login-who">¿Quién eres?</div>
  <div class="login-swimmers" id="login-swimmers"></div>
  <div class="pin-display" id="pin-display" style="display:none">
    <div class="pin-dot" id="pd-0"></div>
    <div class="pin-dot" id="pd-1"></div>
    <div class="pin-dot" id="pd-2"></div>
    <div class="pin-dot" id="pd-3"></div>
  </div>
  <div class="pin-pad" id="pin-pad" style="display:none"></div>
  <div class="login-err" id="login-err"></div>
  <div class="login-hint" id="login-hint"></div>
  </div>
</div>

<div class="app">
  <div class="tb">
    <div class="tb-logo">🌊</div>

let USUARIO_ACTUAL = null;

// ═══════════════════════════════════════════════════
// LOGIN PIN
// ═══════════════════════════════════════════════════
let loginSel = null;
let pinBuffer = '';

function renderLogin() {
  const cont = document.getElementById('login-swimmers');
  cont.innerHTML = '';
  NADADORES.forEach((n, i) => {
    const btn = document.createElement('button');
    btn.className = 'login-sw-btn';
    btn.textContent = n.emoji + ' ' + n.nombre;
    btn.style.animationDelay = (0.3 + i*0.15) + 's';
    if (n.color) { btn.style.borderColor = 'rgba(255,255,255,.5)'; }
    btn.onclick = () => selLoginSwimmer(i);
    cont.appendChild(btn);
  });
  // hint about default PINs (solo primera vez)
  document.getElementById('login-hint').textContent = 'Ingresa con tu PIN personal';
}

function selLoginSwimmer(i) {
  loginSel = i;
  pinBuffer = '';
  document.querySelectorAll('.login-sw-btn').forEach((b,idx) => b.classList.toggle('on', idx===i));
  document.getElementById('login-who').textContent = 'Ingresa tu PIN, ' + NADADORES[i].nombre;
  document.getElementById('pin-display').style.display = 'flex';
  document.getElementById('pin-pad').style.display = 'grid';
  document.getElementById('login-hint').style.display = 'none';
  renderPinPad();
  updatePinDots();
}

function renderPinPad() {
  const pad = document.getElementById('pin-pad');
  pad.innerHTML = '';
  const keys = ['1','2','3','4','5','6','7','8','9','C','0','OK'];
  keys.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'pin-key' + (k==='C'||k==='OK' ? ' fn' : '');
    btn.textContent = k;
    btn.onclick = () => pinKey(k);
    pad.appendChild(btn);
  });
}

function pinKey(k) {
  if (k === 'C') { pinBuffer = pinBuffer.slice(0,-1); }
  else if (k === 'OK') { checkPin(); return; }
  else if (pinBuffer.length < 4) { pinBuffer += k; }
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 200);
}

function updatePinDots() {
  for (let i=0; i<4; i++) {
    document.getElementById('pd-'+i).classList.toggle('filled', i < pinBuffer.length);
  }
}

function cerrarSesion() {
  USUARIO_ACTUAL = null;
  loginSel = null;
  pinBuffer = '';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('pin-display').style.display = 'none';
  document.getElementById('pin-pad').style.display = 'none';
  document.getElementById('login-hint').style.display = 'block';
  document.getElementById('login-who').textContent = '¿Quién eres?';
  document.getElementById('login-err').textContent = '';
  renderLogin();
}

function checkPin() {
  if (loginSel === null) return;
  const n = NADADORES[loginSel];
  if (pinBuffer === n.pin) {
    USUARIO_ACTUAL = n.nombre;
    try { document.getElementById('login-screen').classList.add('hidden'); } catch(e){}
    try { document.getElementById('btn-logout').style.display = 'block'; } catch(e){}
    try {
      var tbs = document.querySelector('.tb-s');
      if (tbs) tbs.textContent = n.emoji + ' ' + n.nombre + ' · 2026';
    } catch(e){}
    try {
      goTab('hoy');
    } catch(e){
      console.error('Error al renderizar Hoy:', e);
      // Aunque falle el render, el usuario ya está dentro
    }
  } else {
    document.getElementById('login-err').textContent = 'PIN incorrecto';
    pinBuffer = '';
    updatePinDots();
    setTimeout(() => document.getElementById('login-err').textContent = '', 2000);
  }
}

  { termino:'Pull-buoy', definicion:'Flotador de espuma que se coloca entre los muslos para aislar el trabajo de brazos, eliminando el aporte del pateo.', ejecucion:'Colócalo firme entre la parte alta de los muslos, no en las rodillas. No patees. Enfócate en la tracción, el agarre del agua y el rolido. Ideal para series de técnica de brazada, trabajo de respiración y resistencia de tren superior. Úsalo cuando el objetivo sea mejorar la brazada, no cuando el objetivo sea velocidad total.' },

  { termino:'Palas', definicion:'Paletas plásticas que se colocan en las manos para aumentar la superficie de propulsión y la resistencia al avance.', ejecucion:'Generan más carga sobre hombros y espalda. Úsalas solo cuando ya tienes buena técnica de brazada — amplifican tanto los movimientos correctos como los errores. Ideales para fuerza específica de natación. Combínalas con pull-buoy. Nunca en sets de velocidad máxima ni cuando estés fatigado.' },
  { termino:'Snorkel frontal', definicion:'Tubo de respiración frontal que permite nadar sin rotar la cabeza para respirar.', ejecucion:'Colócalo centrado en la frente, bien ajustado. Permite concentrarse completamente en la técnica de brazada y posición corporal sin interrumpir el ciclo de movimiento. Ideal para drill de técnica, para corregir el rolido y para sets donde la respiración distorsiona la postura. Úsalo en libre y espalda principalmente.' },
  { termino:'DPS (Distancia por Brazada)', definicion:'Metros que avanzas por cada ciclo completo de brazada. Es el indicador más directo de eficiencia técnica.', ejecucion:'Se mide contando brazadas por largo y dividiendo la distancia entre ese número. En piscina 25m, un DPS de 9-11m por brazada es bueno para master. Felipe debe enfocarse en aumentar su DPS. Se mejora con mejor agarre del agua, menos deslizamiento lateral y rolido más completo.' },
  { termino:'Rolido', definicion:'Rotación del cuerpo sobre su eje longitudinal durante el nado de libre y espalda.', ejecucion:'En libre: el cuerpo debe rotar 35-45 grados hacia cada lado sincronizado con la brazada. En espalda: la rotación es similar pero en posición dorsal. Un rolido correcto permite mayor alcance de la brazada, reduce la resistencia frontal y facilita la respiración. Error común: rotar los hombros sin rotar las caderas.' },
  { termino:'Agarre del agua', definicion:'Fase inicial de la brazada donde la mano \'engancha\' el agua para comenzar la tracción.', ejecucion:'La mano entra al agua con los dedos ligeramente separados, se extiende hacia adelante y hacia abajo en un ángulo de 45°, luego \'agarra\' el agua antes de iniciar el tirón. Un mal agarre (mano que resbala) desperdicia toda la energía de la brazada. Practicar con el ejercicio \'catch-up\' o con snorkel frontal.' },
  { termino:'Entrada de mano', definicion:'Momento y posición en que la mano entra al agua al inicio de la brazada.', ejecucion:'En libre: la mano debe entrar alineada con el hombro (no cruzando la línea media), con los dedos primero, pulgar ligeramente hacia abajo. En espalda: la mano entra con el dedo meñique primero, brazo extendido alineado con el hombro. Una entrada incorrecta genera resistencia y desvía el cuerpo.' },
  { termino:'Pateo 6 tiempos', definicion:'Patrón de patada en libre donde se dan 6 golpes de pies por cada ciclo completo de brazada (2 brazadas = 6 patadas).', ejecucion:'Es el patrón más eficiente para velocidad y fondo en aguas abiertas. Las patadas deben ser pequeñas, rígidas y generadas desde la cadera — no desde la rodilla. Los pies apenas deben romper la superficie. En piscina 25m este patrón es el estándar. Sergio ya lo ejecuta bien; Felipe debe controlarlo bajo fatiga.' },
  { termino:'Subacuático', definicion:'Fase de deslizamiento bajo el agua después de la salida desde el bloque o después de cada viraje, con ondulación de delfín.', ejecucion:'Es la parte más rápida del nado en competencia — puedes superar tu velocidad de nado en superficie. En libre y espalda se recomienda mantener el subacuático entre 7-12 metros. La ondulación parte desde el pecho y las caderas, no solo de los pies. En el entrenamiento se practica con series de salidas y virajes.' },
  { termino:'IM (Individual Medley / Combinado)', definicion:'Nado de los 4 estilos en este orden fijo: Mariposa → Espalda → Pecho → Libre. En competencia o en bloques de entrenamiento.', ejecucion:'En 100m IM: 25m Mariposa + 25m Espalda + 25m Pecho + 25m Libre. En 200m IM: 50m de cada estilo. Las transiciones entre estilos ocurren en el viraje — son críticas y hay reglas técnicas específicas. En entrenamiento, cuando decimos 4×100 Combinado (IM) cada repetición de 100m se nada con los 4 estilos en ese orden.' },
  { termino:'Drill', definicion:'Ejercicio técnico que aísla y exagera un componente específico de la brazada para corregirlo o perfeccionarlo.', ejecucion:'Se ejecuta lento, con máxima concentración en el movimiento específico. No busca velocidad. Ejemplos: nado con un solo brazo (aísla la brazada), catch-up (trabaja el alcance), punta de flecha (trabaja la posición hidrodinámica). Siempre viene acompañado de la indicación del foco específico.' },
  { termino:'Aeróbico (A1 / A2)', definicion:'Sistema energético que usa oxígeno para producir energía. Es la base de todo el entrenamiento de fondo y resistencia.', ejecucion:'A1 es el ritmo más suave — se puede mantener una conversación mientras nadas. A2 es algo más intenso pero sostenible por largos períodos. En piscina 25m, para Felipe el ritmo A1 es ~1:55-2:05/100m y A2 ~1:45-1:55/100m. Para Sergio son ~5-8 seg más rápido. El trabajo aeróbico mejora la base cardiorrespiratoria y la economía de nado.' },
  { termino:'Umbral anaeróbico (AN1)', definicion:'Intensidad máxima a la que el cuerpo puede metabolizar el lactato tan rápido como lo produce. Es el ritmo de competencia en pruebas de 400-1500m.', ejecucion:'Se siente como esfuerzo controlado pero exigente — no se puede conversar. En piscina, para Felipe ~1:40-1:48/100m y para Sergio ~1:33-1:40/100m. El trabajo en umbral es el más específico para mejorar el rendimiento en competencia. Se identifica como \'tempo\' en el programa.' },
  { termino:'CRTP (Capacidad de Repetición en Trabajo de Alta Intensidad)', definicion:'Capacidad del cuerpo para recuperarse entre esfuerzos intensos y repetir el mismo nivel de rendimiento.', ejecucion:'Se trabaja con series cortas (25-50m) a máxima intensidad con descansos cortos. Ejemplo: 8×25 máximo con 30seg descanso. El objetivo es mantener la velocidad de los últimos 25 igual que los primeros. Clave para mejorar el cierre en competencia — especialmente importante para Sergio.' },
  { termino:'VO2max', definicion:'Volumen máximo de oxígeno que el cuerpo puede utilizar por minuto. Determina el techo de la capacidad aeróbica.', ejecucion:'Se trabaja con series de 3-5 minutos al 90-95% del esfuerzo máximo con descansos largos (2-3 min). En piscina 25m son series de 200-400m. Este trabajo genera mucha fatiga — se usa con moderación, generalmente en la fase de desarrollo del plan. Mejora el motor aeróbico a largo plazo.' },
  { termino:'Tempo / Ritmo de carrera', definicion:'Velocidad específica a la que se debe completar una prueba en competencia.', ejecucion:'El objetivo de un set de tempo es \'memorizar\' esa sensación de ritmo. Se trabaja con series de la distancia de competencia o partes de ella. Es el tipo de trabajo más específico de cada prueba. Ejemplo: si el objetivo es 100m combinado en 1:30, el tempo de trabajo es ~1:35-1:38/100m en entrenamiento.' },
  { termino:'Resistencia de velocidad', definicion:'Capacidad de mantener una velocidad alta por más tiempo del que duraría naturalmente.', ejecucion:'Series medianas (50-100m) a ritmo más rápido que el umbral, con descanso suficiente para recuperarse. Ejemplo: 6×50m a ritmo máximo sostenible con 45seg descanso. Desarrolla la capacidad de aguantar el ritmo de competencia al final de la prueba — el \'cierre\'.' },
  { termino:'Activación / Calentamiento', definicion:'Fase inicial de la sesión que prepara el cuerpo fisiológica y neuromuscularmente para el trabajo principal.', ejecucion:'Siempre empieza suave y va progresando en intensidad. Incluye nado suave, drill técnico y algunas aceleraciones cortas. Nunca se omite — el rendimiento en el bloque principal depende de la calidad del calentamiento. Duración típica en piscina 25m: 300-500m.' },
  { termino:'Afloje / Vuelta a la calma', definicion:'Fase final de la sesión para facilitar la recuperación y eliminar el lactato muscular.', ejecucion:'Nado suave, sin esfuerzo, preferentemente en estilo libre o espalda. Activa la circulación para limpiar los metabolitos de la fatiga. Nunca se omite si se quiso entrenar bien — una sesión sin afloje compromete la recuperación para el próximo entrenamiento. Duración típica: 150-200m.' },
  { termino:'Tiempo de salida (@ / por)', definicion:'Intervalo de tiempo desde que sale una repetición hasta que sale la siguiente, incluyendo el nado y el descanso.', ejecucion:'Ejemplo: \'4×100 @2:00\' significa que cada 2 minutos parte un 100m. Si nadas el 100 en 1:45, tienes 15seg de descanso. Si lo nadas en 2:05, saliste tarde y el set pierde su objetivo. El tiempo de salida controla la intensidad y el descanso simultáneamente. Es más preciso que indicar el descanso fijo.' },
  { termino:'Descanso fijo', definicion:'Tiempo de pausa entre repeticiones medido desde que terminas hasta que empiezas la siguiente.', ejecucion:'Ejemplo: \'6×50 desc 30seg\' significa 30 segundos de pausa después de cada 50m. A diferencia del tiempo de salida, el descanso fijo es igual para todos independiente del ritmo. Se usa más en sets de velocidad donde la recuperación completa es necesaria para mantener la calidad del sprint.' },
  { termino:'Negativo split', definicion:'Estrategia de nadar la segunda mitad de una distancia más rápido que la primera.', ejecucion:'Es la estrategia de pacing más eficiente en competencia. Evita salir demasiado rápido y morir al final. En entrenamiento se practica en series largas: los primeros 200m más suaves que los últimos 200m. Clave para Sergio, que tiende a nadar conservador — el negativo split lo obliga a atacar en la segunda mitad.' },
  { termino:'Pirámide', definicion:'Estructura de series donde la distancia o intensidad sube y luego baja (o solo sube).', ejecucion:'Ejemplo ascendente: 50 + 100 + 150 + 200m. Ejemplo pirámide completa: 50+100+150+200+150+100+50m. Permite trabajar distintas longitudes en un mismo set, generando variedad de estímulos. Las distancias cortas al inicio activan la velocidad; las largas en el centro trabajan resistencia; las cortas al final trabajan cierre bajo fatiga.' },
  { termino:'Salida desde bloque', definicion:'Salida de competencia desde el bloque de salida (trampolín), disponible en libre, pecho, mariposa y combinado.', ejecucion:'El objetivo es maximizar la distancia del salto y la profundidad para un subacuático largo. Posición: agarre del borde del bloque, rodillas semiflexionadas, cabeza abajo. Al señal: extensión explosiva de todo el cuerpo hacia adelante y arriba. En entrenamiento se practica con series de 25m desde el bloque.' },
  { termino:'Salida de espaldas', definicion:'Salida específica para espalda: desde el agua, agarrado al bloque, cuerpo en posición de tensión.', ejecucion:'Pies en la pared, rodillas semiflexionadas, cuerpo arqueado. Al señal: empuje explosivo de piernas, arqueo de espalda, brazos hacia atrás. El cuerpo debe entrar al agua extendido para maximizar el subacuático. Es técnicamente compleja — requiere práctica específica.' },
  { termino:'Viraje', definicion:'Cambio de dirección en el extremo de la piscina para continuar nadando. Cada estilo tiene su técnica específica.', ejecucion:'En libre y espalda: volteo (tumba-turn) — el nadador da un medio giro al llegar a la pared, empuja con los pies y sale subacuático. En pecho y mariposa: toque con ambas manos simultáneo antes de empujar. La pérdida de velocidad en el viraje puede ser 0.3-0.8 segundos — un viraje bien hecho marca la diferencia en competencia.' },
  { termino:'Drafting', definicion:'Técnica de nadar en la estela de otro nadador para reducir la resistencia hidrodinámica y ahorrar energía.', ejecucion:'Más relevante en aguas abiertas que en piscina. El nadador que \'draftea\' se posiciona justo detrás (0.5-1m) o a un lado de los pies del nadador delantero. Puede ahorrar 10-20% de energía. Felipe lo aprovecha bien en aguas abiertas. En piscina se usa en sets de entrenamiento en grupo para simular competencia.' },
  { termino:'Pacing / Distribución de esfuerzo', definicion:'Estrategia de cómo distribuir la energía a lo largo de una prueba o serie.', ejecucion:'Tipos: uniforme (mismo ritmo todo el tiempo), negativo (segunda mitad más rápido), positivo (primera mitad más rápido — poco recomendable). En pruebas cortas (50m) se sale al máximo. En pruebas largas (800-1500m) el pacing uniforme o negativo es lo más eficiente. Aprender a regular el esfuerzo es una habilidad que se entrena explícitamente.' },
  { termino:'Sighting (Navegación)', categoria:'Competencia', definicion:'Técnica de aguas abiertas que consiste en levantar la vista hacia adelante para orientarse hacia una boya o referencia, sin perder el ritmo de nado.', ejecucion:'Levanta los ojos justo por encima del agua (no toda la cabeza) cada 6-10 brazadas, mira la referencia, vuelve a bajar la cara. Coordínalo con la respiración para no frenar.' },
  { termino:'Glide / Deslizamiento', categoria:'Técnica de nado', definicion:'Fase de planeo en el estilo pecho donde el cuerpo avanza estirado tras la tracción de brazos, aprovechando la inercia antes del siguiente ciclo.', ejecucion:'Tras la brazada de pecho, estira completamente brazos y cuerpo en posición hidrodinámica y mantén el deslizamiento un instante antes de iniciar el siguiente ciclo. Maximiza la distancia por brazada.' },
  { termino:'Broken / Series rotas', categoria:'Sistemas y trabajo', definicion:'Repetición de una distancia de carrera dividida en tramos con pausas cortas (10-15seg), para nadar a ritmo de competencia acumulando menos fatiga que la distancia completa.', ejecucion:'Ej: un 100 roto = 50 + 50 con 10-15seg de pausa en el medio. Nada cada tramo al ritmo objetivo de la prueba completa para proyectar tu tiempo de carrera.' },
  { termino:'Build / Progresivo', categoria:'Sistemas y trabajo', definicion:'Repetición en la que se acelera gradualmente, empezando suave y terminando a velocidad alta o de carrera.', ejecucion:'Comienza el largo o la repetición a ritmo cómodo y aumenta la velocidad progresivamente hasta terminar fuerte. Útil para calentar y activar sin shock.' },
  { termino:'Taper / Afinamiento', categoria:'Sistemas y trabajo', definicion:'Reducción progresiva del volumen de entrenamiento en los días previos a una competencia, manteniendo algo de intensidad, para llegar descansado y supercompensar.', ejecucion:'En la última semana baja el volumen total 40-60% pero conserva toques de velocidad a ritmo de carrera. El objetivo es llegar fresco, no construir forma.' },

function getBloqueActivo() {

}
function getAllSesiones() { return getBloqueActivo().semanas.flatMap(w=>w.sesiones); }
function getSesion(id) { return BLOQUES.flatMap(b=>b.semanas.flatMap(w=>w.sesiones)).find(s=>s.id===id); }
function completadas(id) { 
  return CACHE.filter(r=>r.Sesion_Plan===id && r.ID && r.ID!=='' && r.ID!=='ID' && r.Pendiente!=='SI' && r.Pendiente!==true);
}
function todayStr() { const d=new Date(); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function z(n){ return String(n).padStart(2,'0'); }
function genId(nad) {
  const d=new Date(); const ds=d.getFullYear()+z(d.getMonth()+1)+z(d.getDate());
  // Count today's records for this nadador - normalize date formats (Sheets uses ISO, local uses YYYY-MM-DD)
  const dsDash = d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());
  const sufijo = (nad==='Felipe'?'F':'S');
  // Find existing IDs for today to avoid collision
  const todayIds = CACHE.filter(function(r){
    var rf = String(r.Fecha||'').substring(0,10);
    return (rf===dsDash) && r.Nadador===nad && r.ID;
  }).map(function(r){ return r.ID; });
  // Find next available number
  var n = 1;
  while (todayIds.indexOf(ds+'_'+z(n)+sufijo) >= 0) n++;
  return ds+'_'+z(n)+sufijo;
}
function scClass(tipo){ return {A:'ta',B:'tb2',C:'tc'}[tipo]||''; }

// ═══════════════════════════════════════════════════
// MODELO ESTRUCTURADO DE BLOQUES + cálculo de distancias
// ═══════════════════════════════════════════════════
// Un bloque puede tener "series": [{reps, dist, estilo, implemento, salida, descanso}]
// La distancia del bloque = suma de reps*dist de todas las series.
// Si no tiene series (bloque antiguo con solo desc), se intenta extraer de la desc.

function calcDistBloque(b) {
  // Solo cálculo EXACTO desde estructura. Nunca adivinar del texto.
  if (b.series && b.series.length) {
    return b.series.reduce(function(t, s){
      var reps = parseInt(s.reps) || 1;
      var dist = parseInt(s.dist) || 0;
      return t + reps * dist;
    }, 0);
  }
  if (b.dist_total != null && b.dist_total !== '') return parseInt(b.dist_total) || 0;
  // Sin estructura: distancia desconocida (null), no se adivina
  return null;
}

function calcDistSesion(sesion) {
  if (!sesion || !sesion.bloques) return null;
  var total = 0;
  var hayDato = false;
  var completo = true;
  sesion.bloques.forEach(function(b){
    var d = calcDistBloque(b);
    if (d === null) { completo = false; }
    else { total += d; hayDato = true; }
  });
  if (!hayDato) return null;
  // total parcial si algún bloque no tiene dato; marcamos con flag
  return { total: total, completo: completo };
}

// Formatea la estructura de un bloque a texto legible
function fmtEstructura(b) {
  if (b.series && b.series.length) {
    return b.series.map(function(s){
      var txt = (s.reps && s.reps > 1 ? s.reps + '×' : '') + s.dist + 'm';
      if (s.estilo) txt += ' ' + s.estilo;
      if (s.implemento) txt += ' (' + s.implemento + ')';
      var tiempos = [];
      if (s.salida) tiempos.push('salida ' + s.salida);
      if (s.descanso) tiempos.push('desc ' + s.descanso);
      if (tiempos.length) txt += ' · ' + tiempos.join(', ');
      return txt;
    }).join('  +  ');
  }
  return b.desc || '';
}
function toast(msg,ms=2500){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),ms); }
function setLoad(pct,msg,sub){ document.getElementById('lo-f').style.width=pct+'%'; document.getElementById('lo-m').textContent=msg; document.getElementById('lo-s').textContent=sub||''; }
function lov(show){ document.getElementById('lov').classList[show?'add':'remove']('on'); }
function syncDot(st){ const d=document.getElementById('sdot'); d.className='sdot '+st; }
function frow(lbl,val,cls){ const v=(val===null||val===undefined||val==='')? '—':val; return '<div class="fr"><span class="fl">'+lbl+'</span><span class="fv '+(v==='—'?'na':(cls||''))+'">'+v+'</span></div>'; }
function evalRitmo(real, obj) {
  if(!real||!obj) return null;
  const p=r=>{ const m=String(r).replace(/[^0-9:]/g,'').match(/(\d+):(\d+)/); return m?parseInt(m[1])*60+parseInt(m[2]):null; };
  const rv=p(real), parts=String(obj).split('-');
  if(parts.length<2) return null;
  const lo=p(parts[0]),hi=p(parts[1]);
  if(!rv||!lo||!hi) return null;
  if(rv<lo) return 'win'; if(rv<=hi) return 'ok'; return 'miss';
}

async function sheetsLoad() {
  syncDot('load');
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),8000);
  try {
    const r=await fetch('https://orion-proxy.felgonino.workers.dev'+'?t='+Date.now(),{signal:ctrl.signal,cache:'no-cache'});
    clearTimeout(t);
    const j=await r.json();
    if(j.ok&&j.data){ 
      var _raw=j.data.filter(x=>x.ID&&x.ID!==''&&x.ID!=='ID'&&x.Nadador).map(function(r){
        if(!r.Pendiente&&!r.Distancia_m&&!r.Ritmo_100m&&!r.Tiempo_Total) r.Pendiente='SI';
        return r;
      });
      // Deduplicar SOLO filas idénticas (mismo ID+Nadador+Timestamp), nunca por ID solo
      // porque pueden existir registros legítimos con IDs duplicados de versiones antiguas
      var _seen={};
      CACHE=_raw.filter(function(r){
        var key = r.ID+'|'+r.Nadador+'|'+(r.Timestamp||'')+'|'+(r.Distancia_m||'')+'|'+(r.Sesion_Plan||'');
        if(_seen[key]) return false;
        _seen[key]=true;
        return true;
      });
      cacheOk=true; 
      syncDot('ok'); 
      // Preselect historial to current user if logged in
      if(USUARIO_ACTUAL && !HIST_NAD) HIST_NAD = USUARIO_ACTUAL;
    }
    else syncDot('err');
  } catch(e){ clearTimeout(t); syncDot('err'); }
  // Cargar competencias
  try {
    const rc=await fetch('https://orion-proxy.felgonino.workers.dev?tipo=competencias&t='+Date.now());
    const jc=await rc.json();
    if(jc.ok&&jc.data){ COMPETENCIAS=jc.data.filter(function(x){ return x.Nadador && x.Estilo && x.Tiempo; }); }
  } catch(e){}
}

function getBloquesVisibles() {
  var arch = getArchivados();
  return BLOQUES.filter(function(b){ return arch.indexOf(b.id) < 0; });
}

function esSesionArchivada(sesionId) {
  var arch = getArchivados();
  if (!arch.length) return false;
  // Buscar a qué bloque pertenece la sesión
  for (var bi=0; bi<BLOQUES.length; bi++) {
    var b = BLOQUES[bi];
    for (var wi=0; wi<b.semanas.length; wi++) {
      for (var si=0; si<b.semanas[wi].sesiones.length; si++) {
        if (b.semanas[wi].sesiones[si].id === sesionId) {
          return arch.indexOf(b.id) >= 0;
        }
      }
    }
  }
  return false;
}

function getArchivados() {
  try { return JSON.parse(localStorage.getItem('orion_archivados')||'[]'); }
  catch(e){ return []; }
}

function setArchivados(arr) {

function setBloque(id) {
  BLOQUES.forEach(b=>b.activo=b.id===id);
  renderPlan(); renderHoy();
}

function archivarBloque(id) {
  var bl = BLOQUES.find(function(b){return b.id===id;});
  if (!bl) return;
  // Contar sesiones con resultados reales
  var conResultados = 0;
  bl.semanas.forEach(function(sem){
    sem.sesiones.forEach(function(s){
      var comp = completadas(s.id).filter(function(r){return !r.Pendiente||r.Pendiente===''||r.Pendiente==='NO';});
      if (comp.length > 0) conResultados++;
    });
  });
  var msg = '¿Archivar "'+bl.nombre.replace(/🏁|🏊/g,'').trim()+'"?\n\n';
  if (conResultados > 0) {
    msg += 'Las '+conResultados+' sesión(es) con resultados ya guardados permanecen en el Historial. ';
  }
  msg += 'El plan desaparecerá de Hoy y Plan. Podrás restaurarlo después desde "Archivados".';
  if (!confirm(msg)) return;
  var arch = getArchivados();
  if (arch.indexOf(id) < 0) arch.push(id);
  setArchivados(arch);
  // Activar el primer bloque visible
  var vis = getBloquesVisibles();
  if (vis.length) { BLOQUES.forEach(function(b){b.activo=b.id===vis[0].id;}); }
  toast('🗄️ Plan archivado');
  renderPlan(); renderHoy();
}

function restaurarBloque(id) {
  var arch = getArchivados().filter(function(x){ return x !== id; });
  setArchivados(arch);
  BLOQUES.forEach(function(b){b.activo=b.id===id;});
  toast('✅ Plan restaurado');
  goTab('plan');
}

function mostrarArchivados() {
  var arch = getArchivados();
  var h = '<div class="lbl">🗄️ Bloques archivados</div>';
  if (arch.length === 0) {
    h += '<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">No hay bloques archivados.</div>';

async function guardarAntecedentes() {
  var checks = document.querySelectorAll('.antec-chk:checked');
  if (!checks.length) { toast('Marca al menos un antecedente'); return; }
  var antecedentes = Array.from(checks).map(function(ch){ return decodeURIComponent(ch.dataset.antec); });
  var sesionNombre = (S.extracted && S.sesionPlan) ? S.sesionPlan : 'Sesión libre';
  try {
    toast('Guardando antecedentes...');
    await fetch('https://orion-proxy.felgonino.workers.dev', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        action:'antecedente',
        id: Date.now(),
        fecha: todayStr(),
        nadador: S.nadador,
        antecedentes: antecedentes,
        origen: sesionNombre
      })
    });
    // Actualizar cache local de antecedentes
    if(!ANTECEDENTES_CACHE[S.nadador]) ANTECEDENTES_CACHE[S.nadador]=[];
    antecedentes.forEach(function(a){ ANTECEDENTES_CACHE[S.nadador].push(a); });

    checks.forEach(function(ch){ ch.checked=false; ch.disabled=true; });

  }
}

function getNoEjecutadas() {
  try { return JSON.parse(localStorage.getItem('orion_no_ejecutadas')||'{}'); }
  catch(e){ return {}; }
}
function setNoEjecutadas(obj) {
  try { localStorage.setItem('orion_no_ejecutadas', JSON.stringify(obj)); } catch(e){}
}
function esNoEjecutada(sesionId, nadador) {
  if (!nadador) return false;
  var data = getNoEjecutadas();
  return !!(data[nadador] && data[nadador].indexOf(sesionId) >= 0);
}
function marcarNoEjecutada(sesionId) {
  if (!S.nadador) { toast('Primero selecciona tu nombre arriba'); return; }
  var data = getNoEjecutadas();
  if (!data[S.nadador]) data[S.nadador] = [];
  if (data[S.nadador].indexOf(sesionId) < 0) data[S.nadador].push(sesionId);
  setNoEjecutadas(data);
  toast('Sesión marcada como no ejecutada');
  renderCargar1();
}
function quitarNoEjecutada(sesionId) {
  var data = getNoEjecutadas();
  if (data[S.nadador]) {
    data[S.nadador] = data[S.nadador].filter(function(id){ return id !== sesionId; });
    setNoEjecutadas(data);
  }
  toast('Sesión reactivada');
  renderCargar1();
}

async function ejecutarGuardarPendiente() {
  var plan = getSesion(S.sesionPlan);

  // If resuming a pending session, update that record (same ID/fecha)

  var reg = {
    id: isPendiente ? S.pendienteId : genId(S.nadador),
    fecha: isPendiente && S.pendienteFecha ? String(S.pendienteFecha).substring(0,10) : todayStr(),
    nadador: S.nadador,
    sesionPlan: isPendiente ? (S.libreNombre||S.sesionPlan) : S.sesionPlan,
    _update: isPendiente,
    medio: 'Piscina',
    resumen: { distancia_m:'', pendiente:true },

    evaluacion: {},

  };

  lov(true); setLoad(40,'Guardando plan...','');

      }).catch(function(){});
    }
  }

  lov(false);
  if (ok) {
    // Add to local cache as pending so Hoy shows it
    CACHE.push({ID:reg.id,Fecha:reg.fecha,Nadador:reg.nadador,Sesion_Plan:reg.sesionPlan,Distancia_m:'',Ritmo_100m:'',SWOLF:'',FC_Media:'',Pendiente:'SI',_pendReg:reg});

      'Aparece en <b>Hoy</b> y <b>Plan</b> para cargar fotos cuando quieras.</div></div>' +
      '<button class="btn" onclick="renderCargar1()">📤 Registrar otra sesión</button>' +

  }
}

function retomarLibreConNad(nombre, nadador) {
  if (nombre && nombre.dataset) { nadador = nombre.dataset.n; nombre = nombre.dataset.s; }

  var reg = CACHE.find(function(r){
    return (r.Pendiente==='SI'||r.Pendiente===true) && r.Sesion_Plan===nombre && r.Nadador===nadador;
  });
  var pendId = reg ? reg.ID : null;
  var pendFecha = reg ? reg.Fecha : null;
  // Restore medio info for OA analysis
  if (reg && reg.Medio) {
    var med = reg.Medio;
    if (med.indexOf('Mar')>=0||med.indexOf('Lago')>=0||med.indexOf('Río')>=0||med.indexOf('Rio')>=0) {
      S.libreTipoMedio = 'o';

  }

  // goTab calls renderCargar1 which resets S — set values AFTER
  goTab('cargar');
  S.sesionPlan = 'LIBRE';
  S.libreNombre = nombre;
  S.nadador = nadador;
  S.files = [];
  S.extracted = null;
  S.pendienteId = pendId;
  S.pendienteFecha = pendFecha;

  if (reg && reg.ID) {
    // Load bloques from Sheets and show checklist
    lov(true); setLoad(50,'Cargando bloques del entrenamiento...','');
    fetch('https://orion-proxy.felgonino.workers.dev?tipo=detalle_plan&sesion_id='+encodeURIComponent(reg.ID)+'&t='+Date.now())
      .then(function(r){ return r.json(); })
      .then(function(j){
        lov(false);
        if (j.ok && j.bloques && j.bloques.length) {
          // Convert DETALLE_PLAN rows to bloques format for checklist
          var bloques = j.bloques.map(function(b){
            return {
              tipo: b.Tipo || b.Bloque_Tipo || b.bloque_tipo || '',

              ms: b.Meta_Sergio || b.meta_s || '',
              ritmo: b.Ritmo_Obj || b.ritmo_obj || '',
              descanso_bloque: ''
            };
          });

          S._libreVirtualPlan = { id:'LIBRE', nombre:nombre, bloques:bloques, objetivo:'Entrenamiento libre' };

  }
}

function calcLibreTotal() {

function toggleBloque(i) {
  const state = S.bloqueStates[i];
  state.hecho = !state.hecho;

  const card = document.getElementById('bcc-' + i);
  const chk  = document.getElementById('bcc-chk-' + i);
  const opts = document.getElementById('bcc-opts-' + i);

  if (state.hecho) {
    card.classList.remove('bcc-omit');
    chk.textContent = '✓';
    chk.classList.remove('bcc-omit-chk');
    opts.style.display = '';
  } else {
    card.classList.add('bcc-omit');
    chk.textContent = '✕';
    chk.classList.add('bcc-omit-chk');
    opts.style.display = 'none';
  }
  updateBloquesSummary();
}

function setEstilo(i, estilo) {
  S.bloqueStates[i].estiloVar = estilo;
  const plan = getSesion(S.sesionPlan);
  const estilos = ['Libre','Espalda','Pecho','Mariposa','Combinado'];
  ['', ...estilos].forEach(e => {
    const btn = document.getElementById('est-' + i + '-' + e);
    if (btn) btn.classList.toggle('on', e === estilo);
  });
}

function setNota(i, val) {
  S.bloqueStates[i].nota = val;
}

function updateBloquesSummary() {
  const states = S.bloqueStates || [];
  const hechos  = states.filter(s => s.hecho).length;
  const omitidos = states.filter(s => !s.hecho).length;
  const variados = states.filter(s => s.hecho && (s.estiloVar || s.nota)).length;
  const el = document.getElementById('blq-summary');
  if (!el) return;
  if (omitidos === 0 && variados === 0) {
    el.style.background = 'var(--azul-l)'; el.style.color = 'var(--navy)';
    el.textContent = '✅ Todos los bloques realizados según el plan';
  } else {
    let parts = [];
    if (hechos > 0)   parts.push('✅ ' + hechos + ' realizados');
    if (omitidos > 0) parts.push('❌ ' + omitidos + ' omitidos');
    if (variados > 0) parts.push('✏️ ' + variados + ' con variación');
    el.style.background = 'var(--orange-l)'; el.style.color = 'var(--orange)';
    el.textContent = parts.join(' · ');
  }
}

function renderCargar3() {
  const plan = getSesion(S.sesionPlan);
  const nombre = plan ? plan.nombre : 'Sesión libre';
  const bx = S.nadador==='Felipe'
    ? '<span class="bx bf">Felipe</span>'
    : '<span class="bx bs">Sergio</span>';

  // Build summary of what was done
  let resumenBloques = '';
  if (S.bloqueStates && plan) {
    const omitidos = plan.bloques.filter((b,i) => !S.bloqueStates[i].hecho);
    const variados  = plan.bloques.filter((b,i) => S.bloqueStates[i].hecho && (S.bloqueStates[i].estiloVar || S.bloqueStates[i].nota));
    if (omitidos.length || variados.length) {
      resumenBloques = '<div style="background:var(--orange-l);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--orange)">';
      resumenBloques += '<div style="font-weight:700;margin-bottom:6px">📋 Ajustes registrados:</div>';
      omitidos.forEach(b => { resumenBloques += '<div>❌ Omitido: ' + b.tipo + ' — ' + b.desc.substring(0,50) + '</div>'; });
      variados.forEach((b,j) => {
        const idx = plan.bloques.indexOf(b);
        const st = S.bloqueStates[idx];
        let txt = '✏️ ' + b.tipo;
        if (st.estiloVar) txt += ' → estilo: ' + st.estiloVar;
        if (st.nota) txt += ' · ' + st.nota;
        resumenBloques += '<div>' + txt + '</div>';
      });
      resumenBloques += '</div>';
    }
  }

  // Resumen del entrenamiento libre
  let resumenLibre = '';
  const esLibre = !plan && S.libreBloques;
  if (esLibre) {
    var totalL = calcLibreTotal();
    resumenLibre = '<div style="background:var(--azul-l);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--navy)">';
    resumenLibre += '<div style="font-weight:700;margin-bottom:6px">🔓 ' + (S.libreNombre||'Entrenamiento libre') + ' — ' + totalL + 'm</div>';
    S.libreBloques.forEach(function(b){
      if (b.tipo || b.dist) resumenLibre += '<div>• ' + (b.tipo||'Bloque') + (b.dist?': '+b.dist+'m':'') + (b.nota?' ('+b.nota+')':'') + '</div>';
    });
    resumenLibre += '</div>';
  }

  document.getElementById('pg-cargar').innerHTML =
    '<div class="card" style="margin-bottom:12px"><div class="cb">'
    + '<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">' + bx + '<span class="itag">' + (esLibre ? (S.libreNombre||'Sesión libre') : nombre) + '</span></div>'
    + '<p style="font-size:12px;color:var(--text2)">' + (esLibre ? 'Sube fotos para análisis IA, o guarda directamente sin fotos.' : 'Ahora sube las pantallas de Garmin Connect.') + '</p>'
    + '</div></div>'
    + resumenBloques
    + resumenLibre
    + '<div class="note">📱 Garmin Connect → actividad → <b>Estadísticas</b> (2 pantallas con scroll) → <b>Vueltas</b> (todas las pantallas)</div>'
    + '<div class="lbl">Fotos de Garmin Connect' + (esLibre ? ' (opcional)' : '') + '</div>'
    + '<div class="upz" onclick="document.getElementById(\'fi\').click()">'
    + '<input type="file" id="fi" accept="image/*" multiple onchange="addFotos(this.files)">'
    + '<em>📸</em><p>Toca para agregar fotos</p><span>Estadísticas (2) + Vueltas (2-3) = 4 a 5 fotos</span></div>'
    + '<div id="thumbs" class="thumbs"></div>'
    + '<div style="margin-top:14px">'

async function b64(file) {
  return new Promise(r => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      // Resize to max 1024px and compress to 70% quality
      const MAX = 1024;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      const data = canvas.toDataURL('image/jpeg', 0.7);
      r(data.split(',')[1]);
    };
    img.src = url;
  });
}

    const variados  = plan.bloques.filter((b,i)=>states[i].hecho&&(states[i].estiloVar||states[i].nota));

async function guardar() {
  var r = S.extracted && S.extracted.resumen ? S.extracted.resumen : {};
  var ev = S.extracted && S.extracted.evaluacion ? S.extracted.evaluacion : {};
  var plan = getSesion(S.sesionPlan);
  // Determine medio: from pending record, from libre builder, or default piscina
  var medioVal = 'Piscina 25m';
  if (S.pendienteId) {
    var pendRec = CACHE.find(function(x){ return x.ID===S.pendienteId; });
    if (pendRec && pendRec.Medio) medioVal = pendRec.Medio;
  } else if (S.sesionPlan==='LIBRE' || !plan) {
    medioVal = getMedioLabel();
  }
  // If resuming a pending session, update that record (same ID/fecha)
  var isPendiente = !!(S.pendienteId);
  var reg = {
    id: isPendiente ? S.pendienteId : genId(S.nadador),
    fecha: isPendiente && S.pendienteFecha ? String(S.pendienteFecha).substring(0,10) : todayStr(),
    nadador: S.nadador,
    sesionPlan: isPendiente ? (S.libreNombre||S.sesionPlan) : S.sesionPlan,
    _update: isPendiente,
    medio: medioVal,
    resumen: r,
    vueltas: S.extracted ? S.extracted.vueltas||[] : [],
    bloqueStates: S.bloqueStates || [],
    evaluacion: ev
  };

  lov(true); setLoad(30, 'Guardando resumen...', 'Escribiendo en Google Sheets');
  var ok = await sheetsSave(reg);

  if (ok && plan && S.bloqueStates) {
    setLoad(65, 'Guardando detalle bloques...', 'Hoja de ejercicios');
    for (var i = 0; i < plan.bloques.length; i++) {
      var b = plan.bloques[i];
      var st = S.bloqueStates[i] || {hecho:true, estiloVar:'', nota:''};
      var det = {
        action:'detalle', sesion_id:reg.id, fecha:reg.fecha,
        nadador:reg.nadador, sesion_plan:reg.sesionPlan,
        bloque_idx:i+1, bloque_tipo:b.tipo, bloque_desc:b.desc,
        ritmo_obj:b.ritmo||'', hecho:st.hecho,
        estilo_var:st.estiloVar||'', nota:st.nota||'',
        meta_f:b.mf, meta_s:b.ms
      };
      await fetch('https://orion-proxy.felgonino.workers.dev',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify(det)
      }).catch(function(){});
    }
  }

  // Guardar bloques de entrenamiento libre (estructura manual)
  if (ok && !plan && S.libreBloques) {
    setLoad(65, 'Guardando bloques libres...', 'Hoja de ejercicios');
    for (var li = 0; li < S.libreBloques.length; li++) {

          ritmo_obj:'', hecho:true, estilo_var:'', nota:lb.nota||'', meta_f:'', meta_s:''
        })
      }).catch(function(){});
    }
  }

  // Guardar vueltas Garmin (hoja separada)
  if (ok && reg.vueltas && reg.vueltas.length) {
    setLoad(75, 'Guardando vueltas Garmin...', 'Detalle de intervalos');
    await fetch('https://orion-proxy.felgonino.workers.dev',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ action:'vueltas', sesion_id:reg.id, fecha:reg.fecha, nadador:reg.nadador, vueltas:reg.vueltas })
    }).catch(function(){});
  }

  lov(false);

  if (ok) {
    var waMsg = buildWAMsg(reg, plan, ev);
    var waUrl = 'https://wa.me/?text=' + encodeURIComponent(waMsg);
    var d = reg.resumen || {};
    document.getElementById('pg-cargar').innerHTML =
      '<div class="ok-box"><div class="ok-ico">&#x2705;</div>' +
      '<div class="ok-t">Sesi&#xF3;n guardada</div>' +
      '<div class="ok-s">' + reg.id + '<br>' + reg.nadador +
      ' &middot; ' + (d.distancia_m||'?') + 'm en ' + (d.tiempo_total||'?') + '<br>' +
      'Ritmo ' + (d.ritmo_medio||'?') + '/100m &middot; SWOLF ' + (d.swolf_medio||'?') +
      '</div></div>' +
      '<a href="' + waUrl + '" target="_blank" style="text-decoration:none;display:block;margin-bottom:8px">' +
      '<button class="btn tl" style="width:100%">&#x1F4F2; Compartir en WhatsApp</button></a>' +
      '<button class="btn" onclick="renderCargar1()">&#x1F4E4; Registrar otra sesi&#xF3;n</button>' +
      '<button class="btn2" onclick="goTab(\'historial\')">&#x1F4C8; Ver historial</button>' +
      '<button class="btn2" onclick="goTab(\'hoy\')">&#x1F3E0; Inicio</button>';
    toast('Guardado en Google Sheets');
    if (S.pendienteId) {
      CACHE = CACHE.filter(function(r){ return !(r.ID===S.pendienteId && r.Nadador===S.nadador); });
      S.pendienteId=null; S.pendienteFecha=null;
    }
    // Add completed record to CACHE so historial updates without reload
    CACHE = CACHE.filter(function(x){ return x.ID !== reg.id; });
    CACHE.push({ID:reg.id,Fecha:reg.fecha,Nadador:reg.nadador,Sesion_Plan:reg.sesionPlan,
      Medio:reg.medio||'',Distancia_m:reg.resumen.distancia_m||'',Ritmo_100m:reg.resumen.ritmo_medio||'',
      FC_Media:reg.resumen.fc_media||'',FC_Max:reg.resumen.fc_max||'',SWOLF:reg.resumen.swolf_medio||'',
      TE_Aerobico:reg.resumen.te_aerobico||'',Carga:reg.resumen.carga_ejercicio||'',Pendiente:''});
    if(typeof HIST_NAD!=='undefined' && HIST_NAD) renderHistorial();
  } else {
    toast('Error al guardar. Verifica conexi&#xF3;n.', 4000);
  }
}

function buildWAMsg(reg, plan, ev) {
  var r = reg.resumen || {};
  var fecha = '';
  try { fecha = new Date(reg.fecha+'T12:00:00').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'}); } catch(e){}
  var emoji = reg.nadador === 'Felipe' ? '(F)' : '(S)';
  var lines = [];
  lines.push('*ORION MASTER* ' + emoji);
  lines.push(reg.nadador + ' - ' + fecha);
  lines.push(plan ? plan.nombre : (reg.sesionPlan||'Libre'));
  lines.push('');
  lines.push('*Metricas*');
  lines.push('Distancia: *' + (r.distancia_m||'-') + 'm*');
  lines.push('Tiempo: *' + (r.tiempo_total||'-') + '*');
  lines.push('Ritmo: *' + (r.ritmo_medio||'-') + '/100m*');
  lines.push('FC media: *' + (r.fc_media||'-') + ' ppm*');
  lines.push('FC max: *' + (r.fc_max||'-') + ' ppm*');
  lines.push('SWOLF: *' + (r.swolf_medio||'-') + '*');
  lines.push('TE aerobico: *' + (r.te_aerobico||'-') + '*  Anaerobico: *' + (r.te_anaerobico||'-') + '*');
  lines.push('Carga: *' + (r.carga_ejercicio||'-') + '*  Calorias: *' + (r.calorias_totales||'-') + '*');

  if (reg.bloqueStates && plan) {
    var omit = plan.bloques.filter(function(b,i){ return !reg.bloqueStates[i] || !reg.bloqueStates[i].hecho; });
    var vari = plan.bloques.filter(function(b,i){ return reg.bloqueStates[i] && reg.bloqueStates[i].hecho && (reg.bloqueStates[i].estiloVar||reg.bloqueStates[i].nota); });
    if (omit.length || vari.length) {
      lines.push('');
      lines.push('*Ajustes al plan*');
      omit.forEach(function(b){ lines.push('x Omitido: ' + b.tipo); });
      vari.forEach(function(b){
        var idx = plan.bloques.indexOf(b);
        var st = reg.bloqueStates[idx];
        lines.push('~ ' + b.tipo + (st.estiloVar?' > '+st.estiloVar:'') + (st.nota?' | '+st.nota:''));
      });
    }
  }

  if (ev) {
    if (ev.puntos_positivos && ev.puntos_positivos.length) {
      lines.push('');
      lines.push('*Logros*');
      ev.puntos_positivos.forEach(function(p){ lines.push('+ ' + p); });
    }
    if (ev.puntos_mejora && ev.puntos_mejora.length) {
      lines.push('');
      lines.push('*A mejorar*');
      ev.puntos_mejora.forEach(function(p){ lines.push('! ' + p); });
    }
    if (ev.antecedentes_planes && ev.antecedentes_planes.length) {
      lines.push('');
      lines.push('*Antecedentes para futuros planes*');
      ev.antecedentes_planes.forEach(function(p){ lines.push('> ' + p); });
    }
  }

  lines.push('');
  lines.push('ID: ' + reg.id + ' | ORION 2026');
  return lines.join('\n');
}

var HIST_NAD = null;
function setHistNad(n) { HIST_NAD = n; renderHistorial(); }
function renderHistorial() {
  const el = document.getElementById('pg-historial');
  if (!CACHE.length && !COMPETENCIAS.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text3)"><div style="font-size:40px;margin-bottom:12px">📭</div><div style="font-size:14px;font-weight:600;margin-bottom:6px">Sin datos aún</div><div style="font-size:12px">Carga sesiones o competencias primero</div></div><button class="btn2" onclick="sheetsLoad().then(renderHistorial)">🔄 Actualizar</button>';
    return;
  }

  var h = '<div class="lbl">Evolución por nadador</div>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px" id="hist-nad-sel">';
  NADADORES.forEach(function(n, idx){
    if (!HIST_NAD && idx===0) HIST_NAD = n.nombre;
    var on = (HIST_NAD === n.nombre) ? ' on' : '';
    h += '<button class="estilo-btn'+on+'" onclick="setHistNad(\''+n.nombre+'\')">'+n.emoji+' '+n.nombre+'</button>';
  });
  h += '</div>';

  // Banner prominente del nadador seleccionado
  var nadObj = NADADORES.find(function(n){ return n.nombre === HIST_NAD; }) || {emoji:'🏊', color:'var(--navy)'};
  h += '<div style="background:'+(nadObj.color||'var(--navy)')+';border-radius:10px;padding:12px 16px;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:10px">';
  h += '<span style="font-size:22px">'+(nadObj.emoji||'🏊')+'</span>';
  h += '<div><div style="font-size:15px;font-weight:700">'+HIST_NAD+'</div><div style="font-size:11px;opacity:.8">Historial individual</div></div></div>';

  var sesiones = CACHE.filter(function(r){ return r.Nadador === HIST_NAD; })
    .sort(function(a,b){ return (a.Fecha||'') < (b.Fecha||'') ? 1 : -1; }); // recientes primero

  if (!sesiones.length) {
    h += '<div class="note">Sin sesiones registradas para '+HIST_NAD+'.</div>';
  } else {
    // KPIs resumen
    var totalDist = sesiones.reduce(function(s,r){ return s+(parseFloat(r.Distancia_m)||0); },0);
    var ritmos = sesiones.map(function(r){ return ritmoToSec(r.Ritmo_100m); }).filter(function(v){ return v; });
    var mejorRitmo = ritmos.length ? secToRitmo(Math.min.apply(null,ritmos)) : '—';
    var swolfs = sesiones.map(function(r){ return parseFloat(r.SWOLF); }).filter(function(v){ return !isNaN(v); });
    var mejorSwolf = swolfs.length ? Math.min.apply(null,swolfs) : '—';

    h += '<div class="r3" style="margin-bottom:14px">';
    h += '<div class="kpi" style="text-align:center"><div class="kpi-v" style="font-size:18px">'+sesiones.length+'</div><div class="kpi-l">sesiones</div></div>';
    h += '<div class="kpi" style="text-align:center"><div class="kpi-v" style="font-size:18px">'+mejorRitmo+'</div><div class="kpi-l">mejor ritmo</div></div>';
    h += '<div class="kpi" style="text-align:center"><div class="kpi-v" style="font-size:18px">'+mejorSwolf+'</div><div class="kpi-l">mejor SWOLF</div></div>';
    h += '</div>';
    h += '<div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:14px">Volumen total: <b>'+(totalDist/1000).toFixed(1)+' km</b></div>';

    // Tabla de evolución
    h += '<div class="lbl">Historial de sesiones</div>';
    h += '<div class="card"><div style="overflow-x:auto"><table class="vtbl"><thead><tr>';
    h += '<th>Fecha</th><th>Dist</th><th>Ritmo</th><th>SWOLF</th><th>FC</th></tr></thead><tbody>';
    sesiones.forEach(function(r){
      var fecha = r.Fecha ? formatShortDate(r.Fecha) : '—';
      h += '<tr><td>'+fecha+'</td><td>'+(r.Distancia_m||'—')+'m</td><td>'+(r.Ritmo_100m||'—')+'</td><td>'+(r.SWOLF||'—')+'</td><td>'+(r.FC_Media||'—')+'</td></tr>';
    });
    h += '</tbody></table></div></div>';

    // Mini tendencia textual
    if (ritmos.length >= 2) {
      var primero = ritmos[ritmos.length-1], ultimo = ritmos[0];
      var dif = primero - ultimo;
      var trend = dif > 0 ? '↗ Mejorando '+Math.abs(Math.round(dif))+'s/100m' : (dif < 0 ? '↘ '+Math.abs(Math.round(dif))+'s más lento' : '→ Estable');
      var col = dif > 0 ? 'var(--green)' : (dif < 0 ? 'var(--orange)' : 'var(--text2)');
      h += '<div style="text-align:center;font-size:13px;font-weight:600;color:'+col+';margin-top:10px">Ritmo: '+trend+'</div>';
    }
  }

  // Competencias del nadador
  var compe = COMPETENCIAS.filter(function(c){ return c.Nadador === HIST_NAD && c.Tiempo; });
  if (compe.length) {
    h += '<div class="lbl" style="margin-top:18px">🏆 Marcas de competencia</div>';
    var grupos = {};
    compe.forEach(function(c){
      var key = c.Distancia+'m '+c.Estilo;
      if (!grupos[key]) grupos[key] = [];
      grupos[key].push(c);
    });
    Object.keys(grupos).forEach(function(key){
      var arr = grupos[key].sort(function(a,b){ return (a.Fecha||'')<(b.Fecha||'')?1:-1; });
      h += '<div class="card" style="margin-bottom:8px"><div class="cb">';
      h += '<div style="font-size:13px;font-weight:700;margin-bottom:6px">'+key+'</div>';
      arr.forEach(function(c){
        h += '<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--gray2)"><span style="color:var(--text2)">'+(c.Nombre||formatShortDate(c.Fecha))+'</span><span style="font-weight:700;color:var(--navy)">'+c.Tiempo+'</span></div>';
      });
      h += '</div></div>';
    });
  }

  el.innerHTML = h;
}

function formatShortDate(f) {
  try {
    if (!f) return '';
    var s = String(f).substring(0,10);
    var parts = s.split('-');
    if (parts.length===3) {
      var d = new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
      if (!isNaN(d.getTime())) {
        var months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
        return d.getDate()+' '+months[d.getMonth()];
      }
    }
    return s;
  } catch(e) { return String(f).substring(0,10); }
}

function ritmoToSec(r) {
  if (!r) return null;
  var s = String(r);
  // Buscar directamente el patrón M:SS en el texto original
  var m = s.match(/(\d{1,2}):(\d{2})/);
  if (!m) return null;
  var min = parseInt(m[1], 10), sec = parseInt(m[2], 10);
  var total = min * 60 + sec;
  // Un ritmo /100m válido está aproximadamente entre 0:30 y 5:00
  if (total < 30 || total > 300) return null;
  return total;
}

function secToRitmo(s) {
  var m = Math.floor(s/60), sec = Math.round(s-m*60);
  return m+':'+(sec<10?'0':'')+sec;
}

function compeSet(key, val) {
  COMPE_STATE[key] = val;
  if (key === 'nadador') {
    NADADORES.forEach(function(n){
      var el = document.getElementById('cp-nad-'+n.nombre);
      if(el) el.className = 'pill' + (n.nombre===val ? (n.nombre==='Sergio'?' on-s':' on') : '');
    });
  } else if (key === 'medio') {
    document.getElementById('cp-medio-Piscina').className = 'pill'+(val==='Piscina'?' on':'');
    document.getElementById('cp-medio-Mar').className = 'pill'+(val==='Mar'?' on':'');
  } else if (key === 'estilo') {
    ['Libre','Espalda','Pecho','Mariposa','Combinado','Relevo'].forEach(function(e){
      var el=document.getElementById('cp-est-'+e); if(el) el.classList.toggle('on', e===val);
    });
  } else if (key === 'distancia') {
    ['50','100','200','400','800','1500','2000','3000'].forEach(function(d){
      var el=document.getElementById('cp-d-'+d); if(el) el.classList.toggle('on', d===val);
    });
  }
}

async function guardarCompe() {
  const tiempo = document.getElementById('cp-tiempo').value.trim();
  if (!COMPE_STATE.nadador) { toast('Selecciona el nadador'); return; }
  if (!tiempo) { toast('Ingresa el tiempo'); return; }

  const compe = {
    action: 'competencia',
    nadador: COMPE_STATE.nadador,
    medio: COMPE_STATE.medio,
    estilo: COMPE_STATE.estilo,
    distancia: COMPE_STATE.distancia,
    fecha: document.getElementById('cp-fecha').value || todayStr(),
    tiempo: tiempo,
    nombre: document.getElementById('cp-nombre').value.trim(),
    ritmo: document.getElementById('cp-ritmo').value.trim(),
    fc: document.getElementById('cp-fc').value.trim(),
    posicion: document.getElementById('cp-pos').value.trim(),
    condiciones: document.getElementById('cp-cond').value.trim()
  };

  lov(true); setLoad(50, 'Guardando competencia...', '');
  try {
    const r = await fetch('https://orion-proxy.felgonino.workers.dev', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(compe)
    });
    const j = await r.json();
    lov(false);
    if (j.ok) {
      COMPETENCIAS.push({
        Nadador:compe.nadador, Medio:compe.medio, Estilo:compe.estilo,
        Distancia:compe.distancia, Fecha:compe.fecha, Tiempo:compe.tiempo,
        Nombre:compe.nombre, Ritmo:compe.ritmo, FC:compe.fc,
        Posicion:compe.posicion, Condiciones:compe.condiciones
      });
      toast('✅ Competencia guardada');
      renderCompe();
    } else { toast('Error al guardar'); }
  } catch(e) { lov(false); toast('Error de conexión'); }
}

function catDeTermino(term) {
  for (var cat in GLOS_CATEGORIAS) {

  return 'Otros';
}

function renderGlosCategorias() {

function filtrarGlosario(q) {
  var cats = document.getElementById('glos-cats');
  var res = document.getElementById('glos-resultados');
  if (!q || !q.trim()) {
    cats.style.display = 'block';
    res.innerHTML = '';
    return;
  }
  cats.style.display = 'none';
  var ql = q.toLowerCase();
  var matches = GLOSARIO.filter(function(g){
    return g.termino.toLowerCase().indexOf(ql) >= 0 || g.definicion.toLowerCase().indexOf(ql) >= 0;
  });
  var h = '';
  if (!matches.length) {
    h = '<div class="note">Sin resultados para "'+q+'"</div>';
  } else {
    matches.sort(function(a,b){ return a.termino.toLowerCase() < b.termino.toLowerCase() ? -1 : 1; });
    matches.forEach(function(t){
      h += '<div class="card" style="margin-bottom:8px"><div class="cb">';
      h += '<div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px">'+t.termino+' <span style="font-size:10px;font-weight:400;color:var(--text3)">· '+catDeTermino(t.termino)+'</span></div>';

      if (t.ejecucion) h += '<div style="font-size:11.5px;color:var(--text3);line-height:1.4;font-style:italic">▸ '+t.ejecucion+'</div>';
      h += '</div></div>';
    });
  }
  res.innerHTML = h;
}

async function guardarTermino() {
  var term = document.getElementById('gt-term').value.trim();
  var def = document.getElementById('gt-def').value.trim();
  var ejec = document.getElementById('gt-ejec').value.trim();
  if (!term || !def) { toast('Completa término y definición'); return; }
  // Evitar duplicados
  if (GLOSARIO.find(function(g){ return g.termino.toLowerCase() === term.toLowerCase(); })) {
    toast('Ese término ya existe'); return;
  }
  GLOSARIO.push({ termino:term, definicion:def, ejecucion:ejec });
  await guardarGlosarioRemoto();
  toast('✅ Término agregado');
  renderGlosario();
}

// Agrega términos nuevos detectados (desde generador) sin duplicar
function agregarTerminosGlosario(nuevos) {
  if (!nuevos || !nuevos.length) return false;
  var agregados = 0;
  nuevos.forEach(function(n){
    if (!n.termino || !n.definicion) return;
    var existe = GLOSARIO.find(function(g){ return g.termino.toLowerCase() === n.termino.toLowerCase(); });
    if (!existe) { GLOSARIO.push(n); agregados++; }
  });
  if (agregados > 0) { guardarGlosarioRemoto(); return true; }
  return false;
}

async function guardarGlosarioRemoto() {
  try {
    await fetch('https://orion-proxy.felgonino.workers.dev', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'glosario', glosario: GLOSARIO })
    });
  } catch(e) { /* queda local */ }
}
