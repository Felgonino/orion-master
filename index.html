<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D2B55">
<title>ORION Master</title>
<style>
:root{
  --navy:#0D2B55;--azul:#1A5276;--azul-l:#D6EAF8;
  --teal:#0E6655;--teal-l:#D1F2EB;
  --orange:#CA6F1E;--orange-l:#FAD7A0;
  --purple:#6C3483;--gold:#F9E79F;
  --gray:#F4F6F7;--gray2:#E5E8E8;--border:#D5D8DC;
  --text:#1B2631;--text2:#566573;--text3:#AAB7B8;
  --white:#FFFFFF;--green:#1E8449;--green-l:#D5F5E3;
  --red:#C0392B;--red-l:#FADBD8;
  --r:12px;--sh:0 2px 12px rgba(13,43,85,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:-webkit-fill-available;background:#F0F2F5;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;color:var(--text)}
.app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;overflow:hidden}
/* topbar */
.tb{background:var(--navy);color:#fff;padding:14px 16px 10px;padding-top:max(14px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tb-logo{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.tb-t{font-size:15px;font-weight:600}.tb-s{font-size:11px;opacity:.7}
.sdot{width:8px;height:8px;border-radius:50%;background:#AAB7B8;margin-left:auto;flex-shrink:0;transition:background .3s}
.sdot.ok{background:#2ECC71}.sdot.err{background:var(--red)}.sdot.load{background:#F39C12;animation:bk .8s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
/* tabs */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px 4px 8px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent}
.tab.on{color:var(--navy);border-bottom-color:var(--navy)}
.tab em{display:block;font-size:17px;font-style:normal;margin-bottom:1px}
/* content */
.cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.cnt::-webkit-scrollbar{display:none}
.pg{display:none;padding:14px}
.pg.on{display:block}
/* cards */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden}
.ch{padding:12px 14px;border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:8px}
.ch h3{font-size:13px;font-weight:600;color:var(--text);flex:1}
.cb{padding:12px 14px}
/* badges */
.bx{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bf{background:var(--azul-l);color:var(--navy)}.bs{background:var(--teal-l);color:var(--teal)}
.bw{background:var(--orange-l);color:var(--orange)}.bg{background:var(--green-l);color:var(--green)}
/* layout */
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
/* pills */
.pill{padding:10px 8px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);cursor:pointer;text-align:center}
.pill.on{border-color:var(--navy);background:var(--azul-l)}
.pill.on-s{border-color:var(--teal);background:var(--teal-l)}
.pill em{font-size:20px;display:block;margin-bottom:3px;font-style:normal}
.pill b{font-size:12px;font-weight:600;display:block;color:var(--text)}
.pill small{font-size:10px;color:var(--text3)}
/* fields */
.fr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gray2)}
.fr:last-child{border-bottom:none}
.fl{font-size:12px;color:var(--text2)}
.fv{font-size:12px;font-weight:600;color:var(--text)}
.fv.ok{color:var(--green)}.fv.win{color:var(--green)}.fv.miss{color:var(--red)}.fv.na{color:var(--text3);font-weight:400;font-style:italic}
/* labels */
.lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
/* buttons */
.btn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{opacity:.8}.btn:disabled{opacity:.35;cursor:default}
.btn.tl{background:var(--teal)}
.btn2{width:100%;padding:12px;background:transparent;color:var(--text);border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
/* upload */
.upz{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;background:var(--gray);position:relative}
.upz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upz em{font-size:28px;display:block;margin-bottom:8px;font-style:normal}
.upz p{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:3px}
.upz span{font-size:11px;color:var(--text3)}
/* thumbs */
.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.thumb{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:9/16;border:1px solid var(--border)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-rm{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(0,0,0,.6);border-radius:50%;border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* session cards */
.sc{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;border-left:4px solid var(--gray2)}
.sc.ta{border-left-color:var(--navy)}.sc.tb2{border-left-color:var(--purple)}.sc.tc{border-left-color:var(--orange)}.sc.done{border-left-color:var(--green);opacity:.8}
.sc-h{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.sc-h h4{font-size:13px;font-weight:600;flex:1}
.sc-d{font-size:11px;color:var(--text3)}
.sc-b{padding:0 14px 12px;display:none}
.sc-b.open{display:block}
/* bloques entrenamiento */
.blq{background:var(--gray);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.blq-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px}
.blq-d{font-size:12px;color:var(--text);line-height:1.5}
.blq-f{font-size:11px;color:var(--navy);font-weight:600;margin-top:4px}
.blq-s{font-size:11px;color:var(--teal);font-weight:600}
/* compare */
.cmp-r{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;align-items:center}
/* vueltas */
.vtbl{width:100%;border-collapse:collapse;font-size:11px}
.vtbl th{background:var(--gray);padding:6px 8px;text-align:right;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border)}
.vtbl th:first-child{text-align:left}
.vtbl td{padding:5px 8px;text-align:right;border-bottom:1px solid var(--gray2);color:var(--text)}
.vtbl td:first-child{text-align:left;color:var(--text2)}
.vtbl tr.tot td{font-weight:700;color:var(--navy);background:var(--azul-l)}
/* kpi */
.kpig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi{background:var(--white);border-radius:10px;padding:12px;box-shadow:var(--sh)}
.kpi-v{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.kpi-v.s{color:var(--teal)}
.kpi-l{font-size:11px;color:var(--text3);margin-top:3px}
/* success */
.ok-box{text-align:center;padding:30px 16px 20px}
.ok-ico{width:56px;height:56px;background:var(--green-l);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px}
.ok-t{font-size:18px;font-weight:700;margin-bottom:6px}
.ok-s{font-size:13px;color:var(--text2);line-height:1.6}
/* misc */
.itag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;background:var(--gray);color:var(--text2);border:1px solid var(--gray2);margin:2px}
.note{background:var(--gold);border-radius:8px;padding:10px 12px;font-size:12px;color:#7D6608;line-height:1.5;margin-bottom:10px}
.div{height:1px;background:var(--gray2);margin:10px 0}
/* loading overlay */
#lov{display:none;position:fixed;inset:0;background:rgba(13,43,85,.88);z-index:999;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#lov.on{display:flex}
.lo-i{font-size:38px;margin-bottom:16px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.lo-m{font-size:16px;font-weight:600;color:#fff;text-align:center;margin-bottom:6px}
.lo-s{font-size:13px;color:rgba(255,255,255,.7);text-align:center;margin-bottom:20px}
.lo-p{width:100%;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.lo-f{height:100%;background:#5DADE2;border-radius:2px;transition:width .5s ease}
/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1B2631;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}

/* bloque checklist */
.blq-check-card{background:var(--white);border-radius:10px;box-shadow:var(--sh);margin-bottom:8px;overflow:hidden;border-left:4px solid var(--green);}
.blq-check-card.bcc-omit{border-left-color:var(--red);opacity:.6;}
.bcc-hdr{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;cursor:pointer;}
.bcc-check{width:24px;height:24px;border-radius:6px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px;}
.bcc-check.bcc-omit-chk{background:var(--red);}
.bcc-tipo{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.bcc-desc{font-size:11px;color:var(--text2);line-height:1.4;}
.bcc-opts{padding:0 14px 12px;border-top:1px solid var(--gray2);}
.estilo-btn{padding:5px 10px;border-radius:16px;border:1px solid var(--border);background:var(--white);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;margin:0;}
.estilo-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.nota-inp{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;color:var(--text);background:var(--gray);outline:none;}
.nota-inp:focus{border-color:var(--navy);background:var(--white);}

/* bloque switcher */
.bsw{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.bsw button{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:var(--white);color:var(--text2)}
.bsw button.on{color:#fff}
/* bloque header */
.bl-hdr{border-radius:10px;padding:12px 14px;margin-bottom:12px;color:#fff}
</style>
</head>
<body>

    <div id="sdot" class="sdot" title="Sincronización"></div>

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function getBloqueActivo() { return BLOQUES.find(b=>b.activo)||BLOQUES[0]; }
function getAllSesiones() { return getBloqueActivo().semanas.flatMap(w=>w.sesiones); }
function getSesion(id) { return BLOQUES.flatMap(b=>b.semanas.flatMap(w=>w.sesiones)).find(s=>s.id===id); }
function completadas(id) { return CACHE.filter(r=>r.Sesion_Plan===id); }
function todayStr() { const d=new Date(); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function z(n){ return String(n).padStart(2,'0'); }
function genId(nad) {
  const d=new Date(); const ds=d.getFullYear()+z(d.getMonth()+1)+z(d.getDate());
  const idx=CACHE.filter(r=>r.Fecha===ds&&r.Nadador===nad).length+1;
  return ds+'_'+z(idx)+(nad==='Felipe'?'F':'S');
}
function scClass(tipo){ return {A:'ta',B:'tb2',C:'tc'}[tipo]||''; }
function blColor(id){ const b=BLOQUES.find(x=>x.id===id); return b?b.color:'var(--navy)'; }
function toast(msg,ms=2500){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),ms); }
function setLoad(pct,msg,sub){ document.getElementById('lo-f').style.width=pct+'%'; document.getElementById('lo-m').textContent=msg; document.getElementById('lo-s').textContent=sub||''; }
function lov(show){ document.getElementById('lov').classList[show?'add':'remove']('on'); }
function syncDot(st){ const d=document.getElementById('sdot'); d.className='sdot '+st; }
function frow(lbl,val,cls){ const v=(val===null||val===undefined||val==='')? '—':val; return '<div class="fr"><span class="fl">'+lbl+'</span><span class="fv '+(v==='—'?'na':(cls||''))+'">'+v+'</span></div>'; }
function evalRitmo(real, obj) {
  if(!real||!obj) return null;
  const p=r=>{ const m=String(r).replace(/[^0-9:]/g,'').match(/(\d+):(\d+)/); return m?parseInt(m[1])*60+parseInt(m[2]):null; };
  const rv=p(real), parts=String(obj).split('-');
  if(parts.length<2) return null;
  const lo=p(parts[0]),hi=p(parts[1]);
  if(!rv||!lo||!hi) return null;
  if(rv<lo) return 'win'; if(rv<=hi) return 'ok'; return 'miss';
}

async function sheetsLoad() {
  syncDot('load');
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),8000);
  try {
    const r=await fetch(SHEETS_URL+'?t='+Date.now(),{signal:ctrl.signal,mode:'cors',cache:'no-cache'});
    clearTimeout(t);
    const j=await r.json();
    if(j.ok&&j.data){ CACHE=j.data.filter(x=>x.ID&&x.ID!=='ID'); cacheOk=true; syncDot('ok'); toast('✅ Sincronizado ('+CACHE.length+' sesiones)',2000); }
    else syncDot('err');
  } catch(e){ clearTimeout(t); syncDot('err'); }
}

async function sheetsSave(reg) {
  syncDot('load');
  try {
    const r=await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify(reg),headers:{'Content-Type':'application/json'}});
    const j=await r.json();
    if(j.ok){ CACHE.push({ID:reg.id,Fecha:reg.fecha,Nadador:reg.nadador,Sesion_Plan:reg.sesionPlan,Distancia_m:reg.resumen?.distancia_m,Ritmo_100m:reg.resumen?.ritmo_medio,FC_Media:reg.resumen?.fc_media,SWOLF:reg.resumen?.swolf_medio,TE_Aerobico:reg.resumen?.te_aerobico,Carga:reg.resumen?.carga_ejercicio}); syncDot('ok'); return true; }
    syncDot('err'); return false;
  } catch(e){ syncDot('err'); return false; }
}

function goTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  document.getElementById('pg-'+tab).classList.add('on');
  if(tab==='hoy') renderHoy();
  if(tab==='plan') renderPlan();
  if(tab==='cargar') renderCargar1();
  if(tab==='historial') renderHistorial();
}

// ═══════════════════════════════════════════════════
function renderHoy() {
  const today=todayStr();
  const bl=getBloqueActivo();
  const sesiones=getAllSesiones();
  const sesHoy=sesiones.find(s=>s.fecha===today);
  const pendientes=sesiones.filter(s=>{ const c=completadas(s.id); return c.length<2 && !s.intensidad.includes('🏆'); });
  const ultimas=cacheOk?[...CACHE].reverse().slice(0,3):[];

  const fStr=new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const days=Math.ceil((new Date(bl.fechaFin)-new Date())/(864e5));
  const daysStr=days>0?days+' días':days===0?'¡Hoy!':'Finalizado';

  const sesF=CACHE.filter(r=>r.Nadador==='Felipe').length;
  const sesS=CACHE.filter(r=>r.Nadador==='Sergio').length;

  let h='<div style="padding:2px 2px 8px;font-size:13px;font-weight:600;color:var(--text2)">'+fStr.charAt(0).toUpperCase()+fStr.slice(1)+'</div>';

  // Bloque activo banner
  h+='<div style="background:'+bl.color+';border-radius:10px;padding:10px 14px;margin-bottom:12px;color:#fff;display:flex;align-items:center;gap:10px">';
  h+='<div style="flex:1"><div style="font-size:12px;font-weight:700">'+bl.nombre+'</div><div style="font-size:11px;opacity:.8">'+bl.subtitulo+'</div></div>';
  h+='<div style="text-align:right;flex-shrink:0"><div style="font-size:20px;font-weight:700">'+(days>0?days:'🏆')+'</div><div style="font-size:10px;opacity:.8">'+(days>0?'días':'')+' </div></div></div>';

  // KPIs
  h+='<div class="kpig" style="margin-bottom:14px"><div class="kpi"><div class="kpi-v">'+sesF+'</div><div class="kpi-l">Sesiones Felipe</div></div><div class="kpi"><div class="kpi-v s">'+sesS+'</div><div class="kpi-l">Sesiones Sergio</div></div></div>';

  // Sesión de hoy
  if(sesHoy) {
    const comp=completadas(sesHoy.id);
    h+='<div class="card"><div class="ch" style="background:'+bl.color+';color:#fff"><div style="font-size:18px">🏊</div><h3 style="color:#fff">'+sesHoy.nombre+'</h3><span class="bx" style="background:rgba(255,255,255,.25);color:#fff">HOY</span></div>';
    h+='<div class="cb"><p style="font-size:13px;color:var(--text2);margin-bottom:10px">'+sesHoy.objetivo+'</p>';
    h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"><span class="itag">📏 ~'+sesHoy.volumen+'m</span><span class="itag">'+sesHoy.intensidad+'</span><span class="itag">'+comp.length+'/2 completadas</span></div>';
    comp.forEach(c=>{h+='<div style="background:var(--green-l);border-radius:8px;padding:7px 10px;font-size:12px;margin-bottom:6px">✅ <b>'+c.Nadador+'</b>: '+(c.Distancia_m||'?')+'m · '+(c.Ritmo_100m||'?')+'/100m</div>';});
    h+='<button class="btn" onclick="iniciarDesde(\''+sesHoy.id+'\')">📤 Cargar resultado</button>';
    h+='<button class="btn2" onclick="goTab(\'plan\')">👁 Ver programa completo</button></div></div>';
  } else {
    h+='<div class="note">📅 No hay sesión programada exactamente hoy. Selecciona una pendiente abajo.</div>';
  }

  // Pendientes
  if(pendientes.length) {
    h+='<div class="lbl" style="margin-top:4px">Pendientes este bloque</div>';
    pendientes.forEach(s=>{
      const c=completadas(s.id).length;
      const badge=c===0?'<span class="bx" style="background:var(--red-l);color:var(--red)">Pendiente</span>':'<span class="bx bw">'+c+'/2</span>';
      h+='<div class="sc '+scClass(s.tipo)+'" onclick="iniciarDesde(\''+s.id+'\')" style="cursor:pointer;margin-bottom:8px"><div class="sc-h"><div><h4>'+s.nombre+'</h4><div class="sc-d">'+s.dia+' · '+s.intensidad+'</div></div>'+badge+'</div></div>';
    });
  }

  // Últimas
  if(ultimas.length) {
    h+='<div class="lbl" style="margin-top:4px">Últimas sesiones</div>';
    ultimas.forEach(r=>{h+=miniCard(r);});
  }

  document.getElementById('pg-hoy').innerHTML=h;
}

function renderPlan() {
  const bl=getBloqueActivo();
  let h='';

  // Block switcher
  h+='<div class="bsw">';
  BLOQUES.forEach(b=>{
    const on=b.id===bl.id;
    h+='<button onclick="setBloque(\''+b.id+'\')" style="'+(on?'background:'+b.color+';color:#fff;border-color:'+b.color:'')+'">'+b.nombre.replace(/🏁|🏊/g,'').trim().split('—')[0].trim()+'</button>';
  });
  h+='</div>';

  // Bloque header
  h+='<div class="bl-hdr" style="background:'+bl.color+'">';
  h+='<div style="font-size:14px;font-weight:700;margin-bottom:3px">'+bl.nombre+'</div>';
  h+='<div style="font-size:12px;opacity:.85">'+bl.subtitulo+'</div>';
  h+='<div style="font-size:11px;opacity:.7;margin-top:4px">📅 Meta: '+bl.fechaFin+'</div></div>';

  bl.semanas.forEach(sem=>{
    h+='<div class="lbl">'+sem.nombre+'</div>';
    sem.sesiones.forEach(s=>{
      const comp=completadas(s.id);
      const done=comp.length>=2;
      const isComp=s.intensidad.includes('🏆');

      h+='<div class="sc-h" onclick="toggleSC(\'sb-'+s.id+'\')"><div style="flex:1"><h4>'+s.nombre+' '+(done?'✅':'')+'</h4><div class="sc-d">'+s.dia+(s.volumen?' · ~'+s.volumen+'m':'')+' · '+s.intensidad+'</div></div><span style="font-size:11px;color:var(--text3)">▼</span></div>';
      h+='<div class="sc-b" id="sb-'+s.id+'">';
      h+='<p style="font-size:12px;color:var(--text2);margin-bottom:10px">'+s.objetivo+'</p>';
      s.bloques.forEach(b=>{
        h+='<div class="blq"><div class="blq-t">'+b.tipo+(b.ritmo?' · 🎯 '+b.ritmo:'')+(b.desc2!=='—'?' · ⏸ '+b.desc2:'')+'</div>';
        h+='<div class="blq-d">'+b.desc+'</div>';
        h+='<div class="blq-f">🔵 Felipe: '+b.mf+'</div>';
        h+='<div class="blq-s">🟢 Sergio: '+b.ms+'</div></div>';
      });
      comp.forEach(c=>{h+='<div style="background:var(--green-l);border-radius:8px;padding:8px 10px;margin-top:6px;font-size:12px">✅ <b>'+c.Nadador+'</b>: '+(c.Distancia_m||'?')+'m · '+(c.Ritmo_100m||'?')+'/100m · SWOLF '+(c.SWOLF||'?')+'</div>';});
      if(!isComp) h+='<button class="btn" style="margin-top:10px" onclick="iniciarDesde(\''+s.id+'\')">📤 Cargar resultado</button>';
      h+='</div></div>';
    });
  });

  document.getElementById('pg-plan').innerHTML=h;
}

function toggleBloque(i) {
  const state = S.bloqueStates[i];
  state.hecho = !state.hecho;

  const card = document.getElementById('bcc-' + i);
  const chk  = document.getElementById('bcc-chk-' + i);
  const opts = document.getElementById('bcc-opts-' + i);

  if (state.hecho) {
    card.classList.remove('bcc-omit');
    chk.textContent = '✓';
    chk.classList.remove('bcc-omit-chk');
    opts.style.display = '';
  } else {
    card.classList.add('bcc-omit');
    chk.textContent = '✕';
    chk.classList.add('bcc-omit-chk');
    opts.style.display = 'none';
  }
  updateBloquesSummary();
}

function setEstilo(i, estilo) {
  S.bloqueStates[i].estiloVar = estilo;
  const plan = getSesion(S.sesionPlan);
  const estilos = ['Libre','Espalda','Pecho','Mariposa','Combinado'];
  ['', ...estilos].forEach(e => {
    const btn = document.getElementById('est-' + i + '-' + e);
    if (btn) btn.classList.toggle('on', e === estilo);
  });
}

function setNota(i, val) {
  S.bloqueStates[i].nota = val;
}

function updateBloquesSummary() {
  const states = S.bloqueStates || [];
  const hechos  = states.filter(s => s.hecho).length;
  const omitidos = states.filter(s => !s.hecho).length;
  const variados = states.filter(s => s.hecho && (s.estiloVar || s.nota)).length;
  const el = document.getElementById('blq-summary');
  if (!el) return;
  if (omitidos === 0 && variados === 0) {
    el.style.background = 'var(--azul-l)'; el.style.color = 'var(--navy)';
    el.textContent = '✅ Todos los bloques realizados según el plan';
  } else {
    let parts = [];
    if (hechos > 0)   parts.push('✅ ' + hechos + ' realizados');
    if (omitidos > 0) parts.push('❌ ' + omitidos + ' omitidos');
    if (variados > 0) parts.push('✏️ ' + variados + ' con variación');
    el.style.background = 'var(--orange-l)'; el.style.color = 'var(--orange)';
    el.textContent = parts.join(' · ');
  }
}

async function b64(file){ return new Promise(r=>{ const fr=new FileReader(); fr.onload=e=>r(e.target.result.split(',')[1]); fr.readAsDataURL(file); }); }

async function analizarFotos() {
  if(!S.files.length) return;
  lov(true); setLoad(5,'Preparando imágenes...','Leyendo fotos de Garmin Connect');
  const pasos=[[20,'Leyendo Estadísticas...','Tiempo, distancia, ritmo, FC'],[45,'Extrayendo dinámica...','Brazadas, SWOLF, cadencia'],[65,'Procesando Vueltas...','Todos los intervalos'],[82,'Calculando Training Effect...','TE aeróbico, anaeróbico, carga'],[93,'Generando análisis...','Comparando con objetivos del plan']];
  let si=0; const iv=setInterval(()=>{if(si<pasos.length){setLoad(...pasos[si]);si++;}},900);
  try {
    const imgs=[];
    for(const f of S.files){ const d=await b64(f); imgs.push({type:'image',source:{type:'base64',media_type:f.type||'image/jpeg',data:d}}); }
    const plan=getSesion(S.sesionPlan);
    // Build context including what was actually done
  let ctx = 'Sesión libre.';
  if (plan) {
    const states = S.bloqueStates || plan.bloques.map(()=>({hecho:true,estiloVar:'',nota:''}));
    const bloqueInfo = plan.bloques.map((b,i) => {
      const st = states[i];
      if (!st.hecho) return b.tipo + ': OMITIDO';
      let info = b.tipo + ': realizado';
      if (st.estiloVar) info += ' (estilo cambiado a ' + st.estiloVar + ')';
      if (st.nota) info += ' (nota: ' + st.nota + ')';
      if (b.ritmo) info += ' · objetivo ritmo ' + b.ritmo;
      return info;
    });
    const omitidos = plan.bloques.filter((b,i)=>!(states[i]?.hecho)).map(b=>b.tipo);
    ctx = 'Sesion: "'+plan.nombre+'" ('+plan.dia+'). '
      + 'Bloques realizados: ' + bloqueInfo.join(' | ') + '. '
      + (omitidos.length ? 'BLOQUES OMITIDOS: ' + omitidos.join(', ') + '. ' : '')
      + 'Vol planificado: ~' + plan.volumen + 'm (puede ser menor por omisiones).';
  }
    const prompt='Eres analista experto en natación del proyecto ORION Master.\nAnaliza estas pantallas de Garmin Connect (Estadísticas y Vueltas, piscina).\nContexto: '+ctx+'\nNadador: '+S.nadador+'\n\nDevuelve SOLO JSON válido sin texto adicional ni backticks:\n{"resumen":{"tiempo_total":null,"tiempo_movimiento":null,"distancia_m":null,"ritmo_medio":null,"fc_media":null,"fc_max":null,"cadencia_ppm":null,"brazadas_totales":null,"brazada_media_largo":null,"swolf_medio":null,"te_aerobico":null,"te_anaerobico":null,"carga_ejercicio":null,"calorias_totales":null,"velocidad_media_kmh":null},"vueltas":[{"intervalo":1,"tiempo":null,"distancia_m":null,"ritmo":null}],"evaluacion":{"cumple_plan":true,"puntos_positivos":[],"puntos_mejora":[],"para_proxima":[]}}';
    const resp=await fetch('https://orion-proxy.felgonino.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:[...imgs,{type:'text',text:prompt}]}]})});
    clearInterval(iv); setLoad(100,'Análisis completo ✓','');
    if(!resp.ok) throw new Error('API error '+resp.status);
    const data=await resp.json();
    if(!data.ok) throw new Error(data.error||'Error en proxy: '+JSON.stringify(data));
    // Handle both proxy response {ok, content} and direct API response {content}
    const contentArr = data.content || (data.content === undefined && data.id ? data : null);
    if(!contentArr) throw new Error('Respuesta inesperada: '+JSON.stringify(data).substring(0,200));
    const raw=contentArr.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
    S.extracted=JSON.parse(raw);
    setTimeout(()=>{ lov(false); renderResultado(); },300);
  } catch(e){ clearInterval(iv); lov(false); toast('❌ Error: '+e.message,4000); }
}

  const el=document.getElementById('pg-historial');
  if(!CACHE.length){
    el.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--text3)"><div style="font-size:40px;margin-bottom:12px">📭</div><div style="font-size:14px;font-weight:600;margin-bottom:6px">Sin sesiones aún</div><div style="font-size:12px">Carga la primera en la pestaña 📤</div></div><button class="btn2" onclick="sheetsLoad().then(renderHistorial)">🔄 Actualizar desde Sheets</button>';
    return;
  }
  const sesF=CACHE.filter(r=>r.Nadador==='Felipe').length;
  const sesS=CACHE.filter(r=>r.Nadador==='Sergio').length;
  let h='<div class="kpig" style="margin-bottom:14px"><div class="kpi"><div class="kpi-v">'+sesF+'</div><div class="kpi-l">Felipe</div></div><div class="kpi"><div class="kpi-v s">'+sesS+'</div><div class="kpi-l">Sergio</div></div></div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="lbl" style="margin:0">'+CACHE.length+' sesiones registradas</div><button onclick="sheetsLoad().then(renderHistorial)" style="background:none;border:none;color:var(--navy);font-size:12px;cursor:pointer;padding:4px 8px">🔄 Actualizar</button></div>';
  [...CACHE].reverse().forEach(r=>{h+=miniCard(r);});
  el.innerHTML=h;
}

function miniCard(r) {
  const plan=BLOQUES.flatMap(b=>b.semanas.flatMap(w=>w.sesiones)).find(s=>s.id===r.Sesion_Plan);
  const bx=r.Nadador==='Felipe'?'<span class="bx bf">'+r.Nadador+'</span>':'<span class="bx bs">'+r.Nadador+'</span>';
  const fecha=r.Fecha?new Date(r.Fecha+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short'}):'—';
  return '<div class="card" style="margin-bottom:10px"><div class="ch">'+bx+'<span style="font-size:12px;color:var(--text2);flex:1;margin-left:4px">'+(plan?.nombre||r.Sesion_Plan||'Libre')+'</span><span style="font-size:11px;color:var(--text3)">'+fecha+'</span></div><div class="cb"><div class="r3"><div style="text-align:center"><div style="font-size:16px;font-weight:700;color:var(--navy)">'+(r.Distancia_m||'—')+'m</div><div style="font-size:10px;color:var(--text3)">distancia</div></div><div style="text-align:center"><div style="font-size:16px;font-weight:700;color:var(--navy)">'+(r.Ritmo_100m||'—')+'</div><div style="font-size:10px;color:var(--text3)">/100m</div></div><div style="text-align:center"><div style="font-size:16px;font-weight:700;color:var(--navy)">'+(r.SWOLF||'—')+'</div><div style="font-size:10px;color:var(--text3)">SWOLF</div></div></div>'+(r.FC_Media?'<div style="margin-top:8px;font-size:11px;color:var(--text3)">FC '+r.FC_Media+' ppm · TE aeróbico '+(r.TE_Aerobico||'—')+' · Carga '+(r.Carga||'—')+'</div>':'')+'</div></div>';
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderHoy();
sheetsLoad().then(()=>{
  const tab=document.querySelector('.tab.on')?.id?.replace('tab-','');
  if(tab==='hoy') renderHoy();
  if(tab==='historial') renderHistorial();
}).catch(()=>syncDot('err'));
</script>
